<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0}*{box-sizing:border-box}
  :root{--accent:#2230b8;--surface:#f6f4ee;--surface2:#edeae0;--line:#e3ded1;--line2:#ddd8ca;--ink:#1b1916;--muted:#8a8472;--faint:#a39d8c;--full:#2f8f5b;--miss:#c14b3a}
  .blob{border-radius:63% 37% 56% 44% / 55% 48% 52% 45%}
  ::selection{background:var(--accent);color:#fff}
  .mono{font-family:'IBM Plex Mono',monospace}.tab{font-variant-numeric:tabular-nums}
  .seclbl{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .catpick{appearance:none;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.06em;padding:7px 2px;cursor:pointer;text-transform:uppercase}
  .catpick.on{color:var(--ink);border-bottom-color:var(--accent)}
  .opt{appearance:none;background:#fff;border:1px solid var(--line2);border-radius:20px;color:var(--ink);font:600 12px 'IBM Plex Mono',monospace;padding:8px 13px;cursor:pointer;transition:.12s;display:inline-flex;align-items:center;gap:7px}
  .opt:hover{border-color:var(--accent);color:var(--accent)}
  .opt.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .opt .ct{font:500 10px 'IBM Plex Mono',monospace;opacity:.55}.opt.on .ct{opacity:.8}
  .grp{background:#fff;border:1px solid var(--line2);border-radius:11px;padding:12px 14px}
  .grpL{font:600 9px 'IBM Plex Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:9px}
  .gchip{display:inline-flex;align-items:center;gap:7px;background:#eceffb;border:1px solid #d3d8ef;border-radius:20px;color:var(--accent);font:600 12px 'IBM Plex Mono',monospace;padding:6px 11px}
  .gchip b{cursor:pointer;font-weight:700}
  .andrail{display:flex;align-items:center;gap:10px;padding:7px 0 7px 13px}
  .andrail .b{font:700 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--accent);background:#eceffb;border:1px solid #d3d8ef;border-radius:5px;padding:3px 9px}
  .andrail .r{flex:1;height:1px;background:var(--line)}
  .orw{font:600 9px 'IBM Plex Mono',monospace;color:var(--faint)}
  .sr{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 13px;cursor:pointer;border-radius:8px}
  .sr:hover{background:#eceffb}
  .narr{display:flex;align-items:center;gap:9px;font:500 11px 'IBM Plex Mono',monospace;color:var(--muted);padding:3px 0}
  .narr .bar{flex:1;height:8px;border-radius:4px;background:#e3ded1;overflow:hidden}
  .narr .bar > i{display:block;height:100%;border-radius:4px;transition:width .35s cubic-bezier(.2,.7,.25,1)}
</style>
</helmet>

<div style="min-height:100vh;background:#dcd8d0;color:#1b1916;font-family:'Archivo',sans-serif;padding:40px 20px 80px">

  <div style="max-width:560px;margin:0 auto">
    <div style="font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.2em;text-transform:uppercase;color:#8a8273;margin-bottom:12px">gesso &middot; training &middot; build your drill</div>
    <h1 style="font:800 28px/1.05 'Archivo';letter-spacing:-.02em;margin:0 0 8px">What do you want to practise?</h1>
    <p style="font:400 14px/1.5 'Archivo';color:#56514a;margin:0 0 22px">Search or browse to add filters. The count updates as you go, so you always know what you&rsquo;ll get.</p>

    <!-- card -->
    <div style="background:var(--surface);border:1px solid var(--line2);border-radius:14px;box-shadow:0 14px 36px rgba(35,32,26,.1);overflow:hidden">

      <!-- search -->
      <div style="padding:18px 18px 0;position:relative">
        <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line2);border-radius:9px;padding:11px 13px">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="#8a8472" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="search" placeholder="Search countries, movements, eras, mediums, artists…" style="flex:1;border:none;outline:none;background:transparent;font:500 14px 'Archivo';color:var(--ink)" />
        </div>
        <div id="results" style="position:absolute;left:18px;right:18px;top:60px;z-index:5;background:#fff;border:1px solid var(--line2);border-radius:9px;box-shadow:0 16px 34px rgba(35,32,26,.16);overflow:hidden;display:none;max-height:260px;overflow-y:auto"></div>
      </div>

      <!-- browse by category -->
      <div style="padding:14px 18px 0">
        <div style="display:flex;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--line)">
          <button class="catpick" data-cat="century">Era</button>
          <button class="catpick" data-cat="country">Place</button>
          <button class="catpick on" data-cat="style">Movement</button>
          <button class="catpick" data-cat="medium">Medium</button>
          <button class="catpick" data-cat="artist">Artist</button>
        </div>
        <div id="catopts" style="display:flex;gap:8px;flex-wrap:wrap;padding:14px 0 4px"></div>
        <div id="catmore" class="mono" style="font:500 10px 'IBM Plex Mono';color:var(--faint);padding:0 0 4px"></div>
      </div>

      <!-- selected -->
      <div style="padding:16px 18px 0">
        <div class="seclbl" style="margin-bottom:10px">Your drill</div>
        <div id="groups" style="display:flex;flex-direction:column"></div>
      </div>

      <!-- inline count + narrowing -->
      <div style="margin:18px 18px 0;padding:15px 16px;background:#eceffb;border:1px solid #d3d8ef;border-radius:11px">
        <div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px">
          <span style="display:flex;align-items:baseline;gap:7px"><b id="bigcount" class="tab" style="font:800 26px 'Archivo';color:var(--accent)">44</b><span class="mono" style="font:600 11px 'IBM Plex Mono';color:var(--muted)">works match</span></span>
          <button id="toggle" class="mono" style="background:none;border:none;font:600 10px 'IBM Plex Mono';letter-spacing:.06em;text-transform:uppercase;color:var(--accent);cursor:pointer;border-bottom:1px solid #b0b5e0">show breakdown</button>
        </div>
        <div id="narrow" style="margin-top:12px;display:none;flex-direction:column;gap:6px"></div>
        <div id="rnote" class="mono" style="font:500 11px 'IBM Plex Mono';color:var(--muted);margin-top:10px"></div>
      </div>

      <!-- start -->
      <div style="padding:16px 18px 20px">
        <button id="start" style="width:100%;padding:14px;border:none;border-radius:9px;background:var(--accent);color:#fff;font:700 12px 'IBM Plex Mono';letter-spacing:.1em;text-transform:uppercase;cursor:pointer">Start training &rarr;</button>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  POOL(){ return 2735; }
  famOrder(){ return [['century','Era'],['country','Place'],['region','Region'],['style','Movement'],['medium','Medium'],['artist','Artist']]; }
  vocab(){ return [
    // century
    {l:'14th c.',fam:'century',frac:.05},{l:'15th c.',fam:'century',frac:.07},{l:'16th c.',fam:'century',frac:.11},{l:'17th c.',fam:'century',frac:.13},{l:'18th c.',fam:'century',frac:.12},{l:'19th c.',fam:'century',frac:.18},{l:'20th c.',fam:'century',frac:.09},
    // country
    {l:'Italy',fam:'country',frac:.044},{l:'France',fam:'country',frac:.10},{l:'Netherlands',fam:'country',frac:.06},{l:'Spain',fam:'country',frac:.04},{l:'Japan',fam:'country',frac:.15},{l:'China',fam:'country',frac:.13},{l:'Egypt',fam:'country',frac:.05},{l:'United States',fam:'country',frac:.14},{l:'India',fam:'country',frac:.03},{l:'Iran',fam:'country',frac:.08},
    // movement / culture (one category in-game = "style")
    {l:'Renaissance',fam:'style',frac:.026},{l:'Baroque',fam:'style',frac:.021},{l:'Impressionism',fam:'style',frac:.015},{l:'Post-Impressionism',fam:'style',frac:.012},{l:'Realism',fam:'style',frac:.018},{l:'Romanticism',fam:'style',frac:.014},{l:'Surrealism',fam:'style',frac:.008},
    {l:'Edo Japan',fam:'style',frac:.06},{l:'Ming China',fam:'style',frac:.05},{l:'Ancient Egypt',fam:'style',frac:.04},{l:'Mughal India',fam:'style',frac:.02},
    // medium
    {l:'Oil paint',fam:'medium',frac:.62},{l:'Sculpture',fam:'medium',frac:.13},{l:'Prints',fam:'medium',frac:.14},{l:'Drawing',fam:'medium',frac:.10},{l:'Ceramic',fam:'medium',frac:.07},
    // artist
    {l:'Rembrandt',fam:'artist',frac:.006},{l:'Monet',fam:'artist',frac:.005},{l:'Hokusai',fam:'artist',frac:.007},{l:'Vermeer',fam:'artist',frac:.003},{l:'Goya',fam:'artist',frac:.005},
  ]; }
  state={ sel:{'Italy':1,'Renaissance':1,'Baroque':1,'Oil paint':1}, cat:'style', q:'' };
  meta(l){ return this.vocab().find(v=>v.l===l); }
  componentDidMount(){ this.renderCat(); this.renderGroups(); this.renderFunnel(); this.wire(); }
  wire(){
    const s=document.getElementById('search'), res=document.getElementById('results');
    s.oninput=()=>{ const q=s.value.trim().toLowerCase(); if(!q){ res.style.display='none'; return; }
      const hits=this.vocab().filter(v=>v.l.toLowerCase().includes(q)).slice(0,8);
      if(!hits.length){ res.style.display='block'; res.innerHTML=`<div class="sr" style="cursor:default;color:var(--faint)">No match for &ldquo;${s.value}&rdquo;</div>`; return; }
      res.style.display='block';
      res.innerHTML=hits.map(v=>{ const fam=this.famOrder().find(f=>f[0]===v.fam); return `<div class="sr" data-l="${v.l}"><span style="display:flex;align-items:center;gap:9px"><span class="mono" style="font:600 8px 'IBM Plex Mono';letter-spacing:.1em;text-transform:uppercase;color:var(--faint);background:#f1eee7;border-radius:4px;padding:3px 6px">${fam?fam[1]:v.fam}</span><span style="font:600 14px 'Archivo'">${v.l}</span></span><span class="mono" style="font:500 11px 'IBM Plex Mono';color:${this.state.sel[v.l]?'var(--accent)':'var(--faint)'}">${this.state.sel[v.l]?'added':Math.round(this.POOL()*v.frac)}</span></div>`; }).join('');
      res.querySelectorAll('[data-l]').forEach(r=>r.onclick=()=>{ this.toggle(r.dataset.l); s.value=''; res.style.display='none'; });
    };
    document.addEventListener('click',e=>{ if(!e.target.closest('#search')&&!e.target.closest('#results')) res.style.display='none'; });
    document.querySelectorAll('.catpick').forEach(b=>b.onclick=()=>{ document.querySelectorAll('.catpick').forEach(x=>x.classList.remove('on')); b.classList.add('on'); this.setState({cat:b.dataset.cat}); setTimeout(()=>this.renderCat(),0); });
    document.getElementById('toggle').onclick=()=>{ const n=document.getElementById('narrow'), t=document.getElementById('toggle'); const open=n.style.display==='flex'; n.style.display=open?'none':'flex'; t.textContent=open?'show breakdown':'hide breakdown'; };
  }
  toggle(l){ const s={...this.state.sel}; if(s[l])delete s[l]; else s[l]=1; this.setState({sel:s}); setTimeout(()=>{this.renderCat();this.renderGroups();this.renderFunnel();},0); }
  renderCat(){
    const el=document.getElementById('catopts'), more=document.getElementById('catmore'); if(!el) return;
    const all=this.vocab().filter(v=>v.fam===this.state.cat);
    const show=all.slice(0,8);
    el.innerHTML=show.map(v=>`<button class="opt${this.state.sel[v.l]?' on':''}" data-l="${v.l}">${v.l}<span class="ct">${Math.round(this.POOL()*v.frac)}</span></button>`).join('');
    el.querySelectorAll('.opt').forEach(b=>b.onclick=()=>this.toggle(b.dataset.l));
    more.textContent = all.length>show.length ? `+ ${all.length-show.length} more — type to search` : 'type to search for more';
  }
  groupsByFam(){ const g={}; Object.keys(this.state.sel).forEach(l=>{ const m=this.meta(l); if(m)(g[m.fam]=g[m.fam]||[]).push(l); }); return g; }
  renderGroups(){
    const el=document.getElementById('groups'); if(!el) return;
    const g=this.groupsByFam(); const order=this.famOrder().filter(([f])=>g[f]);
    if(!order.length){ el.innerHTML='<div class="mono" style="font:500 12px \'IBM Plex Mono\';color:var(--faint);padding:4px 0 8px">Nothing yet — training on all 2,735 works.</div>'; return; }
    el.innerHTML=order.map(([fam,label],i)=>{
      const items=g[fam];
      const chips=items.map((l,ii)=>`${ii>0?'<span class="orw">or</span>':''}<span class="gchip">${l} <b data-rm="${l}">&times;</b></span>`).join(' ');
      const rail=i>0?`<div class="andrail"><span class="b">AND</span><span class="r"></span></div>`:'';
      return `${rail}<div class="grp"><div class="grpL">${label}${items.length>1?' <span style="color:var(--accent);text-transform:lowercase;letter-spacing:0;font-weight:600">&middot; any of</span>':''}</div><div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">${chips}</div></div>`;
    }).join('');
    el.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>this.toggle(b.dataset.rm));
  }
  renderFunnel(){
    const g=this.groupsByFam(); const order=this.famOrder().filter(([f])=>g[f]);
    let running=this.POOL(); const rows=[`<div class="narr"><span style="flex:0 0 120px">All works</span><span class="bar"><i style="width:100%;background:#dcd6c6"></i></span><span class="tab" style="flex:0 0 44px;text-align:right">${this.POOL().toLocaleString()}</span></div>`];
    order.forEach(([fam,label],i)=>{
      const items=g[fam]; const famFrac=Math.min(.95, items.reduce((a,l)=>a+this.meta(l).frac,0));
      running = i===0 ? Math.round(this.POOL()*famFrac) : Math.max(0,Math.round(running*famFrac));
      const w=Math.max(3,running/this.POOL()*100), last=i===order.length-1;
      const lab=items.map(x=>x.replace(' paint','').replace(' c.','c')).join('/');
      rows.push(`<div class="narr"><span style="flex:0 0 120px;color:var(--ink)">+ ${lab}</span><span class="bar"><i style="width:${w}%;background:${last?'var(--accent)':'rgba(34,48,184,.6)'}"></i></span><span class="tab" style="flex:0 0 44px;text-align:right;${last?'color:var(--accent);font-weight:700':''}">${running}</span></div>`);
    });
    const final = order.length?running:this.POOL();
    document.getElementById('narrow').innerHTML=rows.join('');
    document.getElementById('bigcount').textContent=final.toLocaleString();
    const note=document.getElementById('rnote'), st=document.getElementById('start');
    const rounds=Math.max(1,Math.round(final/5));
    if(final<8){ note.innerHTML=`<span style="color:var(--miss);font-weight:600">Only ${final} works — loosen a filter for a fuller drill.</span>`; if(st){st.style.opacity=final<1?'.4':'1';st.style.pointerEvents=final<1?'none':'auto';} }
    else { note.textContent=`about ${rounds} rounds before any repeat`; if(st){st.style.opacity='1';st.style.pointerEvents='auto';} }
  }
}
</script>
</body>
</html>
