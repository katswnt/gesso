<script>
"use strict";
/*
  Gesso intentionally stays a no-build, static-data SPA: every player loads the same
  frozen corpus and the same frozen daily order, then all scoring happens locally.
  Treat the functions below as product rules, not incidental UI glue. In particular:
  - origin means the artist's country of origin, never holding museum location;
  - medium means artistic medium, not support;
  - dailies and distractors must be deterministic for a given date/tier/work;
  - public-domain eligibility is enforced in the Node pipeline, not at runtime.
*/
const MAX_CAT=2500, ROUNDS=5, HINT_COST=500, HINT_LIMIT=3;
const CUES = window.ARTEFACTUM_CUES || {style:{},culture:{},region:{},medium:{}};
const HOTSPOTS = window.ARTEFACTUM_HOTSPOTS || {};
// difficulty tunes scoring leniency + how confusable the distractors are
const DIFF={
  easy:      {distK:4500, relMov:0.70, timeMult:1.3, look:'far'},
  medium:    {distK:2500, relMov:0.50, timeMult:1.3, look:'mix'},
  hard:      {distK:1500, relMov:0.35, timeMult:1.35, look:'near'},
  impossible:{distK:1000, relMov:0.25, timeMult:1.4, look:'near'},
};
const dcfg=()=>DIFF[tier]||DIFF.medium;

// ---------- helpers ----------
// shuffle() is deliberately RNG-injectable. Daily play temporarily installs a
// seeded RNG before building answer choices so every player sees the same set.
function shuffle(a){const rnd=window.__RNG||Math.random;a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickN(a,n){return shuffle(a).slice(0,n);}
// last meaningful token, e.g. "Eastern Tibet"->"Tibet", "Central Tibet"->"Tibet" (but "Greek, Attic"->"Attic")
function lastTok(s){return String(s).trim().split(/\s+/).pop().replace(/[^A-Za-z]/g,'');}
function fill3(ans,picks,fromAll){const at=lastTok(ans), sib=x=>lastTok(x)===at;
  let p=[...new Set(picks)].filter(x=>x&&x!==ans&&!sib(x));
  const rest=shuffle(fromAll.filter(x=>x!==ans&&!p.includes(x)&&!sib(x)));
  while(p.length<3&&rest.length)p.push(rest.shift());
  return shuffle([ans,...p.slice(0,3)]);}
// Build medium distractors around the simplified medium taxonomy. Easy should feel
// visually separable; hard/impossible intentionally choose same-family lookalikes.
function mediumChoices(ans){const look=dcfg().look;
  // Training: 2+ media families pinned → restrict the option pool to only those families (the answer
  // is one of them, so distractors should be too). 1 pin is handled upstream by dropping the question.
  const mf=(typeof trainMediaFams==='function')?trainMediaFams():null;
  const restrict=mf&&mf.size>=2;
  const POOL_MED=restrict?ALL_MED.filter(m=>m===ans||(MED_FAMILY[m]&&mf.has(MED_FAMILY[m]))):ALL_MED;
  const same=POOL_MED.filter(m=>m!==ans&&MED_FAMILY[m]&&MED_FAMILY[m]===MED_FAMILY[ans]);
  const diff=POOL_MED.filter(m=>m!==ans&&MED_FAMILY[m]!==MED_FAMILY[ans]);
  let picks; if(look==='far')picks=pickN(diff,3); else if(look==='near')picks=[...pickN(same,3),...pickN(diff,3)].slice(0,3); else picks=[...pickN(same,1),...pickN(diff,2)];
  return fill3(ans,picks,POOL_MED);}
// Build style/culture choices from the answer's own taxonomy. The important invariant:
// culture labels compete with cultures, movements with movements, and difficulty
// controls visual confusion without mixing coarse/fine synonyms in one option set.
const DEMONYM={japanese:'japan',chinese:'china',korean:'korea',persian:'persia',iranian:'persia',indian:'india',egyptian:'egypt',greek:'greece',roman:'rome',italian:'italy',french:'france',german:'germany',spanish:'spain',dutch:'netherlands',flemish:'netherlands',english:'england',british:'britain',american:'usa',mexican:'mexico',peruvian:'peru',tibetan:'tibet',nepalese:'nepal',thai:'thailand',vietnamese:'vietnam'};
function cultureKey(s){let k=String(s||'').toLowerCase().replace(/[^a-z ]/g,'').trim().split(' ')[0];return DEMONYM[k]||k;}
function styleChoices(it){const look=dcfg().look, ans=it.style, aKey=cultureKey(ans);
  const isCult=it.styleKind==='culture';
  const root=s=>styleCountry[s]||cultureKey(s); // a label's geographic root (dominant country)
  const aRoot=root(ans);
  // pool: drop only demonym-synonyms of the answer ("Japan" vs "Japanese")
  let pool=(isCult?CULTS:MOVS).filter(s=>s===ans||cultureKey(s)!==aKey);
  // Training: 2+ movements pinned → restrict the option pool to the chosen movements (answer included).
  // 1 pin is handled upstream by dropping the question entirely.
  const mv=(typeof trainMovements==='function')?trainMovements():null;
  if(mv&&mv.size>=2) pool=pool.filter(s=>s===ans||mv.has(s));
  const others=pool.filter(s=>s!==ans);
  const sameReg=shuffle(others.filter(s=>styleRegion[s]===it.region));
  const diffReg=shuffle(others.filter(s=>styleRegion[s]&&styleRegion[s]!==it.region));
  const related=shuffle((RELATED_MOV[ans]||[]).filter(s=>others.includes(s)));
  // DIFFICULTY GRAIN: easy=far (cross-region, obviously different) → impossible=near (same-region / related lookalikes)
  let ordered;
  if(look==='far')       ordered=[...diffReg, ...sameReg, ...shuffle(others)];
  else if(look==='near') ordered=[...related, ...sameReg, ...diffReg];
  else                   ordered=[...related.slice(0,1), ...sameReg.slice(0,1), ...diffReg, ...sameReg, ...shuffle(others)];
  // never show two options from the SAME movement family at different granularity (Renaissance / High
  // Renaissance / Italian Renaissance / renaissance). For cultures, spread by country only in 'far'.
  const movFam=s=>s.toLowerCase().replace(/\b(high|early|late|proto|northern|southern|italian|french|german|dutch|flemish|spanish|english|british|american|venetian|florentine|sienese|early\s)\b/g,"").replace(/\b(school|movement|art|painting|style|era|period)\b/g,"").replace(/[^a-z]/g,"");
  const famKey=s=> isCult ? root(s) : movFam(s);
  const dedup = isCult ? (look==='far') : true; // movements always family-dedup; cultures only in far
  const out=[ans], used=new Set([famKey(ans)]);
  for(const s of ordered){ if(out.length>=4)break; if(out.includes(s))continue;
    const k=famKey(s); if(dedup && k && used.has(k))continue; used.add(k);
    out.push(s);}
  if(out.length<4) for(const s of shuffle(others)){ if(out.length>=4)break; if(!out.includes(s)){const k=famKey(s); if(dedup&&k&&used.has(k))continue; used.add(k); out.push(s);} }
  return shuffle(out);}
function km(a,b,c,d){const R=6371,r=Math.PI/180,dl=(c-a)*r,dn=(d-b)*r,h=Math.sin(dl/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dn/2)**2;return 2*R*Math.asin(Math.sqrt(h));}
function fmtYear(y){return y<0?`${-y} BCE`:`${y} CE`;}
const motionQuery=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)');
let settings=loadSettings();
function loadSettings(){try{const s=JSON.parse(localStorage.getItem("gesso.settings"))||{};return {reduceMotion:typeof s.reduceMotion==='boolean'?s.reduceMotion:!!(motionQuery&&motionQuery.matches),colorblind:!!s.colorblind,units:s.units==='in'?'in':'cm'};}catch{return{reduceMotion:!!(motionQuery&&motionQuery.matches),colorblind:false,units:'cm'};}}
function saveSettings(){try{localStorage.setItem("gesso.settings",JSON.stringify({reduceMotion:!!settings.reduceMotion,colorblind:!!settings.colorblind,units:settings.units||'cm'}));}catch{}}
// dimensions display, honoring the cm/inches preference ("73.7 × 92.1 cm" → "29.0 × 36.3 in")
function fmtDim(dim){ const s=String(dim||"").trim(); if(!s) return s; if((settings.units||'cm')!=='in') return s;
  const m=s.match(/^([\d.]+)\s*[×x]\s*([\d.]+)(?:\s*[×x]\s*([\d.]+))?\s*cm/i); if(!m) return s;
  const toIn=v=>v?(Math.round(parseFloat(v)/2.54*10)/10):null; const a=toIn(m[1]),b=toIn(m[2]),c=toIn(m[3]);
  return (c!=null?`${a} × ${b} × ${c}`:`${a} × ${b}`)+" in"; }
function applySettings(){document.body.classList.toggle('reduce-motion',!!settings.reduceMotion);document.body.classList.toggle('motion-ok',!settings.reduceMotion);document.body.classList.toggle('colorblind',!!settings.colorblind);const sh=document.getElementById('share');if(sh&&results.length){const fresh=resultSummary().share;sh.textContent=fresh;if(lastFinal)lastFinal.share=fresh;}}
function prefersReducedChanged(e){try{const stored=JSON.parse(localStorage.getItem("gesso.settings"))||{};if(typeof stored.reduceMotion!=='boolean'){settings.reduceMotion=!!e.matches;applySettings();}}catch{}}
if(motionQuery&&motionQuery.addEventListener)motionQuery.addEventListener('change',prefersReducedChanged);
// One modal scaffold for every .settingsveil dialog: builds veil > panel > (head: title + close) + body,
// wires Esc + backdrop + close-button once, returns {veil,close,$}. Callers add their own veil click
// listener for internal actions (no need to re-handle backdrop/close). onClose runs after removal;
// onKey(e,{close}) lets a modal add extra keys (return true to swallow before the default Esc).
function openModal({title,ariaLabel,body,onClose,onKey}){
  const veil=document.createElement('div');veil.className='settingsveil';
  veil.innerHTML=`<div class="settingspanel" role="dialog" aria-modal="true" aria-label="${esc(ariaLabel||title||'')}">
    <div class="settingshead"><span class="ttl">${title||''}</span><button type="button" class="settingsclose" aria-label="Close">${ICONS.close}</button></div>
    ${body||''}</div>`;
  const close=()=>{veil.remove();document.removeEventListener('keydown',key);if(!document.querySelector('.settingsveil'))document.documentElement.classList.remove('modalopen');if(onClose)onClose();};
  const key=e=>{if(onKey&&onKey(e,{close})===true)return;if(e.key==='Escape')close();};
  veil.addEventListener('click',e=>{if(e.target===veil||e.target.closest('.settingsclose'))close();});
  document.addEventListener('keydown',key);document.body.appendChild(veil);
  document.documentElement.classList.add('modalopen'); // lock page scroll so the sheet doesn't jitter / bleed the page behind
  return {veil,close,$:s=>veil.querySelector(s)};
}
function openSettings(){
  const {veil,close}=openModal({title:'Settings',body:`<div class="settingsbody">
      <div class="setrow"><div><div class="name">Reduce motion</div><div class="hint">Auto-follows your system &middot; override here</div></div><button type="button" class="toggle" data-set="reduceMotion" aria-pressed="${settings.reduceMotion?'true':'false'}" aria-label="Reduce motion"></button></div>
      <div class="setrow"><div><div class="name">Colorblind mode</div><div class="hint">Adds ✓ ◐ ✕ to result swatches</div></div><button type="button" class="toggle" data-set="colorblind" aria-pressed="${settings.colorblind?'true':'false'}" aria-label="Colorblind mode"></button></div>
      <div class="setrow"><div><div class="name">Dimension units</div><div class="hint">Show artwork sizes in cm or inches</div></div><button type="button" class="unitseg" data-units aria-label="Toggle units">${settings.units==='in'?'inches':'cm'}</button></div>
      <div class="setrow"><div><div class="name">Replay the tutorial</div><div class="hint">See the "How to play" walkthrough again</div></div><button type="button" class="obnext" data-replaytut style="padding:8px 14px">Replay</button></div>
    </div><div class="settingsfoot">Preferences save to this browser.</div>`});
  veil.addEventListener('click',e=>{if(e.target.closest('[data-replaytut]')){close();openHowTo();return;}const t=e.target.closest('[data-set]');if(t){settings[t.dataset.set]=!settings[t.dataset.set];t.setAttribute('aria-pressed',settings[t.dataset.set]?'true':'false');saveSettings();applySettings();}
    const u=e.target.closest('[data-units]');if(u){settings.units=settings.units==='in'?'cm':'in';u.textContent=settings.units==='in'?'inches':'cm';saveSettings();}});
}
// ---------- "How to play" onboarding ----------
const HOWTO_STEPS=[
  {key:'welcome',title:'Guess what you can',body:"Five works a day. You don't need to know everything — a thoughtful guess beats a blank, and close still counts."},
  {key:'when',title:'When was it made?',body:"Drag the dot along the timeline to your best year. It updates as you slide, showing something like “1700 CE.”"},
  {key:'where',title:'Where in the world?',body:"Tap the map to drop a pin. Pinch or use the +/− buttons to zoom — scrolling moves the page, not the map."},
  {key:'choose',title:'Pick what fits',body:"Tap the medium and movement you think match. Know the artist? Start typing to search — that one's a bonus."},
  {key:'lock',title:'Lock in & learn',body:"Hit Lock in to reveal the answer and a short story about the work. Even a rough guess beats a blank — partial credit always counts. Stuck? A hint costs 500."},
];
// learning-mode look-closer toggle glyphs (retire 👁 / 🙈) — loupe-with-dot / eye-struck-through
const LOOK_EYE='<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.3"/><path d="M15.3 15.3L21 21"/><circle cx="10.5" cy="10.5" r="1.7" fill="currentColor" stroke="none"/></svg>';
const LOOK_EYE_OFF='<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px" aria-hidden="true"><path d="M2.5 12S5.8 5.8 12 5.8s9.5 6.2 9.5 6.2-3.3 6.2-9.5 6.2c-1 0-1.9-.16-2.7-.42"/><path d="M7.4 7.4 18.6 18.6" stroke-width="1.9"/><path d="M9.6 9.6a3.4 3.4 0 004.8 4.8"/></svg>';
function howtoIcon(key){
  const s='fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"';
  const m={
    welcome:`<path ${s} d="M12 4.3c-4.5 0-8.1 3-8.1 6.8 0 2.5 1.9 3.9 3.8 3.9 1.4 0 1.6 1.1 1.1 2-.5 1 .1 2 1.6 2.1 4.8.5 9.7-3.1 9.7-7.7 0-4.5-3.5-7.1-8.1-7.1Z"/><circle cx="8" cy="10" r="1" fill="#fff" stroke="none"/><circle cx="12" cy="8.3" r="1" fill="#fff" stroke="none"/><circle cx="15.6" cy="10" r="1" fill="#fff" stroke="none"/>`,
    when:`<circle ${s} cx="12" cy="12" r="8.3"/><path ${s} d="M12 7.4V12l3.1 1.9"/>`,
    where:`<circle ${s} cx="12" cy="12" r="8.3"/><path ${s} d="M3.7 12h16.6M12 3.7v16.6"/><ellipse ${s} cx="12" cy="12" rx="3.9" ry="8.3"/>`,
    choose:`<rect ${s} x="4.7" y="4.7" width="14.6" height="14.6" rx="3.4"/><path d="M5.4 19 H12 L5.4 12.4 Z" fill="#fff"/>`,
    lock:`<path ${s} d="M4 12.5l5 5 11-11"/>`,
  };
  return `<svg viewBox="0 0 24 24" width="40" height="40">${m[key]||m.welcome}</svg>`;
}
function openHowTo(){
  let i=0,api;
  const draw=()=>{const st=HOWTO_STEPS[i];
    api.$('.obdab').innerHTML=howtoIcon(st.key); api.$('.obtitle').textContent=st.title; api.$('.obtext').textContent=st.body;
    api.$('.obdots').innerHTML=HOWTO_STEPS.map((_,k)=>`<span class="${k===i?'on':''}" data-d="${k}"></span>`).join('');
    api.$('.obback').style.visibility=i===0?'hidden':'visible';
    api.$('.obnext').textContent=i===HOWTO_STEPS.length-1?'Start playing':'Next';};
  const go=d=>{i+=d; if(i>=HOWTO_STEPS.length){api.close();return;} if(i<0)i=0; draw();};
  api=openModal({title:'How to play',
    body:`<div class="obbody"><div class="obillus"><span class="obdab"></span></div><div class="obtitle"></div><div class="obtext"></div></div>
    <div class="obdots"></div>
    <div class="obfoot"><button type="button" class="obskip">Skip</button>
      <div class="obnav"><button type="button" class="obback">Back</button><button type="button" class="obnext">Next</button></div></div>`,
    onClose:()=>{try{localStorage.setItem("gesso.onboarded","1");}catch{}},
    onKey:e=>{if(e.key==='ArrowRight'){go(1);return true;}if(e.key==='ArrowLeft'){go(-1);return true;}}});
  api.veil.addEventListener('click',e=>{
    if(e.target.closest('.obskip'))return api.close();
    if(e.target.closest('.obnext'))return go(1);
    if(e.target.closest('.obback'))return go(-1);
    const dot=e.target.closest('[data-d]'); if(dot){i=+dot.dataset.d;draw();}});

// non-linear timeline: most works are post-1400, so give recent centuries more of the track
let MINY=-2500; const BREAKY=1400, BREAKP=350, MAXY=2025, MAXP=1000;
// During a training run, the when-slider maps LINEARLY over the actual span of the trained
// works ([lo,hi]); daily/infinite keep the global non-linear domain. Set in startTraining,
// cleared (null) when leaving training. See posToYear/yearToPos branches below.
let TRAIN_SPAN=null;
function posToYear(p){p=+p;
  if(TRAIN_SPAN){ const {lo,hi}=TRAIN_SPAN; return Math.round(lo+(p/MAXP)*(hi-lo)); }
  return p<=BREAKP?Math.round(MINY+(p/BREAKP)*(BREAKY-MINY)):Math.round(BREAKY+((p-BREAKP)/(MAXP-BREAKP))*(MAXY-BREAKY));}
function yearToPos(y){
  if(TRAIN_SPAN){ const {lo,hi}=TRAIN_SPAN; return Math.max(0,Math.min(MAXP,Math.round((y-lo)/(hi-lo)*MAXP))); }
  return y<=BREAKY?Math.round((y-MINY)/(BREAKY-MINY)*BREAKP):Math.round(BREAKP+(y-BREAKY)/(MAXY-BREAKY)*(MAXP-BREAKP));}
// Compute a padded [lo,hi] span from the trained works, guarding the degenerate lo==hi case.
function trainSpanFrom(works){ const ys=works.map(p=>p.y).filter(y=>y!=null); if(!ys.length) return null;
  let lo=Math.min(...ys), hi=Math.max(...ys);
  if(lo===hi){ lo-=10; hi+=10; } // give a small window for a single-year drill
  else { lo=Math.floor(lo/10)*10; hi=Math.ceil(hi/10)*10; } // round outward to the decade
  return {lo,hi}; }
// Region-aware period schemes — the slider tag reflects the work's own culture's periodization
const SCHEMES={
  western:[["Antiquity",500],["Medieval",1400],["Renaissance",1600],["Baroque",1750],["Enlightenment",1800],["19th c.",1900],["Modern",1945],["Contemporary",3000]],
  china:[["Ancient",-221],["Han",220],["Six Dynasties",589],["Sui–Tang",907],["Song",1279],["Yuan",1368],["Ming",1644],["Qing",1912],["Modern",3000]],
  japan:[["Ancient",710],["Nara",794],["Heian",1185],["Kamakura",1333],["Muromachi",1573],["Momoyama",1615],["Edo",1868],["Meiji+",3000]],
  india:[["Ancient",320],["Gupta",606],["Medieval",1206],["Sultanate",1526],["Mughal",1757],["Colonial",1947],["Modern",3000]],
  persia:[["Ancient",651],["Early Islamic",1256],["Ilkhanid–Timurid",1501],["Safavid",1736],["Qajar",1925],["Modern",3000]],
  egypt:[["Early Dynastic",-2686],["Old Kingdom",-2055],["Middle Kingdom",-1550],["New Kingdom",-1069],["Late Period",-332],["Greco-Roman",641],["Islamic",3000]],
  classical:[["Archaic",-480],["Classical Greek",-323],["Hellenistic",-31],["Roman Imperial",476],["Late Antique",3000]],
  neutral:[["Ancient",500],["Medieval",1400],["Early Modern",1800],["Modern",1945],["Contemporary",3000]],
};
function schemeFor(it){
  const t=((it.place||"")+" "+(it.style||"")+" "+(it.region||"")).toLowerCase();
  if(/japan|edo|ukiyo/.test(t))return 'japan';
  if(/china|chinese/.test(t))return 'china';
  if(/india|mughal|rajput|deccan|nepal|tibet/.test(t))return 'india';
  if(/iran|persia|islam|ottoman|turkey|safavid|qajar|syria/.test(t))return 'persia';
  if(/egypt/.test(t))return 'egypt';
  // classical scheme is ANTIQUITY-only — a Renaissance/Baroque work made in "Italy (Rome)" must NOT get
  // the ancient periods (its "Late Antique" bucket spans 476–3000, which collapsed 1505 & 2025 into one period)
  if(/greece|rome|roman|greek|hellenistic|etruscan/.test(t) && it.y!=null && it.y<600)return 'classical';
  if(it.region==='Europe'||it.region==='North America')return 'western';
  return 'neutral';

function periodOf(scheme,y){const sc=SCHEMES[scheme]||SCHEMES.neutral;for(const[n,end]of sc)if(y<end)return n;return sc[sc.length-1][0];}
function periodName(it,y){return periodOf(schemeFor(it),y);}
// derive a period scheme from a GUESSED pin (so the slider reflects the player's hypothesis, not the answer)
function schemeFromLatLng(lat,lng){
  if(lng>=24&&lng<=37&&lat>=18&&lat<=32)return 'egypt';
  if(lng>=128&&lng<=146&&lat>=30&&lat<=46)return 'japan';
  if(lng>=98&&lng<=136&&lat>=18&&lat<=50)return 'china';
  if(lng>=68&&lng<=92&&lat>=6&&lat<=36)return 'india';

function masteryLine(){
  const m=loadMastery();

  // (was style-only + total>=2, which froze on an early 2/2 entry while new styles sat at total=1)
  const merge={}; for(const b of [m.byStyle,m.byRegion]) for(const[k,v] of Object.entries(b||{})){ if(!k)continue; const e=merge[k]||(merge[k]={correct:0,total:0}); e.correct+=v.correct; e.total+=v.total; }
  let entries=Object.entries(merge).filter(([,v])=>v.total>=2);
  if(!entries.length) entries=Object.entries(merge).filter(([,v])=>v.total>=1); // early game: show something
  if(!entries.length) return "";
  const ratio=v=>v.correct/v.total;
  entries.sort((a,b)=> ratio(b[1])-ratio(a[1]) || b[1].total-a[1].total);
  const best=entries[0], worst=entries[entries.length-1];

  if(worst!==best) s+=` &middot; <span class="weak">${esc(worst[0])} still slips (${worst[1].correct}/${worst[1].total})</span>`;

function todayStr(){const d=new Date();return localDateStr(d);}
function localDateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseLocalDate(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function addDays(s,n){const d=parseLocalDate(s);d.setDate(d.getDate()+n);return localDateStr(d);}

// ROUNDS works per day through it — so a work can't reappear until the whole permutation cycles
// (~pool/5 days: ~8 for Easy, ~16+ for the larger tiers). Same for everyone on a given date+tier.
function dailyItems(key,dateStr){

  // and stay shareable/replayable. Falls back to the live fame-sorted rotation if the freeze is absent.
  const byId = window.__BYID || (window.__BYID = Object.fromEntries(POOL.map(p=>[p.id,p])));
  const frozen = (window.ARTEFACTUM_DAILY||{})[key];
  let perm;

    perm = frozen.map(id=>byId[id]).filter(Boolean);
  } else {
    const i=Math.max(0,TIERS.findIndex(t=>t.key===key));
    let arr=tierItems(i);
    if(arr.length<ROUNDS) arr=[...arr,...seededShuffle(POOL.filter(p=>!arr.includes(p)),`${key}|fill`)];

function trainEnc(v){ return typeof v==='number'?'#'+v:esc(String(v)); }
function trainDec(s){ return s[0]==='#'?+s.slice(1):s; }
function trainToggle(fam,enc){ const v=trainDec(enc); const set=__train.facets[fam]; if(set.has(v))set.delete(v); else set.add(v); }
function trainLabel(fam,v){ if(fam==='centuries')return centuryLabel(v); if(fam==='mediaFamilies')return MED_FAM_LABEL[v]||v; return v; }
// Selection-aware option list for one browse tab: options of the tab's families that
// co-occur with the CURRENT selection, counted against the OTHER families' filters.
// Tsub = current facets with the tab's families CLEARED (within-family OR semantics).
// Returns vocab-shaped rows (fam,val,label,count,famKey,tag) sorted by count desc; count>0.
function trainCatOptions(cat){
  const tabFams=TRAIN_TAB_FAMS[cat]||[];
  const T=__train, vocab=trainVocab().filter(v=>tabFams.includes(v.fam));
  // build Tsub: copy current facets but clear the tab's families
  const sub=newFacets();
  for(const fam in T.facets){ if(!tabFams.includes(fam)) for(const v of T.facets[fam]) sub[fam].add(v); }
  const base=trainingApply({facets:sub,axis:T.axis},POOL); // co-occurring candidate works (one pass)
  // tally how many base works carry each option value, per family, in a single pass
  const tally={}; const bump=(fam,val)=>{ if(val==null)return; (tally[fam]=tally[fam]||{}); tally[fam][val]=(tally[fam][val]||0)+1; };
  for(const p of base){
    if(tabFams.includes('centuries')) bump('centuries',centuryOf(p.y));
    if(tabFams.includes('regions')) bump('regions',p.region);
    if(tabFams.includes('countries')) bump('countries',countryNameOf(p.place));
    if(tabFams.includes('movements')&&p.style) bump('movements',p.style);
    if(tabFams.includes('mediaFamilies')) bump('mediaFamilies',MED_FAMILY[p.medSimple]);
    if(tabFams.includes('artists')&&p.artist) bump('artists',p.artist);
  }
  const out=[];
  for(const v of vocab){ const c=(tally[v.fam]||{})[v.val]||0; const on=T.facets[v.fam].has(v.val);
    if(c>0||on) out.push({...v,count:c}); }
  out.sort((a,b)=>b.count-a.count);
  return out;
}

function tierIndex(key){return Math.max(0,TIERS.findIndex(t=>t.key===key));}
// practice ordering: for Easy, weave so ~1-in-5 is a top-100 icon (reliable, not random-clumpy);
// the other 4 spread the recognizable tier. Other tiers just shuffle. No repeats until the tier cycles.
// Spread works so the same NAMED artist never lands back-to-back (e.g. several Bosch in the icon set).
// Greedy: when the previous item's artist would repeat, skip ahead to the next different-artist work;
// anonymous works (no artist) are left as-is, and an unavoidable run (only that artist left) stays.
function spreadByArtist(list){
  const out=[], pending=list.slice();
  while(pending.length){
    const last=out.length?out[out.length-1].artist:null;
    let pick=0;
    if(last){ const j=pending.findIndex(p=>p.artist!==last); if(j>=0)pick=j; }
    out.push(pending.splice(pick,1)[0]);
  }
  return out;
}
function practiceOrder(key){
  const works=tierItems(tierIndex(key));
  if(key!=='easy') return spreadByArtist(shuffle(works));
  const ICON=new Set(POOL.slice(0,100).map(p=>p.id)); // POOL is recognizability-sorted in buildIndexes()
  const icons=shuffle(works.filter(p=>ICON.has(p.id))), rest=shuffle(works.filter(p=>!ICON.has(p.id)));
  const out=[]; let i=0,r=0;
  while(i<icons.length||r<rest.length){ if(i<icons.length)out.push(icons[i++]); for(let k=0;k<4&&r<rest.length;k++)out.push(rest[r++]); }
  return spreadByArtist(out);
}

  // wire slider

  // artist

  // learning-mode: reveal look-closer markers before locking in

    const on=lm.style.display==='none'; lm.style.display=on?'block':'none'; ht.innerHTML=on?`${LOOK_EYE_OFF} Hide look-closer markers`:`${LOOK_EYE} Reveal look-closer markers`; };
  // map
  marker=null; map=null;
  if(!hideMap){

  // Training PLACE pin: auto-fit the map to the chosen area instead of the world view. Must run after

  map.on('click',e=>{const lat=e.latlng.lat, lng=((e.latlng.lng+180)%360+360)%360-180; const ll={lat,lng}; guess.ll=ll; if(marker)marker.setLatLng(ll);
    else marker=L.marker(ll,{icon:dabIcon()}).addTo(map);

      const gb=document.getElementById('geobonus'); if(gb){gb.textContent=`✓ Region matched — ${k} unlikely ${k===1?'school':'schools'} ruled out, free`; gb.style.display='block';}}});

function setupAutocomplete(){
  const inp=document.getElementById('artist'),list=document.getElementById('aclist');let active=-1,items=[];
  const close=()=>{list.style.display='none';active=-1;};
  const render=q=>{const ql=deaccent(q).trim();items=ql?ARTIST_POOL.filter(a=>deaccent(a).includes(ql)).slice(0,8):[];
    if(!items.length){close();return;}
    list.innerHTML=items.map((a,i)=>`<div class="ac-item${i===active?' active':''}" data-i="${i}">${esc(a)}</div>`).join('');
    list.style.display='block';
    list.querySelectorAll('.ac-item').forEach(el=>el.onmousedown=ev=>{ev.preventDefault();pick(+el.dataset.i);});};
  const pick=i=>{inp.value=items[i];guess.artist=items[i];close();inp.focus();};
  inp.oninput=()=>{guess.artist=inp.value;active=-1;render(inp.value);};
  inp.onkeydown=e=>{if(list.style.display==='none')return;
    if(e.key==='ArrowDown'){active=Math.min(active+1,items.length-1);render(inp.value);e.preventDefault();}
    else if(e.key==='ArrowUp'){active=Math.max(active-1,0);render(inp.value);e.preventDefault();}
    else if(e.key==='Enter'&&active>=0){pick(active);e.preventDefault();}
    else if(e.key==='Escape')close();};
  inp.onblur=()=>setTimeout(close,120);
}

function wireHints(it){
  const chips=document.getElementById('hintchips'),out=document.getElementById('hintout'),left=document.getElementById('hintsleft');
  const opts=[];
  opts.push({key:"century",label:"century",txt:()=>`Made in the ${centuryStr(it.y)}.`});
  opts.push({key:"continent",label:"continent",txt:()=>`Made somewhere in ${it.region}.`});
  if(it.cats.includes('style')){const kind=(typeof CULTS!=='undefined'&&CULTS.includes(it.style))?'cultures':'movements';
    opts.push({key:"50/50",label:`rule out 2 ${kind}`,txt:()=>{const k=apply5050(it); return k>0?{text:`Two unlikely ${kind} removed from the options.`}:{text:`Already narrowed to two — no charge.`,charged:false};}});}
  if(it.cats.includes('artist')&&isNamedArtist(it.artist)) opts.push({key:"initials",label:"artist's initials",txt:()=>`The artist's initials are ${it.artist.split(/\s+/).filter(Boolean).map(w=>w[0].toUpperCase()+'.').join(' ')}.`});
  const HL=infinite?Infinity:HINT_LIMIT, HC=HINT_COST; // learning mode: unlimited hints, but they still cost points
  chips.innerHTML=opts.map(o=>`<button type="button" class="hintchip" data-k="${o.key}">${o.label}${HC?`<span class="cost">&minus;${HC}</span>`:''}</button>`).join('');
  const refresh=()=>{const rem=HL-hintsUsed; if(left)left.textContent=Number.isFinite(rem)?rem:'∞';
    chips.querySelectorAll('.hintchip').forEach(b=>{if(!b.classList.contains('used'))b.disabled=rem<=0;});};
  chips.querySelectorAll('.hintchip').forEach(b=>{
    b.onclick=()=>{if(hintsUsed>=HL||b.classList.contains('used'))return;
      const o=opts.find(x=>x.key===b.dataset.k); if(!o)return;
      const r=o.txt(), text=typeof r==='string'?r:r.text, charged=typeof r==='string'?true:r.charged!==false;
      b.classList.add('used'); b.disabled=true; out.style.display='block';
      if(charged){ if(HC)guess.hints.add(o.label); hintsUsed++;
        out.insertAdjacentHTML('beforeend',`<div>${esc(text)}${HC?` <span style="color:var(--accent)">−${HC}</span>`:''}</div>`); }
      else out.insertAdjacentHTML('beforeend',`<div>${esc(text)}</div>`);
      refresh();};
  });
  refresh();
}
function centuryStr(y){const c=Math.floor((Math.abs(y)-1)/100)+1;const s=(c%100>10&&c%100<14)?"th":["th","st","nd","rd"][c%10]||"th";return `${c}${s} century${y<0?" BCE":""}`;}

// ---------- scoring ----------
// Score one locked-in round. Core categories max at MAX_CAT each; artist is a
// separate bonus, and hint penalties subtract only from the core score. Keep this
// function pure with respect to answer evaluation: no network, no clock, no random.
function timeScore(diff){
  // diff is years-off already scaled by the tier's timeMult. Steeper mid-curve: near-misses stay
  // rewarding, but a ~century off clearly costs you (Easy ÷1.3 → 100yrs≈77 → 1300).
  if(diff<=12)return{pts:MAX_CAT,bull:true};
  if(diff<=20)return{pts:2250}; if(diff<=40)return{pts:1900}; if(diff<=80)return{pts:1300};
  if(diff<=160)return{pts:700}; if(diff<=320)return{pts:250}; return{pts:0};
}
function score(){
  const it=game[idx], cells={}, D=dcfg();
  // The categories actually asked this round (work's cats, minus single-pin "given" facets, minus FOCUS).
  const ACT=activeCatsFor(it); const asked=c=>ACT.includes(c);
  // when (leniency scales with difficulty; 🎯 bullseye always = within a real decade)
  if(asked('when')){
  const dy=Math.abs(guess.year-it.y), ts=timeScore(Math.round(dy/D.timeMult)), bull=!!ts.bull;
  cells.when={pts:ts.pts, bull, you:fmtYear(guess.year), actual:fmtYear(it.y),
    note:bull?(dy<=10?"right to the decade":"close enough — bullseye"):periodName(it,guess.year)===periodName(it,it.y)?"same period":`${dy} yrs off`};
  }
  // where (distance falloff is gentler on easy, steeper on hard)
  if(asked('where')){
  let dist=null,sp=0,inC=false,inReg=false,inCont=false,rad=radiusFor(it.place); const wc=placeCountry(it.place);
  const reg=(window.ARTEFACTUM_REGIONS||{})[it.style];
  if(guess.ll){ dist=km(guess.ll.lat,guess.ll.lng,it.lat,it.lng);
    // full credit inside EITHER the historical culture/empire region OR the modern country
    inReg = reg ? ptInRegion(guess.ll.lat,guess.ll.lng,reg) : false;
    inC = inReg || (wc ? nearCountry(guess.ll.lat,guess.ll.lng,wc) : (dist<=rad));
    // right cultural REGION (continent) earns a solid partial even if the country/borders are off — many
    // cultures (Kongo, etc.) span or predate modern borders. Never score below the plain distance falloff.
    inCont = !inC && continentOf(guess.ll.lat,guess.ll.lng)===it.region;
    const distPts=Math.round(MAX_CAT*Math.exp(-(Math.max(0,dist-rad))/D.distK));
    sp = inC ? MAX_CAT : Math.max(inCont?Math.round(MAX_CAT*0.5):0, distPts);}
  cells.where={pts:sp, dist, you:guess.ll?"your pin":"no pin", actual:it.place,
    note:dist==null?"no pin dropped":inReg?"right area":inC?"right country":inCont?"right region":`${Math.round(dist)} km off`};
  }
  // medium: exact beats same-family, and same-family is intentionally a fixed 50%.
  // Because medSimple is computed from the raw catalogue string at index time, stale
  // generated cats cannot make a missing medium scorable.
  if(asked('medium')){let s=0,note="no answer";
    if(guess.medium){ if(guess.medium===it.medSimple){s=MAX_CAT;note="exact";}
      else if(MED_FAMILY[guess.medium]&&MED_FAMILY[guess.medium]===MED_FAMILY[it.medSimple]){s=Math.round(MAX_CAT*0.5);note="same family";}
      else note="wrong";}
    cells.medium={pts:s,you:guess.medium||"—",actual:it.medSimple,note};}
  // style/culture: exact is always 2500. Similarity is capped by DIFF.relMov, so a
  // near-miss can be useful feedback but cannot exceed or equal an exact answer.
  if(asked('style')){let s=0,note="no answer";
    if(guess.style){ if(guess.style===it.style){s=MAX_CAT;note="exact";}
      else { // graded: curated neighbors keep full tier credit; taxonomy-similar movements get partial
        const sim=(RELATED_MOV[it.style]||[]).includes(guess.style)?1:movementSim(guess.style,it.style);
        if(sim>0){ s=Math.round(MAX_CAT*D.relMov*sim); note=sim>=0.999?"related":"similar"; } else note="wrong"; } }
    cells.style={pts:s,you:guess.style||"—",actual:it.style,note};}
  // artist (bonus): exact typed credit uses forgiving name matching; partial credit
  // is deliberately conservative and pool-derived (same school > same era > region).
  if(asked('artist')){let s=0,note="no answer";const ga=norm(guess.artist);
    if(ga){ if(artistMatch(guess.artist,it.artist)){s=MAX_CAT;note="matched";}
      else { let f=0; const am=artistMeta[ga];
        if(artistStyle[ga]&&it.style&&artistStyle[ga].has(norm(it.style))){f=Math.max(f,0.45);note="same school";}
        if(am){ if(it.y!=null&&am.lo<=it.y+30&&am.hi>=it.y-30&&f<0.45){f=Math.max(f,0.25);note="same era";}
          if(it.region&&am.regions.has(it.region)&&f<0.25){f=Math.max(f,0.15);note="same region";} }
        if(f>0){ s=Math.round(MAX_CAT*f); } else note="not matched"; } }
    cells.artist={pts:s,bonus:true,you:guess.artist||"—",actual:it.artist,note};}
  // totals — only the categories actually asked this round count toward the score
  const coreCats=ACT.filter(c=>c!=='artist');
  const baseMax=coreCats.length*MAX_CAT;
  const core=coreCats.reduce((a,c)=>a+cells[c].pts,0);
  const bonus=cells.artist?cells.artist.pts:0;
  const hintPen=guess.hints.size*HINT_COST;
  const coreNet=Math.max(0,core-hintPen);
  // mastery — only the genuine daily play counts (not infinite grind or archive replay)
  // Your Eye (persisted mastery) reflects daily AND infinite play; training (TRAIN set) is self-chosen so it
  // stays ephemeral, and archive replays don't count. Streak/points/leaderboard remain daily-only (handled elsewhere).
  if(!TRAIN&&!runArchive){
    if(it.cats.includes('style')) bumpMastery(it.style,'byStyle',cells.style.pts===MAX_CAT);
    bumpMastery(it.region,'byRegion',cells.where.pts>=MAX_CAT*0.75);
    bumpMastery('when','byCategory',cells.when.pts>=MAX_CAT*0.75);
    bumpMastery('where','byCategory',cells.where.pts>=MAX_CAT*0.75);
    if(it.cats.includes('style')) bumpMastery('style','byCategory',cells.style.pts===MAX_CAT);
    if(it.y!=null) bumpMastery(String(centuryOf(it.y)),'byCentury',cells.when.pts>=MAX_CAT*0.75);
  }
  results.push({it,cells,coreCats,baseMax,coreNet,bonus,hintPen,hints:guess.hints.size,guess:{...guess}});
  renderReveal(results[results.length-1]);
}

function studyFor(it){
  const w=CUES.work&&CUES.work[it.id]; if(w&&w.why) return w; // per-work note (Codex-generated)
  return (it.styleKind==='movement'&&CUES.style[it.style]) || (it.styleKind==='culture'&&CUES.culture[it.style])
    || CUES.region[it.region] || {why:`Made in ${it.place||it.region}, c. ${fmtYear(it.y)}.`,cues:[]};
}
function swatchColor(f){return f>=.75?'var(--full)':f>=.35?'var(--partial)':'var(--miss)';}
function swatchGlyph(f){return f>=.75?'✓':f>=.35?'◐':'✕';}
function swatchBox(f,cls='sq'){return `<span class="${cls}" style="background:${swatchColor(f)}"><span class="swglyph">${swatchGlyph(f)}</span></span>`;}

function setupReportFlow(it,study){
  const root=document.getElementById('studyReport');if(!root)return;

  const renderDefault=()=>{root.className='studyfoot';root.innerHTML=`<span>Study notes are AI-generated &amp; fact-checked. Spot something off? </span><button type="button" class="reportopen">Report an error</button>`;root.querySelector('.reportopen').onclick=renderForm;};
  const renderForm=()=>{root.className='studyfoot reportform';root.innerHTML=`<div class="kick">Report an error</div><div class="reportchips">${reasons.map(r=>`<button type="button" class="reportchip ${r===reason?'sel':''}" data-reason="${esc(r)}">${esc(r)}</button>`).join('')}</div><input type="text" id="reportDetail" maxlength="180" placeholder="Add a detail (optional)..." autocomplete="off"><div class="reportactions"><button type="button" class="btn" id="sendReport">Send report</button><button type="button" class="btn2" id="cancelReport">Cancel</button></div>`;
    root.querySelectorAll('.reportchip').forEach(ch=>ch.onclick=()=>{reason=ch.dataset.reason;root.querySelectorAll('.reportchip').forEach(x=>x.classList.toggle('sel',x===ch));});
    root.querySelector('#cancelReport').onclick=renderDefault;
    root.querySelector('#sendReport').onclick=()=>{const detail=(root.querySelector('#reportDetail').value||'').trim(),payload={workId:it.id,movement:it.style||'',reason,detail,note:study.why||'',date:new Date().toISOString()};
      // send to the backend so reports actually reach a curator; keep a local copy as backup
      try{fetch('/api/report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(()=>{});}catch{}
      let arr=[];try{arr=JSON.parse(localStorage.getItem('gesso.reports'))||[];}catch{}arr.push(payload);try{localStorage.setItem('gesso.reports',JSON.stringify(arr));}catch{}root.className='studyfoot';root.innerHTML=`<div class="reportthanks"><i>✓</i><span>Thanks — flagged for a curator to review.</span></div>`;};
  };
  renderDefault();
}
function paintBurst(host){
  if(!host||(typeof settings!=='undefined'&&settings.reduceMotion))return;

function countUps(){document.querySelectorAll('[data-cu]').forEach(el=>{const target=+el.getAttribute('data-cu'),prefix=el.getAttribute('data-prefix')||'';

// ---------- zoom lightbox ----------
// sharper image for the on-screen display (not the deep-zoom): Met web-large is only ~620px → use
// original (also pre-warms the zoom cache); AIC/V&A IIIF 843px → 1200px. Others already adequate.
// CARD = a light ~1000–1200px image for every source (fast + reliable on slow networks); the bigger
// image is fetched ONLY when the zoom view opens (hiRes). Never pull a full-res original onto the card.
// IIIF size rewrite: the size segment sits between /full/ and the rotation, e.g. .../full/843,/0/default.jpg.
// Handles width-only, height-only, !w,h, pct:, full and max forms → a target width. No-op for non-IIIF URLs,
// so adding a new IIIF source won't silently skip card/zoom sizing. (Current sources all use the "N," form.)
const IIIF_RE=/\/full\/(?:\d+,|,\d+|!\d+,\d+|pct:\d+(?:\.\d+)?|max|full)\/(\d+)\/(default|native|color|gray|bitonal)/;
function rewriteIiif(src,w){ return src.replace(IIIF_RE, `/full/${w},/$1/$2`); }
function displaySrc(src){
  if(src.includes("images.metmuseum.org")) return src;                                   // Met: keep web-large (~600), not original
  if(IIIF_RE.test(src)) return rewriteIiif(src,1200);                                     // IIIF: Harvard / V&A / AIC-direct → 1200px card
  if(src.includes("commons.wikimedia.org")) return /[?&]width=\d+/.test(src)?src.replace(/width=\d+/,"width=1000"):src+(src.includes("?")?"&":"?")+"width=1000"; // guard against full-res Commons cards
  return src;                                                                            // Cleveland _web, LoC tile, Smithsonian, Blob — already card-sized
}
// ZOOM = source max, loaded on demand when the lightbox opens.
function hiRes(src){
  if(src.includes("images.metmuseum.org")) return src.replace("/web-large/","/original/"); // Met: ~600 → full original
  if(IIIF_RE.test(src)) return rewriteIiif(src,2000);                                       // IIIF: → 2000px zoom
  if(src.includes("clevelandart.org")) return src.replace("_web.jpg","_print.jpg");          // Cleveland: → ~3400px
  if(src.includes("commons.wikimedia.org")) return /[?&]width=\d+/.test(src)?src.replace(/width=\d+/,"width=2400"):src+(src.includes("?")?"&":"?")+"width=2400"; // Commons larger render
  return src;                                                                              // LoC, Smithsonian, Blob — single fixed size
}
function openZoom(src){
  const lb=document.createElement('div');lb.className='lightbox';
  const img=document.createElement('img');img.src=hiRes(src);img.draggable=false;img.style.touchAction='none';
  let scale=1,tx=0,ty=0; const MAX=6;
  const apply=()=>{img.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;img.style.cursor=scale>1?'grab':'zoom-in';};
  const pts=new Map(); let moved=false,pinchD=0,pinchS=1,mid=null,downX=0,downY=0;
  const D=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y), M=(a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2});
  img.addEventListener('pointerdown',e=>{ try{img.setPointerCapture(e.pointerId);}catch{} pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    moved=false;downX=e.clientX;downY=e.clientY;
    if(pts.size===2){const a=[...pts.values()];pinchD=D(a[0],a[1]);pinchS=scale;mid=M(a[0],a[1]);} e.preventDefault(); });
  img.addEventListener('pointermove',e=>{ const prev=pts.get(e.pointerId); if(!prev)return; pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===2){const a=[...pts.values()];const d=D(a[0],a[1]);if(pinchD){scale=Math.min(MAX,Math.max(1,pinchS*d/pinchD));}const m=M(a[0],a[1]);tx+=m.x-mid.x;ty+=m.y-mid.y;mid=m;moved=true;apply();}
    else{if(Math.abs(e.clientX-downX)+Math.abs(e.clientY-downY)>8)moved=true;if(scale>1){tx+=e.clientX-prev.x;ty+=e.clientY-prev.y;apply();}} });
  const endP=e=>{const wasTap=!moved&&pts.size===1;pts.delete(e.pointerId);if(pts.size<2)pinchD=0;
    if(wasTap){if(scale>1){scale=1;tx=0;ty=0;}else{scale=2.5;}apply();}};
  img.addEventListener('pointerup',endP); img.addEventListener('pointercancel',e=>pts.delete(e.pointerId));
  img.addEventListener('wheel',e=>{e.preventDefault();scale=Math.min(MAX,Math.max(1,scale-Math.sign(e.deltaY)*0.3));if(scale<=1){scale=1;tx=0;ty=0;}apply();},{passive:false});
  const close=()=>{lb.remove();document.removeEventListener('keydown',esc2);};
  const esc2=e=>{if(e.key==='Escape')close();};document.addEventListener('keydown',esc2);
  // backdrop closes ONLY on a clean tap (never after a pan); image taps are handled above
  lb.addEventListener('pointerdown',e=>{if(e.target===lb)moved=false;});
  lb.addEventListener('pointerup',e=>{if(e.target===lb&&!moved)close();});
  const x=document.createElement('button');x.className='lb-close';x.textContent='✕';x.onclick=e=>{e.stopPropagation();close();};
  const hint=document.createElement('div');hint.className='lb-hint';hint.textContent='Tap/click to zoom · drag to pan · pinch or scroll to zoom · Esc to close';
  lb.append(img,x,hint);document.body.appendChild(lb);apply();
}

// swapped to a downsized proxy fallback. Falls back to src for imgs without data-zoom.
document.addEventListener('click',e=>{if(e.target.classList&&e.target.classList.contains('art'))openZoom(e.target.dataset.zoom||e.target.src);});
