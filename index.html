<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gesso — the daily art-guessing game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%232230b8' d='M8 34C8 17 21 6 37 10c14 4 23 18 17 32-5 13-22 18-35 11C11 49 7 42 8 34Z'/%3E%3Ccircle cx='25' cy='25' r='7' fill='%23f6f4ee' fill-opacity='.82'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23f6f4ee'/%3E%3Cpath fill='%232230b8' d='M22 95C22 48 59 18 105 30c39 10 65 51 47 89-15 36-62 51-99 31-22-12-34-33-31-55Z'/%3E%3Ccircle cx='72' cy='70' r='18' fill='%23f6f4ee' fill-opacity='.82'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#e9e7e0; --surface:#f6f4ee; --surface-strong:#edeae0; --ink:#1b1916; --muted:#8a8472;
    --faint:#a39d8c; --ink-soft:#3a362d; --line:#e3ded1; --line-card:#ddd8ca; --accent:#2230b8;
    --accent-underline:#b0b5e0; --study-bg:#eceffb; --study-border:#d3d8ef;
    --full:#2f8f5b; --partial:#cf9f3a; --miss:#c14b3a; --track:#dcd6c6;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface);color:var(--ink);font-family:'Archivo',sans-serif;
    -webkit-font-smoothing:antialiased;min-height:100vh}
  .leaflet-container{background:#dfe2e8;font-family:inherit}
  .leaflet-control-attribution{display:none}
  .mono{font-family:'IBM Plex Mono',monospace}
  .wrap{width:100%}
  .card{background:var(--surface)}
  .sheet{max-width:1080px;margin:0 auto;background:var(--surface);
    border-left:1px solid var(--line);border-right:1px solid var(--line);min-height:calc(100vh - 55px);padding-bottom:40px}
  /* header */
  .hd{position:sticky;top:0;z-index:600;border-bottom:1.5px solid var(--ink);background:var(--surface-strong)}
  .hdinner{max-width:1080px;margin:0 auto;padding:15px 24px;display:flex;align-items:center;justify-content:space-between}
  .hd .brand{display:flex;align-items:baseline;gap:13px}
  .wordmark{font:700 19px 'Archivo',sans-serif;letter-spacing:-.01em;color:var(--accent);text-transform:lowercase;cursor:pointer}
  .accn{font:500 11px 'IBM Plex Mono',monospace;color:var(--muted)}
  .hd .right{display:flex;align-items:center;gap:18px}
  .pips{display:flex;gap:5px}
  .pip{width:22px;height:5px;border-radius:2px;background:var(--line-card)}
  .pip.done{background:var(--accent)} .pip.cur{background:var(--ink)}
  .stamp{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--accent);
    border:1.5px solid var(--accent);padding:4px 10px;border-radius:3px;transform:rotate(-2deg);display:inline-block;text-transform:uppercase}
  /* generic */
  .kick{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);white-space:nowrap}
  .banner .mono{white-space:nowrap}
  .cicon{display:inline-flex;width:16px;height:16px;vertical-align:-3px;margin-right:6px}
  .cicon svg{width:16px;height:16px}
  .fieldlabel{display:flex;align-items:center;gap:8px;margin-bottom:11px}
  .fieldlabel .ix{font:600 10px 'IBM Plex Mono',monospace;color:var(--accent);letter-spacing:.1em}
  .fieldlabel .nm{font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);white-space:nowrap}
  .fieldlabel .rule{flex:1;height:1px;background:var(--line)}
  .fieldlabel .hintrule{font:10px 'IBM Plex Mono',monospace;color:var(--faint)}
  .plate{position:relative;background:#fff;border:1px solid var(--line);border-radius:3px;padding:10px;box-shadow:0 10px 26px rgba(35,32,26,.1)}
  .plate img{display:block;width:100%;border-radius:1px;cursor:zoom-in}
  .cap{display:flex;justify-content:space-between;margin-top:10px;font:500 11px 'IBM Plex Mono',monospace;color:var(--muted)}
  .btn{width:100%;padding:15px;border:none;border-radius:5px;background:var(--accent);color:#fff;
    font:700 12px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;cursor:pointer}
  .btn:hover{filter:brightness(1.08)}
  .btn2{background:transparent;border:1.5px solid var(--accent);color:var(--accent);
    font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;padding:9px 15px;border-radius:4px;cursor:pointer}
  .btn2:disabled{opacity:.4;cursor:default}
  .attrib{text-align:center;margin-top:15px;font:11px 'IBM Plex Mono',monospace;color:var(--faint)}
  .attrib a{color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent-underline)}
  .year{font:700 27px 'Archivo',sans-serif;letter-spacing:-.01em}
  .eratag{font:500 12px 'IBM Plex Mono',monospace;color:var(--muted);white-space:nowrap}
  input[type=range]{width:100%;accent-color:var(--accent);background:var(--track);cursor:pointer;
    -webkit-appearance:none;appearance:none;height:4px;border-radius:3px;outline:none}
  .minmax{display:flex;justify-content:space-between;margin-top:6px;font:10px 'IBM Plex Mono',monospace;color:var(--faint);white-space:nowrap}
  .pills{display:flex;flex-wrap:wrap;gap:7px}
  .pill{background:#fff;color:var(--ink);border:1px solid var(--line-card);padding:8px 13px;border-radius:4px;
    cursor:pointer;font:500 12px 'IBM Plex Mono',monospace;white-space:nowrap}
  .pill.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
  .pill.ruledout{opacity:.3;text-decoration:line-through;pointer-events:none}
  input[type=text]{width:100%;padding:11px 13px;background:#fff;border:1px solid var(--line-card);
    border-radius:4px;color:var(--ink);font:13px 'IBM Plex Mono',monospace;outline:none}
  input[type=text]:focus{border-color:var(--accent)}
  .ac{position:relative}
  .ac-list{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:1000;background:#fff;
    border:1px solid var(--line-card);border-radius:4px;overflow:hidden}
  .ac-item{padding:9px 13px;color:var(--ink);font:12px 'IBM Plex Mono',monospace;cursor:pointer;border-top:1px solid #eee9dc}
  .ac-item:first-child{border-top:none}
  .ac-item.active,.ac-item:hover{background:var(--accent);color:#fff}
  .hinttext{animation:afFade .3s ease;margin-top:11px;font:13px/1.5 'IBM Plex Mono',monospace;
    color:#6f6a5b;border-left:2px solid var(--accent);padding-left:13px}
  .hinttext div{padding:2px 0}
  .hintbox{margin-top:16px;border:1px solid var(--line-card);border-radius:8px;padding:13px 14px;background:#fdfcf9}
  .hinthd{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:11px;flex-wrap:wrap}
  .hinthl{font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
  .hintmeta{font:500 10px 'IBM Plex Mono',monospace;letter-spacing:.04em;color:var(--faint);white-space:nowrap}
  .hintchips{display:flex;flex-wrap:wrap;gap:7px}
  .hintchip{display:inline-flex;align-items:center;gap:7px;background:transparent;border:1.5px solid var(--accent);color:var(--accent);font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.04em;text-transform:uppercase;padding:7px 11px;border-radius:4px;cursor:pointer}
  .hintchip .cost{font:500 10px 'IBM Plex Mono',monospace;letter-spacing:0;opacity:.6}
  .hintchip:hover{background:var(--accent);color:#fff}
  .hintchip.used{border-color:var(--line-card);color:var(--faint);background:#f1eee7;cursor:default}
  .hintchip.used .cost{display:none}
  .hintchip.used::before{content:"\2713";font-weight:700;margin-right:1px}
  .hintchip:disabled:not(.used){opacity:.34;cursor:default}
  .hintchip:disabled:not(.used):hover{background:transparent;color:var(--accent)}
  .hintlabel{display:inline-block;font:700 10px 'IBM Plex Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-right:7px}
  /* reveal */
  .banner{padding:22px 24px;background:linear-gradient(180deg,#eceffb,#f6f4ee);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .big{font:800 42px 'Archivo',sans-serif;letter-spacing:-.02em}
  .swatchrow{display:flex;gap:11px}
  .swatch{text-align:center}
  .swatch .sq{width:36px;height:36px;border-radius:8px}
  .swatch .lb{font:600 8px 'IBM Plex Mono',monospace;letter-spacing:.05em;color:var(--faint);margin-top:5px}
  .revealgrid{padding:24px;display:grid;grid-template-columns:.92fr 1.08fr;gap:26px;border-bottom:1px solid var(--line)}
  .filed{position:absolute;top:18px;right:18px;font:700 9px 'IBM Plex Mono',monospace;letter-spacing:.1em;
    color:#fff;background:var(--accent);padding:5px 9px;border-radius:3px;transform:rotate(4deg)}
  .worktitle{font:700 19px/1.15 'Archivo',sans-serif;letter-spacing:-.01em;margin-top:14px}
  .metarow{display:flex;gap:10px}
  .metarow .k{flex:0 0 62px;font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.08em;color:var(--accent)}
  .metarow .v{font:13px 'IBM Plex Mono',monospace;color:var(--ink)}
  .telllink{display:inline-block;margin-top:16px;font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.07em;
    text-transform:uppercase;color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent-underline);padding-bottom:2px}
  .scrow{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
  .scrow:last-child{border-bottom:none}
  .scrow .sq{width:24px;height:24px;border-radius:5px;flex:0 0 auto}
  .scrow .mid{flex:1;min-width:0}
  .scrow .t1{font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--ink)}
  .scrow .t2{font:11px 'IBM Plex Mono',monospace;color:var(--muted);margin-top:2px}
  .scrow .pts{text-align:right;flex:0 0 auto;white-space:nowrap}
  .scrow .pts .n{font:700 17px 'Archivo',sans-serif;color:var(--ink)}
  .scrow .pts .d{font:9px 'IBM Plex Mono',monospace;color:var(--faint)}
  .study{margin:24px;background:var(--study-bg);border:1px solid var(--study-border);border-radius:8px;padding:22px}
  .study .why{font:500 18px/1.42 'Archivo',sans-serif;color:var(--ink);max-width:600px;margin:13px 0 20px}
  .studyfoot{border-top:1px solid var(--study-border);padding-top:11px;margin-top:14px;font:500 10.5px/1.5 'IBM Plex Mono',monospace;color:var(--muted)}
  .studyfoot .reportopen{appearance:none;border:0;background:transparent;color:var(--accent);font:600 10.5px 'IBM Plex Mono',monospace;text-decoration:underline;text-decoration-color:var(--accent-underline);text-underline-offset:3px;padding:0;cursor:pointer}
  .reportform .kick{margin-bottom:11px}
  .reportchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px}
  .reportchip{background:#fff;color:var(--ink);border:1px solid #cdd2e8;border-radius:4px;padding:6px 10px;font:600 11px 'IBM Plex Mono',monospace;cursor:pointer}
  .reportchip.sel{background:var(--accent);border-color:var(--accent);color:#fff}
  .reportform input{font-size:12px;margin-bottom:11px}
  .reportactions{display:flex;gap:8px}
  .reportactions .btn{flex:1;padding:10px;font-size:11px;letter-spacing:.08em}
  .reportactions .btn2{border-color:#cdd2e8;color:var(--muted);padding:10px 14px}
  .reportthanks{display:flex;align-items:center;gap:8px;color:var(--full);font:600 11px 'IBM Plex Mono',monospace}
  .reportthanks i{width:16px;height:16px;border-radius:50%;background:var(--full);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-style:normal;font-size:10px}
  .cue{display:flex;gap:12px;align-items:flex-start;padding:7px 0}
  .cue .num{flex:0 0 16px;font:700 13px 'Archivo',sans-serif;color:var(--accent)}
  .cue .tx{font:13px/1.55 'IBM Plex Mono',monospace;color:var(--ink-soft)}
  .mastery{margin-top:20px;padding-top:16px;border-top:1px solid var(--study-border);
    display:flex;align-items:center;gap:13px;flex-wrap:wrap;font:12px 'IBM Plex Mono',monospace;color:var(--ink)}
  .weak{color:var(--miss)}
  /* start */
  .hero{padding:38px 24px 14px;text-align:center}
  .herokick{display:flex;align-items:center;justify-content:center;gap:12px;font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:18px}
  .herokick .r{width:26px;height:1px;background:var(--accent);opacity:.4}
  .herobig{font:800 56px 'Archivo',sans-serif;letter-spacing:-.025em;line-height:1.06;color:var(--ink)}
  .herobig em{font-style:normal;color:var(--accent)}
  .heroglos{font:500 12px 'IBM Plex Mono',monospace;color:var(--faint);margin-top:15px;letter-spacing:.01em;max-width:520px;margin-left:auto;margin-right:auto}
  .herometa{font:600 10px 'IBM Plex Mono',monospace;color:var(--muted);margin-top:8px;letter-spacing:.16em;text-transform:uppercase}
  .difs{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:18px 24px}
  .dif{text-align:left;background:var(--surface);border:1px solid var(--line-card);border-radius:8px;padding:18px;cursor:pointer;transition:.12s;font-family:inherit}
  .dif:hover{border-color:var(--accent);transform:translateY(-2px)}
  .dif .tier{font:600 10px 'IBM Plex Mono',monospace;color:var(--accent);letter-spacing:.1em}
  .dif .nm{font:700 20px 'Archivo',sans-serif;margin:5px 0 4px}
  .dif .bl{font:12px 'IBM Plex Mono',monospace;color:var(--muted)}
  .dif .ct{font:11px 'IBM Plex Mono',monospace;color:var(--accent);margin-top:9px}
  .collnote{margin:4px 24px 24px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px 18px}
  .collnote .h{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .collnote p{margin:0;font:12px/1.6 'IBM Plex Mono',monospace;color:var(--ink-soft)}
  .bars{display:flex;height:8px;border-radius:3px;overflow:hidden;margin:10px 0 8px}
  .bars span{display:block}
  .barkey{display:flex;flex-wrap:wrap;gap:10px;font:10px 'IBM Plex Mono',monospace;color:var(--muted)}
  .barkey i{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
  /* results */
  .matrix{padding:6px 24px 4px;overflow-x:auto}
  .matrix table{border-collapse:collapse;width:100%}
  .matrix th{font:600 9px 'IBM Plex Mono',monospace;letter-spacing:.08em;color:var(--faint);padding:6px 4px;text-transform:uppercase}
  .matrix td{padding:4px}
  .matrix .rl{font:11px 'IBM Plex Mono',monospace;color:var(--muted);text-align:left;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sq,.msq{position:relative;display:inline-flex;align-items:center;justify-content:center}
  .swglyph{display:none;color:#fff;font:800 15px/1 'Archivo',sans-serif;text-shadow:0 1px 2px rgba(0,0,0,.25);pointer-events:none}
  .swatch .swglyph{font-size:20px}.scrow .swglyph,.msq .swglyph{font-size:13px}
  body.colorblind .swglyph{display:block}
  .msq{width:26px;height:26px;border-radius:5px;margin:0 auto}
  .sharebox{font-family:'IBM Plex Mono',monospace;background:#fff;border:1px solid var(--line-card);
    border-radius:6px;padding:14px;white-space:pre;line-height:1.5;font-size:14px;overflow-x:auto}
  /* retention */
  .navbits{display:flex;align-items:center;gap:8px;font:600 11px 'IBM Plex Mono',monospace;color:var(--muted)}
  .navbtn{appearance:none;border:0;background:transparent;color:var(--accent);font:700 11px 'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;padding:5px 3px;cursor:pointer}
  .navbtn:hover{text-decoration:underline;text-decoration-color:var(--accent-underline);text-underline-offset:3px}
  .emblem{display:grid;gap:2px;grid-template-columns:repeat(2,var(--em));grid-template-rows:repeat(2,var(--em));flex:0 0 auto}
  .emblem i{display:block;border-radius:2px}
  .glossnav{appearance:none;border:0;background:transparent;padding:4px;cursor:pointer;display:inline-flex;align-items:center}
  .glossnav:hover{transform:translateY(-1px)}
  .gearbtn{appearance:none;border:0;background:transparent;color:var(--accent);font:700 16px/1 'Archivo',sans-serif;padding:4px 3px;cursor:pointer}
  .gearbtn:hover{transform:translateY(-1px)}
  .settingsveil{position:fixed;inset:0;z-index:4500;background:rgba(27,25,22,.32);display:flex;align-items:center;justify-content:center;padding:18px}
  .settingspanel{width:440px;max-width:100%;background:var(--surface);border:1px solid var(--line-card);border-radius:12px;overflow:hidden;box-shadow:0 14px 36px rgba(35,32,26,.16)}
  .settingshead{display:flex;align-items:center;justify-content:space-between;padding:15px 22px;border-bottom:1.5px solid var(--ink);background:var(--surface-strong)}
  .settingshead .ttl{font:700 16px 'Archivo',sans-serif}
  .settingsclose{appearance:none;border:0;background:transparent;color:var(--muted);font:700 22px/1 'Archivo',sans-serif;cursor:pointer}
  .settingsbody{padding:8px 22px}
  .setrow{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:16px 0;border-bottom:1px solid var(--line)}
  .setrow:last-child{border-bottom:0}
  .setrow .name{font:600 14px 'Archivo',sans-serif}.setrow .hint{font:500 11px 'IBM Plex Mono',monospace;color:var(--muted);margin-top:2px}
  .setrow.disabled .name,.setrow.disabled .hint{color:var(--faint)}
  .toggle{appearance:none;border:0;width:42px;height:24px;border-radius:13px;background:#cfc8b8;position:relative;cursor:pointer;flex:0 0 auto;padding:0}
  .toggle::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s}
  .toggle[aria-pressed="true"]{background:var(--accent)}
  .toggle[aria-pressed="true"]::after{left:21px}
  .soonchip{font:600 9px 'IBM Plex Mono',monospace;letter-spacing:.1em;color:var(--faint);border:1px solid var(--line-card);border-radius:4px;padding:4px 8px}
  .settingsfoot{padding:0 22px 20px;font:500 10.5px/1.5 'IBM Plex Mono',monospace;color:var(--faint)}
  .glosswrap{padding:24px}
  .glosshead{background:var(--surface-strong);border-bottom:1.5px solid var(--ink);padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:18px}
  .glosstitle{display:flex;align-items:center;gap:10px;font:700 16px 'Archivo',sans-serif}
  .glossmeta{font:600 11px 'IBM Plex Mono',monospace;color:var(--muted);white-space:nowrap}
  .glossbar{height:6px;border-radius:3px;background:var(--line);overflow:hidden}
  .glossbar span{display:block;height:100%;background:var(--accent)}
  .glossgrid{padding:16px 22px 22px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .glosscard{text-align:left;background:#fff;border:1px solid var(--line);border-radius:8px;padding:15px;font-family:inherit;min-height:112px}
  button.glosscard{cursor:pointer}
  button.glosscard:hover{border-color:var(--accent);transform:translateY(-1px)}
  .glosscard.locked{background:#efece4;border:1px dashed #c7c0ae;opacity:.88}
  .glosscard .nm{font:700 14px/1.15 'Archivo',sans-serif;margin-top:11px;color:var(--ink)}
  .glosscard.locked .nm{color:#b3ac9a}
  .glosscard .sub{font:500 10px/1.35 'IBM Plex Mono',monospace;color:var(--muted);margin-top:4px}
  .glosscard.locked .sub{color:#bcb4a2}
  .moveback{appearance:none;border:0;background:transparent;color:var(--accent);font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;padding:0}
  .movehero{padding:24px;display:flex;align-items:center;gap:20px;border-bottom:1px solid var(--line)}
  .movename{font:800 26px/1.05 'Archivo',sans-serif;letter-spacing:-.01em}
  .movesub{margin-top:6px;font:500 12px/1.35 'IBM Plex Mono',monospace;color:var(--muted)}
  .canonical{margin-top:14px;background:#fff;border:1px solid var(--line-card);border-radius:8px;overflow:hidden}
  .canonical img{display:block;width:100%;max-height:280px;object-fit:contain;background:#efece4}
  .canonical .cap{padding:11px 13px;margin:0;font:500 11px 'IBM Plex Mono',monospace;color:var(--muted)}
  .glossadded{margin-top:16px;padding-top:13px;border-top:1px solid var(--study-border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .glossadded .ok{display:flex;align-items:center;gap:8px;font:600 11px 'IBM Plex Mono',monospace;color:var(--full)}
  .glossadded button{appearance:none;border:0;background:transparent;color:var(--accent);font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.04em;cursor:pointer;border-bottom:1px solid var(--accent-underline);padding:0 0 2px}
  .retwrap{padding:24px}

<div class="wrap"><div id="stage"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
"use strict";
const MAX_CAT=2500, ROUNDS=5, HINT_COST=500, HINT_LIMIT=3;
const CUES = window.ARTEFACTUM_CUES || {style:{},culture:{},region:{},medium:{}};
// difficulty tunes scoring leniency + how confusable the distractors are
const DIFF={
  easy:      {distK:4500, relMov:0.70, timeMult:1.6, look:'far'},
  medium:    {distK:2500, relMov:0.50, timeMult:1.1, look:'mix'},
  hard:      {distK:1500, relMov:0.35, timeMult:0.9, look:'near'},
  impossible:{distK:1000, relMov:0.25, timeMult:0.75, look:'near'},
};
const dcfg=()=>DIFF[tier]||DIFF.medium;

// ---------- helpers ----------
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickN(a,n){return shuffle(a).slice(0,n);}
function fill3(ans,picks,fromAll){let p=[...new Set(picks)].filter(x=>x&&x!==ans);
  const rest=shuffle(fromAll.filter(x=>x!==ans&&!p.includes(x)));
  while(p.length<3&&rest.length)p.push(rest.shift());
  return shuffle([ans,...p.slice(0,3)]);}
// medium choices: easy = different families (obvious); hard = same family (lookalikes)
function mediumChoices(ans){const look=dcfg().look;
  const same=ALL_MED.filter(m=>m!==ans&&MED_FAMILY[m]&&MED_FAMILY[m]===MED_FAMILY[ans]);
  const diff=ALL_MED.filter(m=>m!==ans&&MED_FAMILY[m]!==MED_FAMILY[ans]);
  let picks; if(look==='far')picks=pickN(diff,3); else if(look==='near')picks=[...pickN(same,3),...pickN(diff,3)].slice(0,3); else picks=[...pickN(same,1),...pickN(diff,2)];
  return fill3(ans,picks,ALL_MED);}
// style choices: themed to the answer's own region/kind (so European works show European movements,
// Asian works show Asian schools); hard pulls confusable related/same-region neighbours
function styleChoices(it){const look=dcfg().look, ans=it.style, pool=it.styleKind==='culture'?CULTS:MOVS;
  const sameReg=pool.filter(s=>s!==ans&&styleRegion[s]===it.region);
  const related=(RELATED_MOV[ans]||[]).filter(s=>pool.includes(s));
  let picks; if(look==='far')picks=pickN(pool.filter(s=>s!==ans),3);
  else if(look==='near')picks=[...pickN(related,2),...pickN(sameReg,3)].slice(0,3);
  else picks=[...pickN(related,1),...pickN(sameReg.length?sameReg:pool,2)];
  return fill3(ans,picks,pool);}
function km(a,b,c,d){const R=6371,r=Math.PI/180,dl=(c-a)*r,dn=(d-b)*r,h=Math.sin(dl/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dn/2)**2;return 2*R*Math.asin(Math.sqrt(h));}
function fmtYear(y){return y<0?`${-y} BCE`:`${y} CE`;}
const motionQuery=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)');
let settings=loadSettings();
function loadSettings(){try{const s=JSON.parse(localStorage.getItem("gesso.settings"))||{};return {reduceMotion:typeof s.reduceMotion==='boolean'?s.reduceMotion:!!(motionQuery&&motionQuery.matches),colorblind:!!s.colorblind};}catch{return{reduceMotion:!!(motionQuery&&motionQuery.matches),colorblind:false};}}
function saveSettings(){try{localStorage.setItem("gesso.settings",JSON.stringify({reduceMotion:!!settings.reduceMotion,colorblind:!!settings.colorblind}));}catch{}}
function applySettings(){document.body.classList.toggle('reduce-motion',!!settings.reduceMotion);document.body.classList.toggle('motion-ok',!settings.reduceMotion);document.body.classList.toggle('colorblind',!!settings.colorblind);const sh=document.getElementById('share');if(sh&&results.length){const fresh=resultSummary().share;sh.textContent=fresh;if(lastFinal)lastFinal.share=fresh;}}
function prefersReducedChanged(e){try{const stored=JSON.parse(localStorage.getItem("gesso.settings"))||{};if(typeof stored.reduceMotion!=='boolean'){settings.reduceMotion=!!e.matches;applySettings();}}catch{}}
if(motionQuery&&motionQuery.addEventListener)motionQuery.addEventListener('change',prefersReducedChanged);
function openSettings(){
  const veil=document.createElement('div');veil.className='settingsveil';veil.innerHTML=`<div class="settingspanel" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="settingshead"><span class="ttl">Settings</span><button type="button" class="settingsclose" aria-label="Close settings">&times;</button></div>
    <div class="settingsbody">
      <div class="setrow"><div><div class="name">Reduce motion</div><div class="hint">Auto-follows your system &middot; override here</div></div><button type="button" class="toggle" data-set="reduceMotion" aria-pressed="${settings.reduceMotion?'true':'false'}" aria-label="Reduce motion"></button></div>
      <div class="setrow"><div><div class="name">Colorblind mode</div><div class="hint">Adds ✓ ◐ ✕ to result swatches</div></div><button type="button" class="toggle" data-set="colorblind" aria-pressed="${settings.colorblind?'true':'false'}" aria-label="Colorblind mode"></button></div>
      <div class="setrow disabled"><div><div class="name">Hard mode</div><div class="hint">Tighter scoring, no 50/50 hint &middot; soon</div></div><span class="soonchip">SOON</span></div>
    </div><div class="settingsfoot">Preferences save to this browser.</div></div>`;
  const close=()=>{veil.remove();document.removeEventListener('keydown',escClose);};
  const escClose=e=>{if(e.key==='Escape')close();};
  veil.addEventListener('click',e=>{if(e.target===veil||e.target.closest('.settingsclose'))close();const t=e.target.closest('[data-set]');if(t){settings[t.dataset.set]=!settings[t.dataset.set];t.setAttribute('aria-pressed',settings[t.dataset.set]?'true':'false');saveSettings();applySettings();}});
  document.addEventListener('keydown',escClose);document.body.appendChild(veil);
}
// non-linear timeline: most works are post-1400, so give recent centuries more of the track
let MINY=-2500; const BREAKY=1400, BREAKP=350, MAXY=2025, MAXP=1000;
function posToYear(p){p=+p; return p<=BREAKP?Math.round(MINY+(p/BREAKP)*(BREAKY-MINY)):Math.round(BREAKY+((p-BREAKP)/(MAXP-BREAKP))*(MAXY-BREAKY));}
function yearToPos(y){return y<=BREAKY?Math.round((y-MINY)/(BREAKY-MINY)*BREAKP):Math.round(BREAKP+(y-BREAKY)/(MAXY-BREAKY)*(MAXP-BREAKP));}
// Region-aware period schemes — the slider tag reflects the work's own culture's periodization
const SCHEMES={
  western:[["Antiquity",500],["Medieval",1400],["Renaissance",1600],["Baroque",1750],["Enlightenment",1800],["19th c.",1900],["Modern",1945],["Contemporary",3000]],
  china:[["Ancient",-221],["Han",220],["Six Dynasties",589],["Sui–Tang",907],["Song",1279],["Yuan",1368],["Ming",1644],["Qing",1912],["Modern",3000]],
  japan:[["Ancient",710],["Nara",794],["Heian",1185],["Kamakura",1333],["Muromachi",1573],["Momoyama",1615],["Edo",1868],["Meiji+",3000]],
  india:[["Ancient",320],["Gupta",606],["Medieval",1206],["Sultanate",1526],["Mughal",1757],["Colonial",1947],["Modern",3000]],
  persia:[["Ancient",651],["Early Islamic",1256],["Ilkhanid–Timurid",1501],["Safavid",1736],["Qajar",1925],["Modern",3000]],
  egypt:[["Early Dynastic",-2686],["Old Kingdom",-2055],["Middle Kingdom",-1550],["New Kingdom",-1069],["Late Period",-332],["Greco-Roman",641],["Islamic",3000]],
  classical:[["Archaic",-480],["Classical Greek",-323],["Hellenistic",-31],["Roman Imperial",476],["Late Antique",3000]],
  neutral:[["Ancient",500],["Medieval",1400],["Early Modern",1800],["Modern",1945],["Contemporary",3000]],
};
function schemeFor(it){
  const t=((it.place||"")+" "+(it.style||"")+" "+(it.region||"")).toLowerCase();
  if(/japan|edo|ukiyo/.test(t))return 'japan';
  if(/china|chinese/.test(t))return 'china';
  if(/india|mughal|rajput|deccan|nepal|tibet/.test(t))return 'india';
  if(/iran|persia|islam|ottoman|turkey|safavid|qajar|syria/.test(t))return 'persia';
  if(/egypt/.test(t))return 'egypt';
  if(/greece|rome|roman|greek/.test(t))return 'classical';
  if(it.region==='Europe'||it.region==='North America')return 'western';
  return 'neutral';
}
function periodOf(scheme,y){const sc=SCHEMES[scheme]||SCHEMES.neutral;for(const[n,end]of sc)if(y<end)return n;return sc[sc.length-1][0];}
function periodName(it,y){return periodOf(schemeFor(it),y);}
// derive a period scheme from a GUESSED pin (so the slider reflects the player's hypothesis, not the answer)
function schemeFromLatLng(lat,lng){
  if(lng>=24&&lng<=37&&lat>=18&&lat<=32)return 'egypt';
  if(lng>=128&&lng<=146&&lat>=30&&lat<=46)return 'japan';
  if(lng>=98&&lng<=136&&lat>=18&&lat<=50)return 'china';
  if(lng>=68&&lng<=92&&lat>=6&&lat<=36)return 'india';
  if(lng>=25&&lng<=75&&lat>=12&&lat<=43)return 'persia';
  if(lng>=-25&&lng<=60&&lat>=35&&lat<=72)return 'western';
  return 'neutral';
}
// continent of a guessed pin (matches the data pipeline's classification)
function continentOf(lat,lng){
  if(lng>=-82&&lng<=-34&&lat<13&&lat>=-56)return "South America";
  if(lng>=-170&&lng<=-52&&lat>=13)return "North America";
  if(lng>=110&&lat<=-10)return "Oceania";
  if(lat>=36&&lng>=-25&&lng<=60)return "Europe";
  if(lat>=-35&&lat<36&&lng>=-20&&lng<=52)return "Africa";
  if(lng>40)return "Asia";
  return "Europe";
}
// strike wrong style pills down to `leave` remaining (answer + leave-1). Idempotent.
function geoElim(it,leave){
  const pills=[...document.querySelectorAll('[data-pills="style"] .pill')];
  const active=pills.filter(b=>!b.classList.contains('ruledout'));
  const wrong=active.filter(b=>b.dataset.v!==it.style);
  const toStrike=Math.max(0,active.length-leave);
  shuffle(wrong).slice(0,toStrike).forEach(b=>b.classList.add('ruledout'));
  return toStrike;
}
const apply5050=it=>geoElim(it,2); // paid hint = full 50/50 (leave answer + 1)
// how many style options a correct-region pin leaves you, by tier (null = no geo help)
const GEO_LEAVE={easy:2, medium:2, hard:3, impossible:null};
function emFor(f){return settings.colorblind?(f>=.75?"✅":f>=.35?"🟡":"❌"):(f>=.75?"🟩":f>=.35?"🟨":"🟥");}
function norm(s){return (s||"").toLowerCase().replace(/[^a-z ]/g,'').trim();}
function lastName(s){return norm(s).split(' ').pop();}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function accession(){const d=new Date();const mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return `NO. ${d.getFullYear()}·${mm}${dd}`;}
function sourceURL(it){
  if(it.src==='met') return `https://www.metmuseum.org/art/collection/search/${it.id.slice(3)}`;
  if(it.id&&it.id.indexOf('wikidata.org')>=0) return it.id.replace('http://','https://');

}
const MED_FAMILY={ "Oil paint":"paint","Tempera":"paint","Fresco":"paint","Watercolor":"paint","Ink":"paint","Woodblock print":"paint",
  "Bronze":"sculpt","Marble":"sculpt","Stone":"sculpt","Wood":"sculpt","Ivory":"sculpt","Jade":"sculpt",
  "Ceramic":"craft","Glass":"craft","Textile":"craft","Gold":"craft","Silver":"craft" };
const RELATED_MOV={
  "Renaissance":["Italian Renaissance","Mannerism","Baroque","Northern Renaissance"],
  "Italian Renaissance":["Renaissance","Mannerism","Baroque"],
  "Baroque":["Dutch Golden Age","Renaissance","Realism","Rococo"],
  "Dutch Golden Age":["Baroque","Realism"],
  "Post-Impressionism":["Pointillism","Impressionism","Symbolism","Expressionism","Fauvism"],
  "Impressionism":["Post-Impressionism","Pointillism","Realism"],
  "Pointillism":["Post-Impressionism","Impressionism"],
  "Symbolism":["Expressionism","Post-Impressionism","Art Nouveau"],
  "Expressionism":["Symbolism","Fauvism","Post-Impressionism"],
  "Realism":["Baroque","Dutch Golden Age","Impressionism"],

// ---------- data / indexes ----------
let POOL=(window.ARTEFACTUM_POOL||[]).filter(x=>x&&x.img&&x.cats);
let ALL_MED=[], MOVS=[], CULTS=[], MOVEMENT_NAMES=[], ARTIST_POOL=[], artistStyle={}, styleRegion={};
const CANON_STYLE={"academic":"Academic art","land":"Land art","pop":"Pop art","surrealism":"Surrealism",
  "Post-impressionism":"Post-Impressionism","American realism":"American Realism","French realism":"French Realism",
  "Pre-Raphaelite Brotherhood":"Pre-Raphaelite","Early Netherlandish painting":"Early Netherlandish"};
function buildIndexes(){
  for(const p of POOL){ if(p.styleKind==='movement'&&CANON_STYLE[p.style]) p.style=CANON_STYLE[p.style]; }
  // difficulty = real recognizability: global fame quartiles. Easy = what people actually recognize,
  // which is canon-skewed toward the West — surfaced as the teaching note on the start screen.
  POOL.sort((a,b)=>(b.fame||0)-(a.fame||0));
  MINY=Math.min(...POOL.map(p=>p.y));
  ALL_MED=[...new Set(POOL.map(p=>p.medium).filter(Boolean))];
  MOVS=[...new Set(POOL.filter(p=>p.styleKind==='movement').map(p=>p.style))];
  CULTS=[...new Set(POOL.filter(p=>p.styleKind==='culture').map(p=>p.style))];
  MOVEMENT_NAMES=[...new Set(POOL.filter(p=>p.styleKind==='movement'||p.styleKind==='culture').map(p=>p.style).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  const extra=["Claude Monet","Pierre-Auguste Renoir","Edgar Degas","Paul Cézanne","Paul Gauguin","Henri Matisse","Pablo Picasso","Salvador Dalí","Caravaggio","Raphael","Titian","Albrecht Dürer","Francisco Goya","Édouard Manet","Camille Pissarro","Gustav Klimt","Edvard Munch","Katsushika Hokusai","Utagawa Hiroshige","Diego Velázquez","El Greco","Peter Paul Rubens","Sandro Botticelli"];
  ARTIST_POOL=[...new Set([...POOL.map(p=>p.artist).filter(Boolean),...extra])].sort();
  artistStyle={}; styleRegion={};
  for(const p of POOL){ if(p.artist&&p.style){ const k=norm(p.artist); (artistStyle[k]=artistStyle[k]||new Set()).add(norm(p.style)); }
    if(p.style&&!styleRegion[p.style]) styleRegion[p.style]=p.region; }
}
function tierItems(i){const n=POOL.length;return POOL.slice(Math.floor(i*n/4),Math.floor((i+1)*n/4));}
const TIERS=[{key:"easy",label:"Easy",blurb:"World-famous masterpieces"},{key:"medium",label:"Medium",blurb:"Well-known works"},

// ---------- mastery ----------
function loadMastery(){try{return JSON.parse(localStorage.getItem("artefactum.mastery"))||{byStyle:{},byRegion:{}}}catch{return{byStyle:{},byRegion:{}}}}
function saveMastery(m){try{localStorage.setItem("artefactum.mastery",JSON.stringify(m))}catch{}}
function bumpMastery(key,bucket,correct){const m=loadMastery();const b=m[bucket]; b[key]=b[key]||{correct:0,total:0}; b[key].total++; if(correct)b[key].correct++; saveMastery(m);}
function masteryLine(){
  const m=loadMastery(), all={...{},...m.byStyle,...m.byRegion};
  const entries=Object.entries(m.byStyle).filter(([,v])=>v.total>=2);
  if(!entries.length) return "";
  entries.sort((a,b)=>(b[1].correct/b[1].total)-(a[1].correct/a[1].total));
  const best=entries[0], worst=entries[entries.length-1];
  let s=`Sharp on <strong>${esc(best[0])}</strong> (${best[1].correct}/${best[1].total})`;
  if(worst!==best) s+=` &middot; <span class="weak">${esc(worst[0])} still slips (${worst[1].correct}/${worst[1].total})</span>`;
  return s;
}

// ---------- movement glossary ----------
function loadGlossary(){try{const g=JSON.parse(localStorage.getItem("gesso.glossary"))||{};return {met:g.met&&typeof g.met==='object'?g.met:{}}}catch{return{met:{}}}}
function saveGlossary(g){try{localStorage.setItem("gesso.glossary",JSON.stringify(g))}catch{}}
function movementMeta(name){return MOVEMENTS[name]||{dates:"c. unknown",region:styleRegion[name]||"Unknown",palette:GLOSSARY_EMBLEM};}
function emblemHTML(palette,size,locked){
  const colors=locked?LOCKED_PALETTE:(palette||GLOSSARY_EMBLEM);
  return `<span class="emblem" style="--em:${size}px${size>=30?';gap:3px':''}">${colors.map(c=>`<i style="background:${c}"></i>`).join('')}</span>`;
}
function maskName(name){return String(name||"").replace(/[^\s]/g,"?");}
function movementCues(name){
  const style=CUES.style&&CUES.style[name], culture=CUES.culture&&CUES.culture[name], alias=CUE_ALIASES[name]&&CUES.culture&&CUES.culture[CUE_ALIASES[name]];
  return (style&&style.cues)||(culture&&culture.cues)||(alias&&alias.cues)||[];
}
function canonicalWork(name){return POOL.filter(p=>p.style===name).sort((a,b)=>(b.fame||0)-(a.fame||0))[0]||null;}
function bumpGlossary(name){
  if(!name)return loadGlossary();
  const g=loadGlossary(), today=runDate||todayStr();
  g.met[name]=g.met[name]||{firstSeen:today,count:0};
  if(!g.met[name].firstSeen)g.met[name].firstSeen=today;
  g.met[name].count=(+g.met[name].count||0)+1;
  saveGlossary(g); return g;
}
function glossaryTotal(){return MOVEMENT_NAMES.length;}
function renderGlossary(){
  clearTimers();
  const g=loadGlossary(), total=glossaryTotal(), metCount=MOVEMENT_NAMES.filter(n=>g.met[n]).length, pct=total?metCount/total*100:0;
  const cards=MOVEMENT_NAMES.map(name=>{
    const meta=movementMeta(name), met=g.met[name], unlocked=!!met, em=emblemHTML(meta.palette,15,!unlocked);
    const body=`${em}<div class="nm">${unlocked?esc(name):esc(maskName(name))}</div><div class="sub">${unlocked?`${esc(meta.dates)} &middot; ${esc(meta.region)}`:'Not yet met'}</div>`;

function todayStr(){const d=new Date();return localDateStr(d);}
function localDateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseLocalDate(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function addDays(s,n){const d=parseLocalDate(s);d.setDate(d.getDate()+n);return localDateStr(d);}
function niceDate(s){return parseLocalDate(s).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}
function accessionFor(s){const d=parseLocalDate(s);return `NO. ${d.getFullYear()}·${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}
function seedHash(str){let h=1779033703^str.length;for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return (h>>>0)||1;}
function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296;};}
function seededShuffle(a,seed){const rnd=typeof seed==='function'?seed:mulberry32(seedHash(String(seed)));a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function dailyItems(key,dateStr){const i=Math.max(0,TIERS.findIndex(t=>t.key===key));let arr=tierItems(i);if(arr.length<ROUNDS)arr=[...arr,...seededShuffle(POOL.filter(p=>!arr.includes(p)),`${dateStr}|${key}|fill`)];return seededShuffle(arr,`${dateStr}|${key}`).slice(0,ROUNDS);}
function loadStreak(){try{const s=JSON.parse(localStorage.getItem("artefactum.streak"))||{};return {current:+s.current||0,longest:+s.longest||0,lastPlayed:s.lastPlayed||"",playedDates:Array.isArray(s.playedDates)?s.playedDates:[],scores:s.scores||{}};}catch{return{current:0,longest:0,lastPlayed:"",playedDates:[],scores:{}}}}
function saveStreak(s){try{localStorage.setItem("artefactum.streak",JSON.stringify(s))}catch{}}
function recordDailyScore(dateStr,score){const today=todayStr();if(dateStr!==today)return loadStreak();const s=loadStreak(),hadToday=s.playedDates.includes(today)||s.lastPlayed===today,prev=s.lastPlayed;if(!hadToday){s.current=prev===addDays(today,-1)?s.current+1:1;s.longest=Math.max(s.longest,s.current);s.lastPlayed=today;s.playedDates=[...new Set([...s.playedDates,today])].sort();}s.scores[today]=Math.max(+s.scores[today]||0,score);saveStreak(s);return s;}
function avgScore(s){const vals=Object.values(s.scores||{}).map(Number).filter(Number.isFinite);return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;}

function setupAutocomplete(){
  const inp=document.getElementById('artist'),list=document.getElementById('aclist');let active=-1,items=[];
  const close=()=>{list.style.display='none';active=-1;};
  const render=q=>{const ql=q.toLowerCase().trim();items=ql?ARTIST_POOL.filter(a=>a.toLowerCase().includes(ql)).slice(0,8):[];
    if(!items.length){close();return;}
    list.innerHTML=items.map((a,i)=>`<div class="ac-item${i===active?' active':''}" data-i="${i}">${esc(a)}</div>`).join('');
    list.style.display='block';
    list.querySelectorAll('.ac-item').forEach(el=>el.onmousedown=ev=>{ev.preventDefault();pick(+el.dataset.i);});};
  const pick=i=>{inp.value=items[i];guess.artist=items[i];close();inp.focus();};
  inp.oninput=()=>{guess.artist=inp.value;active=-1;render(inp.value);};
  inp.onkeydown=e=>{if(list.style.display==='none')return;
    if(e.key==='ArrowDown'){active=Math.min(active+1,items.length-1);render(inp.value);e.preventDefault();}
    else if(e.key==='ArrowUp'){active=Math.max(active-1,0);render(inp.value);e.preventDefault();}
    else if(e.key==='Enter'&&active>=0){pick(active);e.preventDefault();}

function centuryStr(y){const c=Math.floor((Math.abs(y)-1)/100)+1;const s=(c%100>10&&c%100<14)?"th":["th","st","nd","rd"][c%10]||"th";return `${c}${s} century${y<0?" BCE":""}`;}

// ---------- scoring ----------
function timeScore(diff){
  if(diff<=15)return{pts:MAX_CAT,bull:true};
  if(diff<=40)return{pts:2250}; if(diff<=90)return{pts:2000}; if(diff<=180)return{pts:1500};
  if(diff<=400)return{pts:850}; if(diff<=800)return{pts:350}; return{pts:0};
}
function score(){
  const it=game[idx], cells={}, D=dcfg();
  // when (leniency scales with difficulty; 🎯 bullseye always = within a real decade)
  const dy=Math.abs(guess.year-it.y), ts=timeScore(Math.round(dy/D.timeMult)), bull=dy<=10;
  cells.when={pts:bull?MAX_CAT:ts.pts, bull, you:fmtYear(guess.year), actual:fmtYear(it.y),
    note:bull?"right to the decade":periodName(it,guess.year)===periodName(it,it.y)?"same period":`${dy} yrs off`};
  // where (distance falloff is gentler on easy, steeper on hard)
  let dist=null,sp=0; if(guess.ll){dist=km(guess.ll.lat,guess.ll.lng,it.lat,it.lng); sp=Math.round(MAX_CAT*Math.exp(-dist/D.distK));}
  cells.where={pts:sp, dist, you:guess.ll?"your pin":"no pin", actual:it.place, note:dist==null?"no pin dropped":`${Math.round(dist)} km off`};
  // medium
  if(it.cats.includes('medium')){let s=0,note="no answer";
    if(guess.medium){ if(guess.medium===it.medium){s=MAX_CAT;note="exact";}
      else if(MED_FAMILY[guess.medium]&&MED_FAMILY[guess.medium]===MED_FAMILY[it.medium]){s=Math.round(MAX_CAT*0.5);note="same family";}
      else note="wrong";}
    cells.medium={pts:s,you:guess.medium||"—",actual:it.medium,note};}
  // style
  if(it.cats.includes('style')){let s=0,note="no answer";
    if(guess.style){ if(guess.style===it.style){s=MAX_CAT;note="exact";}
      else if((RELATED_MOV[it.style]||[]).includes(guess.style)){s=Math.round(MAX_CAT*D.relMov);note="related";}
      else note="wrong";}
    cells.style={pts:s,you:guess.style||"—",actual:it.style,note};}
  // artist (bonus)
  if(it.cats.includes('artist')){let s=0,note="no answer";const ga=norm(guess.artist);
    if(ga){ if(ga===norm(it.artist)||(lastName(guess.artist)&&lastName(guess.artist)===lastName(it.artist))){s=MAX_CAT;note="exact match";}
      else if(artistStyle[ga]&&it.style&&artistStyle[ga].has(norm(it.style))){s=Math.round(MAX_CAT*0.4);note="same school";}
      else note="not matched";}
    cells.artist={pts:s,bonus:true,you:guess.artist||"—",actual:it.artist,note};}
  // totals
  const coreCats=it.cats.filter(c=>c!=='artist');
  const baseMax=coreCats.length*MAX_CAT;
  const core=coreCats.reduce((a,c)=>a+cells[c].pts,0);
  const bonus=cells.artist?cells.artist.pts:0;

  clearTimers();
  const s=loadStreak(), entries=masteryEntries(), strong=entries.slice(0,3), weak=entries.slice().reverse().slice(0,3), avg=avgScore(s), perfect=Object.values(s.scores||{}).filter(v=>+v>=50000).length;
  const best=strong[0], worst=weak[0], note=best&&worst?`You nail <strong>${esc(best.k)}</strong>${strong[1]?` &amp; <strong>${esc(strong[1].k)}</strong>`:''} — but <span class="weak">${esc(worst.k)}</span> keeps slipping.`:'File more works to build a clearer study note.';
  document.getElementById('stage').innerHTML=`${header(ROUNDS,-1,false)}<div class="sheet"><div class="retwrap"><div class="retcard">
    <div class="retcap"><span class="ttl">Your stats</span><span class="accn">${s.playedDates.length} days filed</span></div>
    <div class="statsgrid"><div class="statile"><div class="n">${s.current}</div><div class="l">Streak</div></div><div class="statile"><div class="n">${s.longest}</div><div class="l">Longest</div></div><div class="statile"><div class="n">${shortScore(avg)}</div><div class="l">Avg score</div></div><div class="statile"><div class="n">${perfect}</div><div class="l">🎯 Perfect</div></div></div>
    <div class="mastergrid"><div><div class="kick" style="color:var(--full);margin-bottom:12px">Strongest</div>${strong.length?strong.map(x=>barHTML(x,false)).join(''):'<div class="mono" style="color:var(--muted);font-size:12px">No mastery data yet.</div>'}</div>
    <div><div class="kick" style="color:var(--miss);margin-bottom:12px">Needs work</div>${weak.length?weak.map(x=>barHTML(x,true)).join(''):'<div class="mono" style="color:var(--muted);font-size:12px">No weak spots yet.</div>'}</div></div>
    <div class="study" style="margin-top:14px"><div class="why" style="font-size:15px;margin:0">${note}</div></div>
  </div>${ATTRIB}</div></div>`;
}
function renderFinal(){
  clearTimers();
  const summary=resultSummary(), {grand,gmax,bonus,share}=summary;
  lastFinal={...summary,results:results.slice(),tier,date:runDate||todayStr()};
  if(!runArchive)recordDailyScore(runDate||todayStr(),grand);
  // matrix
  const cols=["when","where","medium","style","artist"];
  const head=cols.map(c=>`<th>${iconHTML(c)}${catShort(c)}</th>`).join('');
  const rows=results.map(r=>`<tr><td class="rl">${esc(r.it.title)}</td>${cols.map(c=>{
    if(!r.it.cats.includes(c))return `<td></td>`;
    const f=r.cells[c].pts/MAX_CAT;return `<td>${swatchBox(f,'msq')}</td>`;}).join('')}</tr>`).join('');
  const ml=masteryLine();
  document.getElementById('stage').innerHTML=`${header(ROUNDS,-1,true)}<div class="sheet">

    <div class="banner"><div><div class="kick">Game filed &middot; ${ROUNDS} of ${ROUNDS}</div>
      <div style="display:flex;align-items:baseline;gap:9px;margin-top:7px">
        <span class="big" data-cu="${grand}">${grand.toLocaleString()}</span>
        <span class="mono" style="font-size:13px;color:var(--muted)">/ ${gmax.toLocaleString()} pts${bonus?` &middot; +${bonus.toLocaleString()} bonus`:''}</span></div></div></div>
    <div class="matrix"><table><thead><tr><th style="text-align:left">Work</th>${head}</tr></thead><tbody>${rows}</tbody></table></div>
    <div style="padding:18px 24px 8px"><div class="kick" style="margin-bottom:8px">Share</div>
      <div class="sharebox" id="share">${esc(share)}</div></div>
    ${ml?`<div class="study"><div class="kick">Session mastery</div><div class="why" style="font-size:15px">${ml}</div></div>`:''}
    <div style="padding:8px 24px 24px"><button class="btn" id="copy">Copy result to share</button>
      <button class="btn" id="imageShare" style="margin-top:10px">Share / Download image</button>
      <button class="btn" id="streak" style="background:transparent;border:1.5px solid var(--accent);color:var(--accent);margin-top:10px">${runArchive?'Back to streak':'Come back tomorrow'}</button>
      <button class="btn" id="again" style="background:transparent;border:1.5px solid var(--accent);color:var(--accent);margin-top:10px">Play again</button>${ATTRIB}</div>
  </div>`;
  countUps();
  document.getElementById('copy').onclick=()=>navigator.clipboard.writeText(resultSummary().share).then(()=>document.getElementById('copy').textContent='Copied ✓');
  document.getElementById('imageShare').onclick=()=>downloadShareImage(document.getElementById('imageShare'),lastFinal);
  document.getElementById('streak').onclick=renderStreak;
  document.getElementById('again').onclick=renderStart;
}

// ---------- zoom lightbox ----------
function hiRes(src){return src.replace(/width=\d+/,"width=1800");}
function openZoom(src){
  const lb=document.createElement('div');lb.className='lightbox';
  const img=document.createElement('img');img.src=hiRes(src);img.draggable=false;
  let scale=1,tx=0,ty=0,drag=false,sx=0,sy=0;const apply=()=>img.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  img.onclick=e=>{e.stopPropagation();if(scale===1)scale=2.5;else{scale=1;tx=0;ty=0;}img.style.cursor=scale>1?'grab':'zoom-in';apply();};
  img.onmousedown=e=>{if(scale===1)return;drag=true;sx=e.clientX-tx;sy=e.clientY-ty;img.style.cursor='grabbing';e.preventDefault();};
  const mv=e=>{if(!drag)return;tx=e.clientX-sx;ty=e.clientY-sy;apply();};const up=()=>{drag=false;if(scale>1)img.style.cursor='grab';};
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  const close=()=>{lb.remove();window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);document.removeEventListener('keydown',esc2);};
  const esc2=e=>{if(e.key==='Escape')close();};document.addEventListener('keydown',esc2);
  lb.onclick=close;const x=document.createElement('button');x.className='lb-close';x.textContent='✕';x.onclick=e=>{e.stopPropagation();close();};
  const hint=document.createElement('div');hint.className='lb-hint';hint.textContent='Click image to zoom · drag to pan · Esc to close';
  lb.append(img,x,hint);document.body.appendChild(lb);
}
document.addEventListener('click',e=>{if(e.target.classList&&e.target.classList.contains('art'))openZoom(e.target.src);});

// ---------- boot ----------
applySettings();
if(!POOL.length){document.getElementById('stage').innerHTML='<div class="card"><div class="hero"><div class="big2">⚠︎</div><div class="tag">Could not load the artwork data (data/pool.js). Serve this folder over http (e.g. python3 -m http.server).</div></div></div>';}
else{ buildIndexes(); renderStart(); }
</script>
