<script>
"use strict";
const MAX_CAT=2500, ROUNDS=5, HINT_COST=500, HINT_LIMIT=3;
const CUES = window.ARTEFACTUM_CUES || {style:{},culture:{},region:{},medium:{}};
const HOTSPOTS = window.ARTEFACTUM_HOTSPOTS || {};
// difficulty tunes scoring leniency + how confusable the distractors are
const DIFF={
  easy:      {distK:4500, relMov:0.70, timeMult:1.6, look:'far'},
  medium:    {distK:2500, relMov:0.50, timeMult:1.1, look:'mix'},
  hard:      {distK:1500, relMov:0.35, timeMult:0.9, look:'near'},
  impossible:{distK:1000, relMov:0.25, timeMult:0.75, look:'near'},
};
const dcfg=()=>DIFF[tier]||DIFF.medium;

// ---------- helpers ----------
function shuffle(a){const rnd=window.__RNG||Math.random;a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickN(a,n){return shuffle(a).slice(0,n);}
// last meaningful token, e.g. "Eastern Tibet"->"Tibet", "Central Tibet"->"Tibet" (but "Greek, Attic"->"Attic")
function lastTok(s){return String(s).trim().split(/\s+/).pop().replace(/[^A-Za-z]/g,'');}
function fill3(ans,picks,fromAll){const at=lastTok(ans), sib=x=>lastTok(x)===at;
  let p=[...new Set(picks)].filter(x=>x&&x!==ans&&!sib(x));
  const rest=shuffle(fromAll.filter(x=>x!==ans&&!p.includes(x)&&!sib(x)));
  while(p.length<3&&rest.length)p.push(rest.shift());
  return shuffle([ans,...p.slice(0,3)]);}
// medium choices: easy = different families (obvious); hard = same family (lookalikes)
function mediumChoices(ans){const look=dcfg().look;
  const same=ALL_MED.filter(m=>m!==ans&&MED_FAMILY[m]&&MED_FAMILY[m]===MED_FAMILY[ans]);
  const diff=ALL_MED.filter(m=>m!==ans&&MED_FAMILY[m]!==MED_FAMILY[ans]);
  let picks; if(look==='far')picks=pickN(diff,3); else if(look==='near')picks=[...pickN(same,3),...pickN(diff,3)].slice(0,3); else picks=[...pickN(same,1),...pickN(diff,2)];
  return fill3(ans,picks,ALL_MED);}
// style choices: themed to the answer's own region/kind (so European works show European movements,
// Asian works show Asian schools); hard pulls confusable related/same-region neighbours
const DEMONYM={japanese:'japan',chinese:'china',korean:'korea',persian:'persia',iranian:'persia',indian:'india',egyptian:'egypt',greek:'greece',roman:'rome',italian:'italy',french:'france',german:'germany',spanish:'spain',dutch:'netherlands',flemish:'netherlands',english:'england',british:'britain',american:'usa',mexican:'mexico',peruvian:'peru',tibetan:'tibet',nepalese:'nepal',thai:'thailand',vietnamese:'vietnam'};
function cultureKey(s){let k=String(s||'').toLowerCase().replace(/[^a-z ]/g,'').trim().split(' ')[0];return DEMONYM[k]||k;}
function styleChoices(it){const look=dcfg().look, ans=it.style, aKey=cultureKey(ans);
  const isCult=it.styleKind==='culture';
  // a culture's geographic "root" (dominant country) — keeps options from overlapping, e.g. "Meiji" + "Japan"
  const root=s=>styleCountry[s]||cultureKey(s);
  const aRoot=root(ans);
  // drop near-duplicate synonyms of the answer ("Japan" vs "Japanese"); for cultures also drop same-country labels
  const pool=(isCult?CULTS:MOVS).filter(s=>s===ans||(cultureKey(s)!==aKey&&(!isCult||root(s)!==aRoot)));
  const sameReg=pool.filter(s=>s!==ans&&styleRegion[s]===it.region);
  const related=(RELATED_MOV[ans]||[]).filter(s=>pool.includes(s));
  let picks; if(look==='far')picks=pickN(pool.filter(s=>s!==ans),3);
  else if(look==='near')picks=[...pickN(related,2),...pickN(sameReg,3)].slice(0,3);
  else picks=[...pickN(related,1),...pickN(sameReg.length?sameReg:pool,2)];
  if(!isCult) return fill3(ans,picks,pool);
  // cultures: guarantee the 4 options come from distinct countries (no Meiji + Edo + Japan together)
  const out=[ans], used=new Set([aRoot]);
  for(const s of [...picks,...shuffle(sameReg),...shuffle(pool)]){
    if(out.length>=4)break; if(s===ans||out.includes(s))continue;
    const r=root(s); if(used.has(r))continue; out.push(s); used.add(r);}
  return shuffle(out);}
function km(a,b,c,d){const R=6371,r=Math.PI/180,dl=(c-a)*r,dn=(d-b)*r,h=Math.sin(dl/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dn/2)**2;return 2*R*Math.asin(Math.sqrt(h));}
function fmtYear(y){return y<0?`${-y} BCE`:`${y} CE`;}
const motionQuery=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)');
let settings=loadSettings();
function loadSettings(){try{const s=JSON.parse(localStorage.getItem("gesso.settings"))||{};return {reduceMotion:typeof s.reduceMotion==='boolean'?s.reduceMotion:!!(motionQuery&&motionQuery.matches),colorblind:!!s.colorblind};}catch{return{reduceMotion:!!(motionQuery&&motionQuery.matches),colorblind:false};}}
function saveSettings(){try{localStorage.setItem("gesso.settings",JSON.stringify({reduceMotion:!!settings.reduceMotion,colorblind:!!settings.colorblind}));}catch{}}
function applySettings(){document.body.classList.toggle('reduce-motion',!!settings.reduceMotion);document.body.classList.toggle('motion-ok',!settings.reduceMotion);document.body.classList.toggle('colorblind',!!settings.colorblind);const sh=document.getElementById('share');if(sh&&results.length){const fresh=resultSummary().share;sh.textContent=fresh;if(lastFinal)lastFinal.share=fresh;}}
function prefersReducedChanged(e){try{const stored=JSON.parse(localStorage.getItem("gesso.settings"))||{};if(typeof stored.reduceMotion!=='boolean'){settings.reduceMotion=!!e.matches;applySettings();}}catch{}}
if(motionQuery&&motionQuery.addEventListener)motionQuery.addEventListener('change',prefersReducedChanged);
function openSettings(){
  const veil=document.createElement('div');veil.className='settingsveil';veil.innerHTML=`<div class="settingspanel" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="settingshead"><span class="ttl">Settings</span><button type="button" class="settingsclose" aria-label="Close settings">&times;</button></div>
    <div class="settingsbody">
      <div class="setrow"><div><div class="name">Reduce motion</div><div class="hint">Auto-follows your system &middot; override here</div></div><button type="button" class="toggle" data-set="reduceMotion" aria-pressed="${settings.reduceMotion?'true':'false'}" aria-label="Reduce motion"></button></div>
      <div class="setrow"><div><div class="name">Colorblind mode</div><div class="hint">Adds ✓ ◐ ✕ to result swatches</div></div><button type="button" class="toggle" data-set="colorblind" aria-pressed="${settings.colorblind?'true':'false'}" aria-label="Colorblind mode"></button></div>
      <div class="setrow"><div><div class="name">Replay the tutorial</div><div class="hint">See the "How to play" walkthrough again</div></div><button type="button" class="obnext" data-replaytut style="padding:8px 14px">Replay</button></div>
    </div><div class="settingsfoot">Preferences save to this browser.</div></div>`;
  const close=()=>{veil.remove();document.removeEventListener('keydown',escClose);};
  const escClose=e=>{if(e.key==='Escape')close();};
  veil.addEventListener('click',e=>{if(e.target===veil||e.target.closest('.settingsclose'))close();if(e.target.closest('[data-replaytut]')){close();openHowTo();return;}const t=e.target.closest('[data-set]');if(t){settings[t.dataset.set]=!settings[t.dataset.set];t.setAttribute('aria-pressed',settings[t.dataset.set]?'true':'false');saveSettings();applySettings();}});
  document.addEventListener('keydown',escClose);document.body.appendChild(veil);
}
// ---------- "How to play" onboarding ----------
const HOWTO_STEPS=[
  {key:'welcome',title:'Guess what you can',body:"Five works a day. You don't need to know everything — a thoughtful guess beats a blank, and close still counts."},
  {key:'when',title:'When was it made?',body:"Drag the dot along the timeline to your best year. It updates as you slide, showing something like “1700 CE.”"},
  {key:'where',title:'Where in the world?',body:"Tap the map to drop a pin. Pinch or use the +/− buttons to zoom — scrolling moves the page, not the map."},
  {key:'choose',title:'Pick what fits',body:"Tap the medium and movement you think match. Know the artist? Start typing to search — that one's a bonus."},
  {key:'lock',title:'Lock in & learn',body:"Hit Lock in to reveal the answer and a short story about the work. Even a rough guess beats a blank — partial credit always counts. Stuck? A hint costs 500."},
];
function howtoIcon(key){
  const s='fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"';
  const m={
    welcome:`<path ${s} d="M12 4.3c-4.5 0-8.1 3-8.1 6.8 0 2.5 1.9 3.9 3.8 3.9 1.4 0 1.6 1.1 1.1 2-.5 1 .1 2 1.6 2.1 4.8.5 9.7-3.1 9.7-7.7 0-4.5-3.5-7.1-8.1-7.1Z"/><circle cx="8" cy="10" r="1" fill="#fff" stroke="none"/><circle cx="12" cy="8.3" r="1" fill="#fff" stroke="none"/><circle cx="15.6" cy="10" r="1" fill="#fff" stroke="none"/>`,
    when:`<circle ${s} cx="12" cy="12" r="8.3"/><path ${s} d="M12 7.4V12l3.1 1.9"/>`,
    where:`<circle ${s} cx="12" cy="12" r="8.3"/><path ${s} d="M3.7 12h16.6M12 3.7v16.6"/><ellipse ${s} cx="12" cy="12" rx="3.9" ry="8.3"/>`,
    choose:`<rect ${s} x="4.7" y="4.7" width="14.6" height="14.6" rx="3.4"/><path d="M5.4 19 H12 L5.4 12.4 Z" fill="#fff"/>`,
    lock:`<path ${s} d="M4 12.5l5 5 11-11"/>`,
  };
  return `<svg viewBox="0 0 24 24" width="40" height="40">${m[key]||m.welcome}</svg>`;
}
function openHowTo(){
  let i=0;
  const veil=document.createElement('div');veil.className='settingsveil';
  veil.innerHTML=`<div class="settingspanel" role="dialog" aria-modal="true" aria-label="How to play">
    <div class="settingshead"><span class="ttl">How to play</span><button type="button" class="settingsclose" aria-label="Close">&times;</button></div>
    <div class="obbody"><div class="obillus"><span class="obdab"></span></div><div class="obtitle"></div><div class="obtext"></div></div>
    <div class="obdots"></div>
    <div class="obfoot"><button type="button" class="obskip">Skip</button>
      <div class="obnav"><button type="button" class="obback">Back</button><button type="button" class="obnext">Next</button></div></div></div>`;
  const $=s=>veil.querySelector(s);
  const close=()=>{try{localStorage.setItem("gesso.onboarded","1");}catch{};veil.remove();document.removeEventListener('keydown',keyNav);};
  const draw=()=>{const st=HOWTO_STEPS[i];
    $('.obdab').innerHTML=howtoIcon(st.key); $('.obtitle').textContent=st.title; $('.obtext').textContent=st.body;
    $('.obdots').innerHTML=HOWTO_STEPS.map((_,k)=>`<span class="${k===i?'on':''}" data-d="${k}"></span>`).join('');
    $('.obback').style.visibility=i===0?'hidden':'visible';
    $('.obnext').textContent=i===HOWTO_STEPS.length-1?'Start playing':'Next';};
  const go=d=>{i+=d; if(i>=HOWTO_STEPS.length){close();return;} if(i<0)i=0; draw();};
  const keyNav=e=>{if(e.key==='Escape')close();else if(e.key==='ArrowRight')go(1);else if(e.key==='ArrowLeft')go(-1);};
  veil.addEventListener('click',e=>{
    if(e.target===veil||e.target.closest('.settingsclose')||e.target.closest('.obskip'))return close();
    if(e.target.closest('.obnext'))return go(1);
    if(e.target.closest('.obback'))return go(-1);
    const dot=e.target.closest('[data-d]'); if(dot){i=+dot.dataset.d;draw();}});
  document.addEventListener('keydown',keyNav); document.body.appendChild(veil); draw();
}
// non-linear timeline: most works are post-1400, so give recent centuries more of the track
let MINY=-2500; const BREAKY=1400, BREAKP=350, MAXY=2025, MAXP=1000;
function posToYear(p){p=+p; return p<=BREAKP?Math.round(MINY+(p/BREAKP)*(BREAKY-MINY)):Math.round(BREAKY+((p-BREAKP)/(MAXP-BREAKP))*(MAXY-BREAKY));}
function yearToPos(y){return y<=BREAKY?Math.round((y-MINY)/(BREAKY-MINY)*BREAKP):Math.round(BREAKP+(y-BREAKY)/(MAXY-BREAKY)*(MAXP-BREAKP));}
// Region-aware period schemes — the slider tag reflects the work's own culture's periodization
const SCHEMES={
  western:[["Antiquity",500],["Medieval",1400],["Renaissance",1600],["Baroque",1750],["Enlightenment",1800],["19th c.",1900],["Modern",1945],["Contemporary",3000]],
  china:[["Ancient",-221],["Han",220],["Six Dynasties",589],["Sui–Tang",907],["Song",1279],["Yuan",1368],["Ming",1644],["Qing",1912],["Modern",3000]],
  japan:[["Ancient",710],["Nara",794],["Heian",1185],["Kamakura",1333],["Muromachi",1573],["Momoyama",1615],["Edo",1868],["Meiji+",3000]],
  india:[["Ancient",320],["Gupta",606],["Medieval",1206],["Sultanate",1526],["Mughal",1757],["Colonial",1947],["Modern",3000]],
  persia:[["Ancient",651],["Early Islamic",1256],["Ilkhanid–Timurid",1501],["Safavid",1736],["Qajar",1925],["Modern",3000]],
  egypt:[["Early Dynastic",-2686],["Old Kingdom",-2055],["Middle Kingdom",-1550],["New Kingdom",-1069],["Late Period",-332],["Greco-Roman",641],["Islamic",3000]],
  classical:[["Archaic",-480],["Classical Greek",-323],["Hellenistic",-31],["Roman Imperial",476],["Late Antique",3000]],
  neutral:[["Ancient",500],["Medieval",1400],["Early Modern",1800],["Modern",1945],["Contemporary",3000]],
};
function schemeFor(it){
  const t=((it.place||"")+" "+(it.style||"")+" "+(it.region||"")).toLowerCase();
  if(/japan|edo|ukiyo/.test(t))return 'japan';
  if(/china|chinese/.test(t))return 'china';
  if(/india|mughal|rajput|deccan|nepal|tibet/.test(t))return 'india';
  if(/iran|persia|islam|ottoman|turkey|safavid|qajar|syria/.test(t))return 'persia';
  if(/egypt/.test(t))return 'egypt';
  if(/greece|rome|roman|greek/.test(t))return 'classical';
  if(it.region==='Europe'||it.region==='North America')return 'western';
  return 'neutral';
}
function periodOf(scheme,y){const sc=SCHEMES[scheme]||SCHEMES.neutral;for(const[n,end]of sc)if(y<end)return n;return sc[sc.length-1][0];}
function periodName(it,y){return periodOf(schemeFor(it),y);}
// derive a period scheme from a GUESSED pin (so the slider reflects the player's hypothesis, not the answer)
function schemeFromLatLng(lat,lng){
  if(lng>=24&&lng<=37&&lat>=18&&lat<=32)return 'egypt';
  if(lng>=128&&lng<=146&&lat>=30&&lat<=46)return 'japan';
  if(lng>=98&&lng<=136&&lat>=18&&lat<=50)return 'china';
  if(lng>=68&&lng<=92&&lat>=6&&lat<=36)return 'india';
  if(lng>=25&&lng<=75&&lat>=12&&lat<=43)return 'persia';
  if(lng>=-25&&lng<=60&&lat>=35&&lat<=72)return 'western';
  return 'neutral';
}
// continent of a guessed pin (matches the data pipeline's classification)
function continentOf(lat,lng){
  if(lng>=-82&&lng<=-34&&lat<13&&lat>=-56)return "South America";
  if(lng>=-170&&lng<=-52&&lat>=13)return "North America";
  if(lng>=110&&lat<=-10)return "Oceania";
  if(lng>34.5&&lat<42&&lat>=12)return "Asia";  // West/South/East Asia incl. Middle East
  if(lat>=36&&lng>=-25&&lng<=60)return "Europe";
  if(lat>=-35&&lat<36&&lng>=-20&&lng<=52)return "Africa";
  if(lng>40)return "Asia";
  return "Europe";
}
// strike wrong style pills down to `leave` remaining (answer + leave-1). Idempotent.
function geoElim(it,leave){
  const pills=[...document.querySelectorAll('[data-pills="style"] .pill')];
  const active=pills.filter(b=>!b.classList.contains('ruledout'));
  const wrong=active.filter(b=>b.dataset.v!==it.style);
  const toStrike=Math.max(0,active.length-leave);
  shuffle(wrong).slice(0,toStrike).forEach(b=>b.classList.add('ruledout'));
  return toStrike;
}
const apply5050=it=>geoElim(it,2); // paid hint = full 50/50 (leave answer + 1)
// Only offer an initials hint when the artist is an actual named person (not "Incan artist", "unidentified", a culture, etc.)
const isNamedArtist=a=>!!a && !/\b(artist|artists|unknown|unidentified|anonymous|workshop|atelier|follower|circle|school|manner|attributed|maker|makers|culture|cultures|people|peoples|dynasty|period|tradition|various|unrecorded)\b/i.test(a);
// how many style options a correct-region pin leaves you, by tier (null = no geo help)
const GEO_LEAVE={easy:2, medium:2, hard:3, impossible:null};
// "right country" = full credit within this radius (km); big countries get a generous radius, then falloff beyond
const PLACE_RADIUS=[[/united states|america|u\.s\./i,2200],[/russia|soviet/i,3000],[/canada/i,2500],[/china/i,2000],[/australia/i,1900],[/brazil/i,1800],[/india/i,1500],[/kazakh/i,1300],[/argentin/i,1500],[/indonesia/i,1700],[/mexico/i,1100],[/iran|persia/i,950],[/egypt/i,750],[/turkey|ottoman|türkiye/i,800],[/japan/i,700]];
function radiusFor(place){for(const[re,r] of PLACE_RADIUS)if(re.test(place||""))return r;return 450;}
function emFor(f){return settings.colorblind?(f>=.75?"✅":f>=.35?"🟡":"❌"):(f>=.75?"🟩":f>=.35?"🟨":"🟥");}
function norm(s){return (s||"").toLowerCase().replace(/[^a-z ]/g,'').trim();}
function lastName(s){return norm(s).split(' ').pop();}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function imgFail(img){
  if(!img.dataset.retry){ img.dataset.retry='1'; const base=img.src; setTimeout(()=>{ img.src=base+(base.includes('?')?'&':'?')+'_r=1'; },1500); return; }
  const pl=img.parentNode&&img.parentNode.querySelector('.imgloader');if(pl)pl.remove();img.style.display='none';if(img.parentNode&&!img.parentNode.querySelector('.imgfail')){const d=document.createElement('div');d.className='imgfail';d.textContent='Image unavailable';img.parentNode.appendChild(d);}}
function accession(){const d=new Date();const mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return `NO. ${d.getFullYear()}·${mm}${dd}`;}
function sourceURL(it){
  const id=it.id||"", q=encodeURIComponent(((it.title||"")+" "+(it.artist||"")).trim());
  if(id.indexOf('wikidata.org')>=0) return id.replace('http://','https://');
  if(id.indexOf('wikidata:')===0) return `https://www.wikidata.org/wiki/${id.slice(9)}`;
  if(/^met\d/.test(id)) return `https://www.metmuseum.org/art/collection/search/${id.slice(3)}`;
  if(/^aic\d/.test(id)) return `https://www.artic.edu/artworks/${id.slice(3)}`;
  if(/^cleveland\d/.test(id)) return `https://www.clevelandart.org/art/${id.slice(9)}`;
  if(/^harvard\d/.test(id)) return `https://harvardartmuseums.org/collections/object/${id.slice(7)}`;
  if(/^vaO/.test(id)) return `https://collections.vam.ac.uk/item/${id.slice(2)}`;
  return `https://www.google.com/search?q=${q}`; // smithsonian & anything else → reliable search
}
const MED_FAMILY={ "Oil paint":"paint","Tempera":"paint","Fresco":"paint","Watercolor":"paint","Ink":"paint","Woodblock print":"paint",
  "Bronze":"sculpt","Marble":"sculpt","Stone":"sculpt","Wood":"sculpt","Ivory":"sculpt","Jade":"sculpt",
  "Ceramic":"craft","Glass":"craft","Textile":"craft","Gold":"craft","Silver":"craft" };
const RELATED_MOV={
  "Renaissance":["Italian Renaissance","Mannerism","Baroque","Northern Renaissance"],
  "Italian Renaissance":["Renaissance","Mannerism","Baroque"],
  "Baroque":["Dutch Golden Age","Renaissance","Realism","Rococo"],
  "Dutch Golden Age":["Baroque","Realism"],
  "Post-Impressionism":["Pointillism","Impressionism","Symbolism","Expressionism","Fauvism"],

const MOVEMENTS={
  "Academic art":{dates:"c. 1840–1900",region:"Europe / North America",palette:["#6f4f38","#d8c3a5","#2b3550","#f2ead6"]},
  "American Realism":{dates:"c. 1900–1950",region:"United States",palette:["#1f2a35","#8b3f2f","#d8b46a","#e7e2d6"]},

let POOL=(window.ARTEFACTUM_POOL||[]).filter(x=>x&&x.img&&x.cats);
let ALL_MED=[], MOVS=[], CULTS=[], MOVEMENT_NAMES=[], ARTIST_POOL=[], artistStyle={}, styleRegion={}, styleCountry={};
const CANON_STYLE={"academic":"Academic art","land":"Land art","pop":"Pop art","surrealism":"Surrealism",
  "Post-impressionism":"Post-Impressionism","American realism":"American Realism","French realism":"French Realism",
  "Pre-Raphaelite Brotherhood":"Pre-Raphaelite","Early Netherlandish painting":"Early Netherlandish"};
function buildIndexes(){
  for(const p of POOL){ if(p.styleKind==='movement'&&CANON_STYLE[p.style]) p.style=CANON_STYLE[p.style]; }
  // overlay real "how well known" scores (Wikidata sitelinks + pageviews) so difficulty tiers track recognizability
  const FAME=window.ARTEFACTUM_FAME||{}; for(const p of POOL){ if(FAME[p.id]!=null) p.fame=FAME[p.id]; }
  // difficulty = real recognizability: global fame quartiles. Easy = what people actually recognize,
  // which is canon-skewed toward the West — surfaced as the teaching note on the start screen.
  POOL.sort((a,b)=>(b.fame||0)-(a.fame||0));
  MINY=Math.min(...POOL.map(p=>p.y));
  ALL_MED=[...new Set(POOL.map(p=>p.medium).filter(Boolean))];
  MOVS=[...new Set(POOL.filter(p=>p.styleKind==='movement').map(p=>p.style))];
  CULTS=[...new Set(POOL.filter(p=>p.styleKind==='culture').map(p=>p.style))];
  MOVEMENT_NAMES=[...new Set(POOL.filter(p=>p.styleKind==='movement'||p.styleKind==='culture').map(p=>p.style).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  const extra=["Claude Monet","Pierre-Auguste Renoir","Edgar Degas","Paul Cézanne","Paul Gauguin","Henri Matisse","Pablo Picasso","Salvador Dalí","Caravaggio","Raphael","Titian","Albrecht Dürer","Francisco Goya","Édouard Manet","Camille Pissarro","Gustav Klimt","Edvard Munch","Katsushika Hokusai","Utagawa Hiroshige","Diego Velázquez","El Greco","Peter Paul Rubens","Sandro Botticelli"];
  ARTIST_POOL=[...new Set([...POOL.map(p=>p.artist).filter(Boolean),...extra])].sort();
  artistStyle={}; styleRegion={}; styleCountry={};
  const placeCounts={};
  for(const p of POOL){ if(p.artist&&p.style){ const k=norm(p.artist); (artistStyle[k]=artistStyle[k]||new Set()).add(norm(p.style)); }
    if(p.style&&!styleRegion[p.style]) styleRegion[p.style]=p.region;
    if(p.style&&p.place){ const pc=placeCounts[p.style]=placeCounts[p.style]||{}; pc[p.place]=(pc[p.place]||0)+1; } }
  // dominant country per style → used to keep culture options from overlapping (e.g. "Meiji" + "Japan")
  for(const s in placeCounts){ styleCountry[s]=Object.entries(placeCounts[s]).sort((a,b)=>b[1]-a[1])[0][0]; }
}
// Easy = a small elite slice of the most-recognized works (everyone should at least KNOW them);
// the rest split across medium/hard/impossible. POOL is fame-sorted in buildIndexes().
function tierItems(i){
  // fame-sorted pool sliced by percentage so tiers scale with pool size:
  // Easy = top 15% (most recognizable), Medium 15–45%, Hard 45–72%, Impossible 72–100%.
  const n=POOL.length;
  // graduated: few famous works, many obscure → tiers widen toward Impossible
  const cuts=[0, Math.round(n*0.10), Math.round(n*0.35), Math.round(n*0.65), n];
  return POOL.slice(cuts[i], cuts[i+1]);
}

function bumpMastery(key,bucket,correct){const m=loadMastery();const b=m[bucket]; b[key]=b[key]||{correct:0,total:0}; b[key].total++; if(correct)b[key].correct++; saveMastery(m);}
function masteryLine(){
  const m=loadMastery(), all={...{},...m.byStyle,...m.byRegion};
  const entries=Object.entries(m.byStyle).filter(([,v])=>v.total>=2);
  if(!entries.length) return "";
  entries.sort((a,b)=>(b[1].correct/b[1].total)-(a[1].correct/a[1].total));
  const best=entries[0], worst=entries[entries.length-1];
  let s=`Sharp on <strong>${esc(best[0])}</strong> (${best[1].correct}/${best[1].total})`;
  if(worst!==best) s+=` &middot; <span class="weak">${esc(worst[0])} still slips (${worst[1].correct}/${worst[1].total})</span>`;
  return s;
}

// ---------- retention helpers ----------
function todayStr(){const d=new Date();return localDateStr(d);}
function localDateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseLocalDate(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function addDays(s,n){const d=parseLocalDate(s);d.setDate(d.getDate()+n);return localDateStr(d);}
function niceDate(s){return parseLocalDate(s).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}
function accessionFor(s){const d=parseLocalDate(s);return `NO. ${d.getFullYear()}·${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}
function seedHash(str){let h=1779033703^str.length;for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return (h>>>0)||1;}
function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296;};}
function seededShuffle(a,seed){const rnd=typeof seed==='function'?seed:mulberry32(seedHash(String(seed)));a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
// Deterministic daily with a NO-REPEAT window: build one stable permutation per tier, then advance
// ROUNDS works per day through it — so a work can't reappear until the whole permutation cycles
// (~pool/5 days: ~8 for Easy, ~16+ for the larger tiers). Same for everyone on a given date+tier.
function dailyItems(key,dateStr){
  // Prefer the FROZEN per-tier order (data/daily-order.js) so dailies never drift when fame/pool changes
  // and stay shareable/replayable. Falls back to the live fame-sorted rotation if the freeze is absent.
  const byId = window.__BYID || (window.__BYID = Object.fromEntries(POOL.map(p=>[p.id,p])));
  const frozen = (window.ARTEFACTUM_DAILY||{})[key];
  let perm;
  if(frozen && frozen.length>=ROUNDS){
    perm = frozen.map(id=>byId[id]).filter(Boolean);
  } else {
    const i=Math.max(0,TIERS.findIndex(t=>t.key===key));
    let arr=tierItems(i);
    if(arr.length<ROUNDS) arr=[...arr,...seededShuffle(POOL.filter(p=>!arr.includes(p)),`${key}|fill`)];
    perm=seededShuffle(arr,`gesso-rotation-v1|${key}`);
  }
  const len=perm.length; if(!len) return [];
  const day=Math.floor(parseLocalDate(dateStr).getTime()/86400000);
  const start=((day*ROUNDS)%len+len)%len;
  const out=[]; for(let k=0;k<ROUNDS;k++) out.push(perm[(start+k)%len]);
  return out;
}

function saveStreak(s){try{localStorage.setItem("artefactum.streak",JSON.stringify(s))}catch{}}
function recordDailyScore(dateStr,score,tierKey){const today=todayStr();const s=loadStreak();
  if(tierKey){s.byDay[dateStr]=s.byDay[dateStr]||{};s.byDay[dateStr][tierKey]=Math.max(+s.byDay[dateStr][tierKey]||0,score);}
  if(dateStr===today){const hadToday=s.playedDates.includes(today)||s.lastPlayed===today,prev=s.lastPlayed;if(!hadToday){s.current=prev===addDays(today,-1)?s.current+1:1;s.longest=Math.max(s.longest,s.current);s.lastPlayed=today;s.playedDates=[...new Set([...s.playedDates,today])].sort();}s.scores[today]=Math.max(+s.scores[today]||0,score);}
  saveStreak(s);return s;}

function renderFromPath(){
  const parts=location.pathname.split('/').filter(Boolean);
  if(!parts.length) return renderStart(undefined,false);
  if(parts[0]==='movement'&&parts[1]) return renderMovement(decodeURIComponent(parts[1]));
  if(parts[0]==='infinite'&&parts[1]&&TIERS.some(t=>t.key===parts[1])) return startInfinite(parts[1],false);
  if(['archive','streak','stats','glossary','collections'].includes(parts[0])) return route(parts[0],false);
  if(/^\d{4}-\d\d-\d\d$/.test(parts[0])){ const date=parts[0];
    if(parts[1]&&TIERS.some(t=>t.key===parts[1])){

}

function regionBars(){
  const dist={};for(const p of POOL)dist[p.region]=(dist[p.region]||0)+1;
  const order=["Europe","Asia","Africa","North America","South America","Oceania"];
  const colors={Europe:"#2230b8",Asia:"#cf9f3a",Africa:"#2f8f5b",["North America"]:"#7a86d8",["South America"]:"#c14b3a",Oceania:"#8a8472"};
  const total=POOL.length||1;
  const segs=order.filter(r=>dist[r]).map(r=>`<span style="width:${(dist[r]/total*100).toFixed(1)}%;background:${colors[r]}"></span>`).join('');
  const key=order.filter(r=>dist[r]).map(r=>`<span><i style="background:${colors[r]}"></i>${r} ${Math.round(dist[r]/total*100)}%</span>`).join('');
  return {segs,key,europe:Math.round((dist.Europe||0)/total*100)};
}

function setupAutocomplete(){
  const inp=document.getElementById('artist'),list=document.getElementById('aclist');let active=-1,items=[];
  const close=()=>{list.style.display='none';active=-1;};
  const render=q=>{const ql=q.toLowerCase().trim();items=ql?ARTIST_POOL.filter(a=>a.toLowerCase().includes(ql)).slice(0,8):[];
    if(!items.length){close();return;}
    list.innerHTML=items.map((a,i)=>`<div class="ac-item${i===active?' active':''}" data-i="${i}">${esc(a)}</div>`).join('');
    list.style.display='block';
    list.querySelectorAll('.ac-item').forEach(el=>el.onmousedown=ev=>{ev.preventDefault();pick(+el.dataset.i);});};
  const pick=i=>{inp.value=items[i];guess.artist=items[i];close();inp.focus();};
  inp.oninput=()=>{guess.artist=inp.value;active=-1;render(inp.value);};
  inp.onkeydown=e=>{if(list.style.display==='none')return;
    if(e.key==='ArrowDown'){active=Math.min(active+1,items.length-1);render(inp.value);e.preventDefault();}
    else if(e.key==='ArrowUp'){active=Math.max(active-1,0);render(inp.value);e.preventDefault();}
    else if(e.key==='Enter'&&active>=0){pick(active);e.preventDefault();}
    else if(e.key==='Escape')close();};
  inp.onblur=()=>setTimeout(close,120);
}

function wireHints(it){

  if(it.cats.includes('style')){const kind=(typeof CULTS!=='undefined'&&CULTS.includes(it.style))?'cultures':'movements';
    opts.push({key:"50/50",label:`rule out 2 ${kind}`,txt:()=>{const k=apply5050(it); return k>0?{text:`Two unlikely ${kind} removed from the options.`}:{text:`Already narrowed to two — no charge.`,charged:false};}});}
  if(it.cats.includes('artist')&&isNamedArtist(it.artist)) opts.push({key:"initials",label:"artist's initials",txt:()=>`The artist's initials are ${it.artist.split(/\s+/).filter(Boolean).map(w=>w[0].toUpperCase()+'.').join(' ')}.`});
  chips.innerHTML=opts.map(o=>`<button type="button" class="hintchip" data-k="${o.key}">${o.label}<span class="cost">&minus;${HINT_COST}</span></button>`).join('');
  const refresh=()=>{const rem=HINT_LIMIT-hintsUsed; left.textContent=rem;
    chips.querySelectorAll('.hintchip').forEach(b=>{if(!b.classList.contains('used'))b.disabled=rem<=0;});};
  chips.querySelectorAll('.hintchip').forEach(b=>{
    b.onclick=()=>{if(hintsUsed>=HINT_LIMIT||b.classList.contains('used'))return;
      const o=opts.find(x=>x.key===b.dataset.k); if(!o)return;
      const r=o.txt(), text=typeof r==='string'?r:r.text, charged=typeof r==='string'?true:r.charged!==false;
      b.classList.add('used'); b.disabled=true; out.style.display='block';

        out.insertAdjacentHTML('beforeend',`<div>${text} <span style="color:var(--accent)">−${HINT_COST}</span></div>`); }
      else out.insertAdjacentHTML('beforeend',`<div>${text}</div>`);

}
function centuryStr(y){const c=Math.floor((Math.abs(y)-1)/100)+1;const s=(c%100>10&&c%100<14)?"th":["th","st","nd","rd"][c%10]||"th";return `${c}${s} century${y<0?" BCE":""}`;}

// ---------- scoring ----------
function timeScore(diff){
  if(diff<=15)return{pts:MAX_CAT,bull:true};
  if(diff<=40)return{pts:2250}; if(diff<=90)return{pts:2000}; if(diff<=180)return{pts:1500};
  if(diff<=400)return{pts:850}; if(diff<=800)return{pts:350}; return{pts:0};
}
function score(){
  const it=game[idx], cells={}, D=dcfg();
  // when (leniency scales with difficulty; 🎯 bullseye always = within a real decade)
  const dy=Math.abs(guess.year-it.y), ts=timeScore(Math.round(dy/D.timeMult)), bull=!!ts.bull;
  cells.when={pts:ts.pts, bull, you:fmtYear(guess.year), actual:fmtYear(it.y),
    note:bull?(dy<=10?"right to the decade":"close enough — bullseye"):periodName(it,guess.year)===periodName(it,it.y)?"same period":`${dy} yrs off`};
  // where (distance falloff is gentler on easy, steeper on hard)
  let dist=null,sp=0,rad=radiusFor(it.place); if(guess.ll){dist=km(guess.ll.lat,guess.ll.lng,it.lat,it.lng);
    sp = dist<=rad ? MAX_CAT : Math.round(MAX_CAT*Math.exp(-(dist-rad)/D.distK));}
  cells.where={pts:sp, dist, you:guess.ll?"your pin":"no pin", actual:it.place,
    note:dist==null?"no pin dropped":dist<=rad?"right country":`${Math.round(dist)} km off`};
  // medium
  if(it.cats.includes('medium')){let s=0,note="no answer";
    if(guess.medium){ if(guess.medium===it.medium){s=MAX_CAT;note="exact";}
      else if(MED_FAMILY[guess.medium]&&MED_FAMILY[guess.medium]===MED_FAMILY[it.medium]){s=Math.round(MAX_CAT*0.5);note="same family";}
      else note="wrong";}
    cells.medium={pts:s,you:guess.medium||"—",actual:it.medium,note};}
  // style
  if(it.cats.includes('style')){let s=0,note="no answer";
    if(guess.style){ if(guess.style===it.style){s=MAX_CAT;note="exact";}
      else if((RELATED_MOV[it.style]||[]).includes(guess.style)){s=Math.round(MAX_CAT*D.relMov);note="related";}
      else note="wrong";}
    cells.style={pts:s,you:guess.style||"—",actual:it.style,note};}
  // artist (bonus)
  if(it.cats.includes('artist')){let s=0,note="no answer";const ga=norm(guess.artist);
    if(ga){ if(ga===norm(it.artist)||(lastName(guess.artist)&&lastName(guess.artist)===lastName(it.artist))){s=MAX_CAT;note="exact match";}
      else if(artistStyle[ga]&&it.style&&artistStyle[ga].has(norm(it.style))){s=Math.round(MAX_CAT*0.4);note="same school";}
      else note="not matched";}
    cells.artist={pts:s,bonus:true,you:guess.artist||"—",actual:it.artist,note};}
  // totals
  const coreCats=it.cats.filter(c=>c!=='artist');
  const baseMax=coreCats.length*MAX_CAT;
  const core=coreCats.reduce((a,c)=>a+cells[c].pts,0);
  const bonus=cells.artist?cells.artist.pts:0;
  const hintPen=guess.hints.size*HINT_COST;
  const coreNet=Math.max(0,core-hintPen);
  // mastery — only the genuine daily play counts (not infinite grind or archive replay)
  if(!infinite&&!runArchive){
    if(it.cats.includes('style')) bumpMastery(it.style,'byStyle',cells.style.pts===MAX_CAT);
    bumpMastery(it.region,'byRegion',cells.where.pts>=MAX_CAT*0.75);
  }
  results.push({it,cells,coreCats,baseMax,coreNet,bonus,hintPen,hints:guess.hints.size,guess:{...guess}});
  renderReveal(results[results.length-1]);
}

function studyFor(it){
  const w=CUES.work&&CUES.work[it.id]; if(w&&w.why) return w; // per-work note (Codex-generated)
  return (it.styleKind==='movement'&&CUES.style[it.style]) || (it.styleKind==='culture'&&CUES.culture[it.style])
    || CUES.region[it.region] || {why:`Made in ${it.place||it.region}, c. ${fmtYear(it.y)}.`,cues:[]};
}
function swatchColor(f){return f>=.75?'var(--full)':f>=.35?'var(--partial)':'var(--miss)';}
function swatchGlyph(f){return f>=.75?'✓':f>=.35?'◐':'✕';}

function setupReportFlow(it,study){

  const cd=document.getElementById('countdown');if(cd){const tick=()=>{const n=new Date(),m=new Date(n);m.setHours(24,0,0,0);let ms=m-n,h=Math.floor(ms/36e5);ms-=h*36e5;let min=Math.floor(ms/6e4);ms-=min*6e4;let sec=Math.floor(ms/1e3);cd.textContent=[h,min,sec].map(x=>String(x).padStart(2,'0')).join(':');};tick();countdownTimer=setInterval(tick,1000);}
}
const TIERDOT={easy:'#aeb6e3',medium:'#7480d4',hard:'#3f4cbe',impossible:'#232c84'};
function renderDayView(ds,push=true){
  clearTimers(); if(push)pushNav({v:'pick',date:ds});
  const s=loadStreak(), today=todayStr(), bd=s.byDay[ds]||{}, done=TIERS.filter(t=>bd[t.key]!=null).length, canNext=ds<today;
  const rows=TIERS.map(t=>{const sc=bd[t.key], isDone=sc!=null;
    return `<div class="dayrow"><i class="td" style="width:13px;height:13px;background:${TIERDOT[t.key]};border-color:${TIERDOT[t.key]}"></i>
      <div style="flex:1;min-width:0"><div style="font:700 14px Archivo,sans-serif">${t.label}</div><div class="mono" style="font-size:11px;color:var(--muted)">${esc(t.blurb)}</div></div>
      ${isDone?`<span class="mono" style="color:var(--full);font-size:12px;white-space:nowrap">&check; ${sc.toLocaleString()}</span><button class="btn2 dayplay" data-k="${t.key}" style="padding:6px 12px">Replay</button>`:`<button class="btn dayplay" data-k="${t.key}" style="width:auto;padding:8px 18px">Play</button>`}</div>`;}).join('');
  document.getElementById('stage').innerHTML=`${header(ROUNDS,-1,false)}<div class="sheet"><div class="retwrap"><div class="retcard">
    <div class="retcap"><button class="moveback" id="bkarch">&lsaquo; Archive</button>
      <div class="daypager"><button class="btn2" id="pday" data-ds="${ds}" aria-label="Previous day" style="padding:5px 11px">&lsaquo;</button><span class="mono" style="font-weight:600;letter-spacing:.04em">${niceDate(ds)}</span><button class="btn2" id="nday" aria-label="Next day" ${canNext?'':'disabled'} style="padding:5px 11px">&rsaquo;</button></div></div>
    <div style="padding:16px 16px 2px"><div style="font:800 22px Archivo,sans-serif">${niceDate(ds)}</div><div class="mono" style="font-size:11px;color:var(--muted);margin-top:3px">${accessionFor(ds)} &middot; ${done} / 4 tiers filed</div></div>
    <div class="daygrid">${rows}</div>
  </div>${ATTRIB}</div></div>`;
  document.getElementById('bkarch').onclick=()=>renderArchive();
  document.getElementById('pday').onclick=()=>renderDayView(addDays(ds,-1));
  const nd=document.getElementById('nday'); if(nd&&canNext)nd.onclick=()=>renderDayView(addDays(ds,1));
  document.querySelectorAll('.dayplay').forEach(b=>b.onclick=()=>startGame(b.dataset.k, ds===today?undefined:ds));
  if(!window.__dayKey){window.__dayKey=true;document.addEventListener('keydown',e=>{const pd=document.getElementById('pday');if(!pd)return;const d=pd.dataset.ds;if(e.key==='ArrowLeft')renderDayView(addDays(d,-1));else if(e.key==='ArrowRight'){const n=document.getElementById('nday');if(n&&!n.disabled)renderDayView(addDays(d,1));}});}
}
function renderArchive(monthDate){
  clearTimers();
  const s=loadStreak(), today=todayStr(), td=parseLocalDate(today);archiveMonth=monthDate||archiveMonth||new Date(td.getFullYear(),td.getMonth(),1);
  const y=archiveMonth.getFullYear(),m=archiveMonth.getMonth(),first=new Date(y,m,1),last=new Date(y,m+1,0),canNext=y<td.getFullYear()||m<td.getMonth();
  let cells='';for(let i=0;i<first.getDay();i++)cells+='<div class="daycell blank"></div>';
  for(let d=1;d<=last.getDate();d++){const ds=localDateStr(new Date(y,m,d)),dt=parseLocalDate(ds),bd=s.byDay[ds]||{},played=Object.keys(bd).length>0||s.playedDates.includes(ds),isToday=ds===today,future=dt>td;let cls=future?'future':isToday?'today':played?'played':'missed';
    let dots=future?'':`<span class="tierdots">${TIERS.map(t=>{const done=bd[t.key]!=null;return `<i class="td" style="${done?`background:${TIERDOT[t.key]};border-color:${TIERDOT[t.key]}`:'background:transparent;border-color:#d3ccbb'}"></i>`;}).join('')}</span>`;
    let click=future?'':` data-date="${ds}"`;cells+=`<button class="daycell ${cls}"${click}><span class="dn">${d}</span>${dots}</button>`;}
  document.getElementById('stage').innerHTML=`${header(ROUNDS,-1,false)}<div class="sheet"><div class="retwrap"><div class="retcard">
    <div class="retcap"><span class="ttl">Archive</span><div style="display:flex;align-items:center;gap:14px"><button class="btn2" id="prevmo" style="padding:5px 10px">‹</button><span class="mono" style="font-weight:600;letter-spacing:.08em">${archiveMonth.toLocaleDateString(undefined,{month:'long',year:'numeric'}).toUpperCase()}</span><button class="btn2" id="nextmo" ${canNext?'':'disabled'} style="padding:5px 10px">›</button></div></div>
    <div class="dowgrid"><div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div></div><div class="archivegrid">${cells}</div>
    <div class="legend"><span style="display:flex;align-items:center;gap:5px">${TIERS.map(t=>`<i class="td" style="width:8px;height:8px;background:${TIERDOT[t.key]};border-color:${TIERDOT[t.key]}"></i>`).join('')}&nbsp;easy → impossible · filled = filed</span><span style="margin-left:auto">Tap any day to play / replay</span></div>
  </div>${ATTRIB}</div></div>`;
  document.getElementById('prevmo').onclick=()=>{archiveMonth=new Date(y,m-1,1);renderArchive(archiveMonth);};
  document.getElementById('nextmo').onclick=()=>{if(canNext){archiveMonth=new Date(y,m+1,1);renderArchive(archiveMonth);}};
  document.querySelectorAll("[data-date]").forEach(b=>b.onclick=()=>renderDayView(b.dataset.date));
}
function masteryEntries(){
  const m=loadMastery(), all=[...Object.entries(m.byStyle||{}),...Object.entries(m.byRegion||{})].filter(([,v])=>v&&v.total>=2);
  return all.map(([k,v])=>({k,correct:v.correct,total:v.total,pct:v.total?v.correct/v.total:0})).sort((a,b)=>b.pct-a.pct||b.total-a.total);
}
function barHTML(item,weak){const pct=Math.round(item.pct*100),fill=weak?(pct<35?'weakfill':'midfill'):'';return `<div class="mbar"><div class="top"><span>${esc(item.k)}</span><span>${item.correct}/${item.total}</span></div><div class="track"><div class="fill ${fill}" style="width:${pct}%"></div></div></div>`;}
function renderStats(){
  clearTimers();
  const s=loadStreak(), entries=masteryEntries(), strong=entries.slice(0,3), weak=entries.slice().reverse().slice(0,3), avg=avgScore(s), perfect=Object.values(s.scores||{}).filter(v=>+v>=50000).length;
  const best=strong[0], worst=weak[0], note=best&&worst?`You nail <strong>${esc(best.k)}</strong>${strong[1]?` &amp; <strong>${esc(strong[1].k)}</strong>`:''} — but <span class="weak">${esc(worst.k)}</span> keeps slipping.`:'File more works to build a clearer study note.';
  document.getElementById('stage').innerHTML=`${header(ROUNDS,-1,false)}<div class="sheet"><div class="retwrap"><div class="retcard">
    <div class="retcap"><span class="ttl">Your stats</span><span class="accn">${s.playedDates.length} days filed</span></div>
    <div class="statsgrid"><div class="statile"><div class="n">${s.current}</div><div class="l">Streak</div></div><div class="statile"><div class="n">${s.longest}</div><div class="l">Longest</div></div><div class="statile"><div class="n">${shortScore(avg)}</div><div class="l">Avg score</div></div><div class="statile"><div class="n">${perfect}</div><div class="l">🎯 Perfect</div></div></div>
    <div class="mastergrid"><div><div class="kick" style="color:var(--full);margin-bottom:12px">Strongest</div>${strong.length?strong.map(x=>barHTML(x,false)).join(''):'<div class="mono" style="color:var(--muted);font-size:12px">No mastery data yet.</div>'}</div>
    <div><div class="kick" style="color:var(--miss);margin-bottom:12px">Needs work</div>${weak.length?weak.map(x=>barHTML(x,true)).join(''):'<div class="mono" style="color:var(--muted);font-size:12px">No weak spots yet.</div>'}</div></div>
    <div class="study" style="margin-top:14px"><div class="why" style="font-size:15px;margin:0">${note}</div></div>
  </div>${ATTRIB}</div></div>`;
}
function renderFinal(){
  clearTimers();
  const summary=resultSummary(), {grand,gmax,bonus,share}=summary;
  lastFinal={...summary,results:results.slice(),tier,date:runDate||todayStr()};
  recordDailyScore(runDate||todayStr(),grand,tier); // records per-tier completion (any date); streak credit only for today
  // matrix
  const cols=["when","where","medium","style","artist"];
  const head=cols.map(c=>`<th>${iconHTML(c)}${catShort(c)}</th>`).join('');
  const rows=results.map(r=>`<tr><td class="rl">${esc(r.it.title)}</td>${cols.map(c=>{
    if(!r.it.cats.includes(c))return `<td></td>`;
    const f=r.cells[c].pts/MAX_CAT;return `<td>${swatchBox(f,'msq')}</td>`;}).join('')}</tr>`).join('');
  const ml=masteryLine();
  document.getElementById('stage').innerHTML=`${header(ROUNDS,-1,true)}<div class="sheet">

    <div class="banner"><div><div class="kick">Game filed &middot; ${ROUNDS} of ${ROUNDS}</div>
      <div style="display:flex;align-items:baseline;gap:9px;margin-top:7px;flex-wrap:wrap">
        <span class="big" data-cu="${grand}">${grand.toLocaleString()}</span>
        <span class="mono" style="font-size:13px;color:var(--muted)">/ ${gmax.toLocaleString()} pts${bonus?` &middot; incl. +${bonus.toLocaleString()} bonus`:''}</span></div></div></div>
    <div class="matrix"><table><thead><tr><th style="text-align:left">Work</th>${head}</tr></thead><tbody>${rows}</tbody></table></div>
    <div style="padding:18px 24px 8px"><div class="kick" style="margin-bottom:8px">Share</div>
      <div class="sharebox" id="share">${esc(share)}</div></div>
    ${ml?`<div class="study"><div class="kick">Session mastery</div><div class="why" style="font-size:15px">${ml}</div></div>`:''}
    <div style="padding:8px 24px 24px"><button class="btn" id="copy">Copy result to share</button>
      <button class="btn" id="imageShare" style="margin-top:10px">Share / Download image</button>
      <button class="btn" id="copylink" style="margin-top:10px">Copy link to this puzzle</button>
      <button class="btn" id="streak" style="background:transparent;border:1.5px solid var(--accent);color:var(--accent);margin-top:10px">${runArchive?'Back to streak':'Come back tomorrow'}</button>
      <button class="btn" id="again" style="background:transparent;border:1.5px solid var(--accent);color:var(--accent);margin-top:10px">Play again</button>${ATTRIB}</div>
  </div>`;
  countUps();
  document.getElementById('copy').onclick=()=>navigator.clipboard.writeText(resultSummary().share).then(()=>document.getElementById('copy').textContent='Copied ✓');
  document.getElementById('imageShare').onclick=()=>downloadShareImage(document.getElementById('imageShare'),lastFinal);
  document.getElementById('copylink').onclick=()=>{const b=document.getElementById('copylink');const url=`${location.origin}/${runDate||todayStr()}/${tier}`;navigator.clipboard.writeText(url).then(()=>{b.textContent='Link copied ✓';setTimeout(()=>b.textContent='Copy link to this puzzle',1600);});};
  document.getElementById('streak').onclick=renderStreak;
  document.getElementById('again').onclick=()=>renderStart();
}

// ---------- zoom lightbox ----------
function hiRes(src){
  if(src.includes("images.metmuseum.org")) return src.replace("/web-large/","/original/"); // Met full-res
  return src.replace(/width=\d+/,"width=2000"); // Wikimedia Commons larger render
}
function openZoom(src){
  const lb=document.createElement('div');lb.className='lightbox';
  const img=document.createElement('img');img.src=hiRes(src);img.draggable=false;
  let scale=1,tx=0,ty=0,drag=false,sx=0,sy=0;const apply=()=>img.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  img.onclick=e=>{e.stopPropagation();if(scale===1)scale=2.5;else{scale=1;tx=0;ty=0;}img.style.cursor=scale>1?'grab':'zoom-in';apply();};
  img.onmousedown=e=>{if(scale===1)return;drag=true;sx=e.clientX-tx;sy=e.clientY-ty;img.style.cursor='grabbing';e.preventDefault();};
  const mv=e=>{if(!drag)return;tx=e.clientX-sx;ty=e.clientY-sy;apply();};const up=()=>{drag=false;if(scale>1)img.style.cursor='grab';};
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  const close=()=>{lb.remove();window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);document.removeEventListener('keydown',esc2);};
  const esc2=e=>{if(e.key==='Escape')close();};document.addEventListener('keydown',esc2);
  lb.onclick=close;const x=document.createElement('button');x.className='lb-close';x.textContent='✕';x.onclick=e=>{e.stopPropagation();close();};
  const hint=document.createElement('div');hint.className='lb-hint';hint.textContent='Click image to zoom · drag to pan · Esc to close';
  lb.append(img,x,hint);document.body.appendChild(lb);
}
document.addEventListener('click',e=>{if(e.target.classList&&e.target.classList.contains('art'))openZoom(e.target.src);});

else{ buildIndexes();
