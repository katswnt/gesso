<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Artefactum — the daily art-guessing game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --bg:#e9e7e0; --surface:#f6f4ee; --surface-strong:#edeae0; --ink:#1b1916; --muted:#8a8472;
    --faint:#a39d8c; --ink-soft:#3a362d; --line:#e3ded1; --line-card:#ddd8ca; --accent:#2230b8;
    --accent-underline:#b0b5e0; --study-bg:#eceffb; --study-border:#d3d8ef;
    --full:#2f8f5b; --partial:#cf9f3a; --miss:#c14b3a; --track:#dcd6c6;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Archivo',sans-serif;
    -webkit-font-smoothing:antialiased}
  .leaflet-container{background:#dfe2e8;font-family:inherit}
  .leaflet-control-attribution{display:none}
  .mono{font-family:'IBM Plex Mono',monospace}
  .wrap{max-width:760px;margin:0 auto;padding:26px 18px 70px}
  .card{border-radius:10px;overflow:hidden;background:var(--surface);border:1px solid var(--line-card);
    box-shadow:0 30px 70px rgba(35,32,26,.16)}
  /* header */
  .hd{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;
    border-bottom:1.5px solid var(--ink);background:var(--surface-strong)}
  .hd .brand{display:flex;align-items:baseline;gap:13px}
  .wordmark{font:700 19px 'Archivo';letter-spacing:-.01em}
  .accn{font:500 11px 'IBM Plex Mono',monospace;color:var(--muted)}
  .hd .right{display:flex;align-items:center;gap:18px}
  .pips{display:flex;gap:5px}
  .pip{width:22px;height:5px;border-radius:2px;background:var(--line-card)}
  .pip.done{background:var(--accent)} .pip.cur{background:var(--ink)}
  .stamp{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--accent);
    border:1.5px solid var(--accent);padding:4px 10px;border-radius:3px;transform:rotate(-2deg);display:inline-block;text-transform:uppercase}
  /* generic */
  .kick{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  .fieldlabel{display:flex;align-items:center;gap:8px;margin-bottom:11px}
  .fieldlabel .ix{font:600 10px 'IBM Plex Mono',monospace;color:var(--accent);letter-spacing:.1em}
  .fieldlabel .nm{font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}
  .fieldlabel .rule{flex:1;height:1px;background:var(--line)}
  .fieldlabel .hintrule{font:10px 'IBM Plex Mono',monospace;color:var(--faint)}
  .plate{background:#fff;border:1px solid var(--line);border-radius:3px;padding:10px;box-shadow:0 10px 26px rgba(35,32,26,.1)}
  .plate img{display:block;width:100%;border-radius:1px;cursor:zoom-in}
  .cap{display:flex;justify-content:space-between;margin-top:10px;font:500 11px 'IBM Plex Mono',monospace;color:var(--muted)}
  .btn{width:100%;padding:15px;border:none;border-radius:5px;background:var(--accent);color:#fff;
    font:700 12px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;cursor:pointer}
  .btn:hover{filter:brightness(1.08)}
  .btn2{background:transparent;border:1.5px solid var(--accent);color:var(--accent);
    font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;padding:9px 15px;border-radius:4px;cursor:pointer}
  .btn2:disabled{opacity:.4;cursor:default}
  .attrib{text-align:center;margin-top:15px;font:11px 'IBM Plex Mono',monospace;color:var(--faint)}
  .attrib a{color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent-underline)}
  .year{font:700 27px 'Archivo';letter-spacing:-.01em}
  .eratag{font:500 12px 'IBM Plex Mono',monospace;color:var(--muted)}
  input[type=range]{width:100%;accent-color:var(--accent);background:var(--track);cursor:pointer;
    -webkit-appearance:none;appearance:none;height:4px;border-radius:3px;outline:none}
  .minmax{display:flex;justify-content:space-between;margin-top:6px;font:10px 'IBM Plex Mono',monospace;color:var(--faint)}
  .pills{display:flex;flex-wrap:wrap;gap:7px}
  .pill{background:#fff;color:var(--ink);border:1px solid var(--line-card);padding:8px 13px;border-radius:4px;
    cursor:pointer;font:500 12px 'IBM Plex Mono',monospace}
  .pill.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
  .pill.ruledout{opacity:.3;text-decoration:line-through;pointer-events:none}
  input[type=text]{width:100%;padding:11px 13px;background:#fff;border:1px solid var(--line-card);
    border-radius:4px;color:var(--ink);font:13px 'IBM Plex Mono',monospace;outline:none}
  input[type=text]:focus{border-color:var(--accent)}
  .ac{position:relative}
  .ac-list{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:1000;background:#fff;
    border:1px solid var(--line-card);border-radius:4px;overflow:hidden}
  .ac-item{padding:9px 13px;color:var(--ink);font:12px 'IBM Plex Mono',monospace;cursor:pointer;border-top:1px solid #eee9dc}
  .ac-item:first-child{border-top:none}
  .ac-item.active,.ac-item:hover{background:var(--accent);color:#fff}
  .hinttext{animation:afFade .3s ease;margin-top:11px;font:13px/1.5 'IBM Plex Mono',monospace;
    color:#6f6a5b;border-left:2px solid var(--accent);padding-left:13px}
  .hinttext div{padding:2px 0}
  /* reveal */
  .banner{padding:22px 24px;background:linear-gradient(180deg,#eceffb,#f6f4ee);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .big{font:800 42px 'Archivo';letter-spacing:-.02em}
  .swatchrow{display:flex;gap:11px}
  .swatch{text-align:center}
  .swatch .sq{width:36px;height:36px;border-radius:8px}
  .swatch .lb{font:600 8px 'IBM Plex Mono',monospace;letter-spacing:.05em;color:var(--faint);margin-top:5px}
  .revealgrid{padding:24px;display:grid;grid-template-columns:.92fr 1.08fr;gap:26px;border-bottom:1px solid var(--line)}
  .filed{position:absolute;top:18px;right:18px;font:700 9px 'IBM Plex Mono',monospace;letter-spacing:.1em;
    color:#fff;background:var(--accent);padding:5px 9px;border-radius:3px;transform:rotate(4deg)}
  .worktitle{font:700 19px/1.15 'Archivo';letter-spacing:-.01em;margin-top:14px}
  .metarow{display:flex;gap:10px}
  .metarow .k{flex:0 0 62px;font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.08em;color:var(--accent)}
  .metarow .v{font:13px 'IBM Plex Mono',monospace;color:var(--ink)}
  .telllink{display:inline-block;margin-top:16px;font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.07em;
    text-transform:uppercase;color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent-underline);padding-bottom:2px}
  .scrow{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
  .scrow:last-child{border-bottom:none}
  .scrow .sq{width:24px;height:24px;border-radius:5px;flex:0 0 auto}
  .scrow .mid{flex:1;min-width:0}
  .scrow .t1{font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--ink)}
  .scrow .t2{font:11px 'IBM Plex Mono',monospace;color:var(--muted);margin-top:2px}
  .scrow .pts{text-align:right;flex:0 0 auto}
  .scrow .pts .n{font:700 17px 'Archivo';color:var(--ink)}
  .scrow .pts .d{font:9px 'IBM Plex Mono',monospace;color:var(--faint)}
  .study{margin:24px;background:var(--study-bg);border:1px solid var(--study-border);border-radius:8px;padding:22px}
  .study .why{font:500 18px/1.42 'Archivo';color:var(--ink);max-width:600px;margin:13px 0 20px}
  .cue{display:flex;gap:12px;align-items:flex-start;padding:5px 0}
  .cue .num{flex:0 0 16px;font:700 13px 'Archivo';color:var(--accent)}
  .cue .tx{font:13px/1.45 'IBM Plex Mono',monospace;color:var(--ink-soft)}
  .mastery{margin-top:20px;padding-top:16px;border-top:1px solid var(--study-border);
    display:flex;align-items:center;gap:13px;flex-wrap:wrap;font:12px 'IBM Plex Mono',monospace;color:var(--ink)}
  .weak{color:var(--miss)}
  /* start */
  .hero{padding:30px 24px 6px;text-align:center}
  .hero .big2{font:800 40px 'Archivo';letter-spacing:-.02em}
  .hero .tag{font:500 12px 'IBM Plex Mono',monospace;color:var(--muted);margin-top:8px;letter-spacing:.04em}
  .difs{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:22px 24px}
  .dif{text-align:left;background:var(--surface);border:1px solid var(--line-card);border-radius:8px;padding:18px;cursor:pointer;transition:.12s;font-family:inherit}
  .dif:hover{border-color:var(--accent);transform:translateY(-2px)}
  .dif .tier{font:600 10px 'IBM Plex Mono',monospace;color:var(--accent);letter-spacing:.1em}
  .dif .nm{font:700 20px 'Archivo';margin:5px 0 4px}
  .dif .bl{font:12px 'IBM Plex Mono',monospace;color:var(--muted)}
  .dif .ct{font:11px 'IBM Plex Mono',monospace;color:var(--accent);margin-top:9px}
  .collnote{margin:4px 24px 24px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px 18px}
  .collnote .h{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .collnote p{margin:0;font:12px/1.6 'IBM Plex Mono',monospace;color:var(--ink-soft)}
  .bars{display:flex;height:8px;border-radius:3px;overflow:hidden;margin:10px 0 8px}
  .bars span{display:block}
  .barkey{display:flex;flex-wrap:wrap;gap:10px;font:10px 'IBM Plex Mono',monospace;color:var(--muted)}
  .barkey i{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
  /* results */
  .matrix{padding:6px 24px 4px;overflow-x:auto}
  .matrix table{border-collapse:collapse;width:100%}
  .matrix th{font:600 9px 'IBM Plex Mono',monospace;letter-spacing:.08em;color:var(--faint);padding:6px 4px;text-transform:uppercase}
  .matrix td{padding:4px}
  .matrix .rl{font:11px 'IBM Plex Mono',monospace;color:var(--muted);text-align:left;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .msq{width:26px;height:26px;border-radius:5px;margin:0 auto}
  .sharebox{font-family:'IBM Plex Mono',monospace;background:#fff;border:1px solid var(--line-card);
    border-radius:6px;padding:14px;white-space:pre;line-height:1.5;font-size:14px;overflow-x:auto}
  /* zoom */
  .lightbox{position:fixed;inset:0;background:rgba(20,18,14,.94);z-index:5000;display:flex;align-items:center;justify-content:center;cursor:zoom-out;overflow:hidden}
  .lightbox img{max-width:94vw;max-height:94vh;cursor:zoom-in;will-change:transform;user-select:none}
  .lb-close{position:fixed;top:14px;right:20px;background:none;border:none;color:#fff;font-size:30px;cursor:pointer;line-height:1}
  .lb-hint{position:fixed;bottom:16px;left:0;right:0;text-align:center;color:#cfc6b4;font:13px 'IBM Plex Mono',monospace;pointer-events:none}
  @keyframes afFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media(max-width:680px){
    .wrap{padding:14px 0 60px}
    .revealgrid{grid-template-columns:1fr;gap:20px;padding:17px}
    .playgrid{grid-template-columns:1fr!important}
    .difs{grid-template-columns:1fr}
    .big{font-size:34px}.hero .big2{font-size:30px}.year{font-size:23px}
  }
</style>
</head>
<body>
<div class="wrap"><div id="stage"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data/cues.js"></script>
<script src="data/pool.js"></script>
<script>
"use strict";
const MAX_CAT=2500, ROUNDS=5, HINT_COST=500, HINT_LIMIT=3;
const CUES = window.ARTEFACTUM_CUES || {style:{},culture:{},region:{},medium:{}};

// ---------- helpers ----------
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function km(a,b,c,d){const R=6371,r=Math.PI/180,dl=(c-a)*r,dn=(d-b)*r,h=Math.sin(dl/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dn/2)**2;return 2*R*Math.asin(Math.sqrt(h));}
function fmtYear(y){return y<0?`${-y} BC`:`AD ${y}`;}
const EPOCHS=[["Antiquity",-3000,500],["Medieval",500,1400],["Early Modern",1400,1800],["Modern",1800,1945],["Contemporary",1945,2026]];
function epochName(y){for(const[n,a,b]of EPOCHS)if(y<b)return n;return "Contemporary";}
function emFor(f){return f>=.75?"🟩":f>=.35?"🟨":"🟥";}
function norm(s){return (s||"").toLowerCase().replace(/[^a-z ]/g,'').trim();}
function lastName(s){return norm(s).split(' ').pop();}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function accession(){const d=new Date();const mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return `NO. ${d.getFullYear()}·${mm}${dd}`;}
function sourceURL(it){
  if(it.src==='met') return `https://www.metmuseum.org/art/collection/search/${it.id.slice(3)}`;
  if(it.id&&it.id.indexOf('wikidata.org')>=0) return it.id.replace('http://','https://');
  return `https://commons.wikimedia.org/`;
}
const MED_FAMILY={ "Oil paint":"paint","Tempera":"paint","Fresco":"paint","Watercolor":"paint","Ink":"paint","Woodblock print":"paint",
  "Bronze":"sculpt","Marble":"sculpt","Stone":"sculpt","Wood":"sculpt","Ivory":"sculpt","Jade":"sculpt",
  "Ceramic":"craft","Glass":"craft","Textile":"craft","Gold":"craft","Silver":"craft" };
const RELATED_MOV={
  "Renaissance":["Italian Renaissance","Mannerism","Baroque","Northern Renaissance"],
  "Italian Renaissance":["Renaissance","Mannerism","Baroque"],
  "Baroque":["Dutch Golden Age","Renaissance","Realism","Rococo"],
  "Dutch Golden Age":["Baroque","Realism"],
  "Post-Impressionism":["Pointillism","Impressionism","Symbolism","Expressionism","Fauvism"],
  "Impressionism":["Post-Impressionism","Pointillism","Realism"],
  "Pointillism":["Post-Impressionism","Impressionism"],
  "Symbolism":["Expressionism","Post-Impressionism","Art Nouveau"],
  "Expressionism":["Symbolism","Fauvism","Post-Impressionism"],
  "Realism":["Baroque","Dutch Golden Age","Impressionism"],
  "Romanticism":["Neoclassicism","Realism"],
  "Neoclassicism":["Romanticism","Renaissance"],
};
function catLabel(c,it){
  if(c==='when')return "When made"; if(c==='where')return "Where made"; if(c==='medium')return "Medium";
  if(c==='artist')return "Artist"; if(c==='style')return it&&it.styleKind==='culture'?"Culture":"Movement"; return c;
}
function catShort(c,it){
  if(c==='when')return "WHEN"; if(c==='where')return "WHERE"; if(c==='medium')return "MED.";
  if(c==='artist')return "ARTIST"; if(c==='style')return it&&it.styleKind==='culture'?"CULT.":"MOV."; return c;
}

// ---------- data / indexes ----------
let POOL=(window.ARTEFACTUM_POOL||[]).filter(x=>x&&x.img&&x.cats);
let ALL_MED=[], MOVS=[], CULTS=[], ARTIST_POOL=[], artistStyle={};
function buildIndexes(){
  POOL.sort((a,b)=>(b.fame||0)-(a.fame||0));
  ALL_MED=[...new Set(POOL.map(p=>p.medium).filter(Boolean))];
  MOVS=[...new Set(POOL.filter(p=>p.styleKind==='movement').map(p=>p.style))];
  CULTS=[...new Set(POOL.filter(p=>p.styleKind==='culture').map(p=>p.style))];
  const extra=["Claude Monet","Pierre-Auguste Renoir","Edgar Degas","Paul Cézanne","Paul Gauguin","Henri Matisse","Pablo Picasso","Salvador Dalí","Caravaggio","Raphael","Titian","Albrecht Dürer","Francisco Goya","Édouard Manet","Camille Pissarro","Gustav Klimt","Edvard Munch","Katsushika Hokusai","Utagawa Hiroshige","Diego Velázquez","El Greco","Peter Paul Rubens","Sandro Botticelli"];
  ARTIST_POOL=[...new Set([...POOL.map(p=>p.artist).filter(Boolean),...extra])].sort();
  artistStyle={};
  for(const p of POOL){ if(p.artist&&p.style){ const k=norm(p.artist); (artistStyle[k]=artistStyle[k]||new Set()).add(norm(p.style)); } }
}
function tierItems(i){const n=POOL.length;return POOL.slice(Math.floor(i*n/4),Math.floor((i+1)*n/4));}
const TIERS=[{key:"easy",label:"Easy",blurb:"World-famous masterpieces"},{key:"medium",label:"Medium",blurb:"Well-known works"},
  {key:"hard",label:"Hard",blurb:"For art-history buffs"},{key:"impossible",label:"Impossible",blurb:"Deep cuts & obscurities"}];

// ---------- mastery ----------
function loadMastery(){try{return JSON.parse(localStorage.getItem("artefactum.mastery"))||{byStyle:{},byRegion:{}}}catch{return{byStyle:{},byRegion:{}}}}
function saveMastery(m){try{localStorage.setItem("artefactum.mastery",JSON.stringify(m))}catch{}}
function bumpMastery(key,bucket,correct){const m=loadMastery();const b=m[bucket]; b[key]=b[key]||{correct:0,total:0}; b[key].total++; if(correct)b[key].correct++; saveMastery(m);}
function masteryLine(){
  const m=loadMastery(), all={...{},...m.byStyle,...m.byRegion};
  const entries=Object.entries(m.byStyle).filter(([,v])=>v.total>=2);
  if(!entries.length) return "";
  entries.sort((a,b)=>(b[1].correct/b[1].total)-(a[1].correct/a[1].total));
  const best=entries[0], worst=entries[entries.length-1];
  let s=`Sharp on <strong>${esc(best[0])}</strong> (${best[1].correct}/${best[1].total})`;
  if(worst!==best) s+=` &middot; <span class="weak">${esc(worst[0])} still slips (${worst[1].correct}/${worst[1].total})</span>`;
  return s;
}

// ---------- game state ----------
let game=[], idx=0, results=[], guess={}, tier='medium', hintsUsed=0, map, marker;

function pipsHTML(filled,cur){let s='';for(let i=0;i<ROUNDS;i++)s+=`<span class="pip ${i<filled?'done':i===cur?'cur':''}"></span>`;return s;}
function header(filled,cur,withStamp){
  return `<div class="hd"><div class="brand"><span class="wordmark">Artefactum</span><span class="accn">${accession()}</span></div>
    <div class="right"><div class="pips">${pipsHTML(filled,cur)}</div>${withStamp?`<span class="stamp">${tier}</span>`:''}</div></div>`;
}
const ATTRIB=`<div class="attrib">Made by <a href="https://twitter.com/katswint" target="_blank" rel="noopener">Kat Swint</a> with a little help from Claude</div>`;

// ---------- START ----------
function regionBars(){
  const dist={};for(const p of POOL)dist[p.region]=(dist[p.region]||0)+1;
  const order=["Europe","Asia","Africa","North America","South America","Oceania"];
  const colors={Europe:"#2230b8",Asia:"#cf9f3a",Africa:"#2f8f5b",["North America"]:"#7a86d8",["South America"]:"#c14b3a",Oceania:"#8a8472"};
  const total=POOL.length||1;
  const segs=order.filter(r=>dist[r]).map(r=>`<span style="width:${(dist[r]/total*100).toFixed(1)}%;background:${colors[r]}"></span>`).join('');
  const key=order.filter(r=>dist[r]).map(r=>`<span><i style="background:${colors[r]}"></i>${r} ${Math.round(dist[r]/total*100)}%</span>`).join('');
  return {segs,key,europe:Math.round((dist.Europe||0)/total*100)};
}
function renderStart(){
  const b=regionBars();
  document.getElementById('stage').innerHTML=`<div class="card">
    ${header(0,-1,false)}
    <div class="hero"><div class="big2">Artefactum</div>
      <div class="tag">The daily art-guessing game &middot; ${accession()} &middot; five works</div></div>
    <div class="difs">
      ${TIERS.map((t,i)=>`<button class="dif" data-k="${t.key}"><div class="tier">TIER 0${i+1}</div>
        <div class="nm">${t.label}</div><div class="bl">${t.blurb}</div>
        <div class="ct">${tierItems(i).length} works available</div></button>`).join('')}
    </div>
    <div class="collnote"><div class="h">About the collection</div>
      <p>These works are drawn from <strong>Wikidata</strong> and <strong>The Met's open collection</strong>. Even reaching widely, the pool skews <strong>${b.europe}% European</strong> — a direct fingerprint of how museums, archivists and canon-makers have historically prioritized Western art. What's easy to find here is itself a lesson.</p>
      <div class="bars">${b.segs}</div><div class="barkey">${b.key}</div>
    </div>
    ${ATTRIB}
  </div>`;
  document.querySelectorAll('.dif').forEach(el=>el.onclick=()=>startGame(el.dataset.k));
}
function startGame(key){
  tier=key; const i=TIERS.findIndex(t=>t.key===key);
  let arr=tierItems(i);
  if(arr.length<ROUNDS) arr=[...arr,...shuffle(POOL.filter(p=>!arr.includes(p)))];
  game=shuffle(arr).slice(0,ROUNDS); idx=0; results=[]; hintsUsed=0;
  renderRound();
}

// ---------- PLAY ----------
function renderRound(){
  const it=game[idx];
  guess={year:1700, ll:null, medium:null, style:null, artist:"", artistPicked:false, hints:new Set()};
  // build right-column adaptive fields
  let n=1; const fields=[];
  fields.push({k:'when', html:`
    <div class="fieldlabel"><span class="ix">0${n}</span><span class="nm">When made</span></div>
    <div style="display:flex;align-items:baseline;gap:9px;margin-bottom:9px"><span class="year" id="yv">AD 1700</span><span class="eratag" id="era">[ EARLY MODERN ]</span></div>
    <input type="range" id="yr" min="-3000" max="2025" value="1700" step="1" />

  // wire slider

  // pills

function setupAutocomplete(){
  const inp=document.getElementById('artist'),list=document.getElementById('aclist');let active=-1,items=[];
  const close=()=>{list.style.display='none';active=-1;};
  const render=q=>{const ql=q.toLowerCase().trim();items=ql?ARTIST_POOL.filter(a=>a.toLowerCase().includes(ql)).slice(0,8):[];
    if(!items.length){close();return;}
    list.innerHTML=items.map((a,i)=>`<div class="ac-item${i===active?' active':''}" data-i="${i}">${esc(a)}</div>`).join('');
    list.style.display='block';
    list.querySelectorAll('.ac-item').forEach(el=>el.onmousedown=ev=>{ev.preventDefault();pick(+el.dataset.i);});};
  const pick=i=>{inp.value=items[i];guess.artist=items[i];guess.artistPicked=true;close();inp.focus();};
  inp.oninput=()=>{guess.artist=inp.value;guess.artistPicked=false;active=-1;render(inp.value);};
  inp.onkeydown=e=>{if(list.style.display==='none')return;
    if(e.key==='ArrowDown'){active=Math.min(active+1,items.length-1);render(inp.value);e.preventDefault();}
    else if(e.key==='ArrowUp'){active=Math.max(active-1,0);render(inp.value);e.preventDefault();}
    else if(e.key==='Enter'&&active>=0){pick(active);e.preventDefault();}
    else if(e.key==='Escape')close();};
  inp.onblur=()=>setTimeout(close,120);
}

function wireHints(it){
  const btn=document.getElementById('hintbtn'),out=document.getElementById('hintout'),left=document.getElementById('hintsleft');
  const opts=[];
  opts.push({label:"century",txt:()=>`Made in the ${centuryStr(it.y)}.`});
  opts.push({label:"continent",txt:()=>`Made somewhere in ${it.region}.`});
  if(it.cats.includes('style')) opts.push({label:"50/50",txt:()=>{const ws=shuffle([...document.querySelectorAll('[data-pills="style"] .pill')].filter(b=>b.dataset.v!==it.style)); ws.slice(0,2).forEach(b=>b.classList.add('ruledout')); return `Two unlikely options ruled out.`;}});
  if(it.cats.includes('artist')&&it.artist) opts.push({label:"initials",txt:()=>`The artist's initials are ${it.artist.split(/\s+/).filter(Boolean).map(w=>w[0].toUpperCase()+'.').join(' ')}.`});
  let oi=0;
  const refresh=()=>{const rem=HINT_LIMIT-hintsUsed; left.textContent=rem>0?`reveal ${opts[oi]?opts[oi].label:'hint'} · −${HINT_COST} (${rem} left)`:`no hints left`; btn.disabled=rem<=0||oi>=opts.length; if(oi>=opts.length)left.textContent="no more hints";};
  btn.onclick=()=>{ if(hintsUsed>=HINT_LIMIT||oi>=opts.length)return;
    const o=opts[oi]; guess.hints.add(o.label); hintsUsed++; oi++;
    out.style.display='block'; out.insertAdjacentHTML('beforeend',`<div>${o.txt()} <span style="color:var(--accent)">−${HINT_COST}</span></div>`);
    refresh();};
  refresh();
}
function centuryStr(y){const c=Math.floor((Math.abs(y)-1)/100)+1;const s=(c%100>10&&c%100<14)?"th":["th","st","nd","rd"][c%10]||"th";return `${c}${s} century${y<0?" BC":""}`;}

// ---------- scoring ----------
function timeScore(diff){
  if(diff<=10)return{pts:MAX_CAT,bull:true};
  if(diff<=30)return{pts:2300}; if(diff<=75)return{pts:1900}; if(diff<=150)return{pts:1350};
  if(diff<=300)return{pts:800}; if(diff<=600)return{pts:350}; return{pts:0};
}
function score(){
  const it=game[idx], cells={};
  // when
  const dy=Math.abs(guess.year-it.y), ts=timeScore(dy);
  cells.when={pts:ts.pts, bull:!!ts.bull, you:fmtYear(guess.year), actual:fmtYear(it.y),
    note:ts.bull?"right to the decade":epochName(guess.year)===epochName(it.y)?"same epoch":`${dy} yrs off`};
  // where
  let dist=null,sp=0; if(guess.ll){dist=km(guess.ll.lat,guess.ll.lng,it.lat,it.lng); sp=Math.round(MAX_CAT*Math.exp(-dist/2500));}
  cells.where={pts:sp, dist, you:guess.ll?"your pin":"no pin", actual:it.place, note:dist==null?"no pin dropped":`${Math.round(dist)} km off`};
  // medium
  if(it.cats.includes('medium')){let s=0,note="no answer";
    if(guess.medium){ if(guess.medium===it.medium){s=MAX_CAT;note="exact";}
      else if(MED_FAMILY[guess.medium]&&MED_FAMILY[guess.medium]===MED_FAMILY[it.medium]){s=Math.round(MAX_CAT*0.5);note="same family";}
      else note="wrong";}
    cells.medium={pts:s,you:guess.medium||"—",actual:it.medium,note};}
  // style
  if(it.cats.includes('style')){let s=0,note="no answer";
    if(guess.style){ if(guess.style===it.style){s=MAX_CAT;note="exact";}
      else if((RELATED_MOV[it.style]||[]).includes(guess.style)){s=Math.round(MAX_CAT*0.5);note="related";}
      else note="wrong";}
    cells.style={pts:s,you:guess.style||"—",actual:it.style,note};}
  // artist (bonus)
  if(it.cats.includes('artist')){let s=0,note="no answer";const ga=norm(guess.artist);
    if(ga){ if(ga===norm(it.artist)||(lastName(guess.artist)&&lastName(guess.artist)===lastName(it.artist))){s=MAX_CAT;note="exact match";}
      else if(artistStyle[ga]&&it.style&&artistStyle[ga].has(norm(it.style))){s=Math.round(MAX_CAT*0.4);note="same school";}
      else note="not matched";}
    cells.artist={pts:s,bonus:true,you:guess.artist||"—",actual:it.artist,note};}
  // totals
  const coreCats=it.cats.filter(c=>c!=='artist');
  const baseMax=coreCats.length*MAX_CAT;
  const core=coreCats.reduce((a,c)=>a+cells[c].pts,0);
  const bonus=cells.artist?cells.artist.pts:0;
  const hintPen=guess.hints.size*HINT_COST;
  const coreNet=Math.max(0,core-hintPen);
  // mastery
  if(it.cats.includes('style')) bumpMastery(it.style,'byStyle',cells.style.pts===MAX_CAT);
  bumpMastery(it.region,'byRegion',cells.where.pts>=MAX_CAT*0.75);
  results.push({it,cells,coreCats,baseMax,coreNet,bonus,hintPen,hints:guess.hints.size,guess:{...guess}});
  renderReveal(results[results.length-1]);
}

    || CUES.region[it.region] || {why:`A ${it.region} work${it.style?' in the '+it.style+' tradition':''}, c. ${fmtYear(it.y)}.`,cues:[]};
}

function countUps(){document.querySelectorAll('[data-cu]').forEach(el=>{const target=+el.getAttribute('data-cu'),prefix=el.getAttribute('data-prefix')||'';
  const t0=performance.now(),dur=950,ease=t=>1-Math.pow(1-t,3);
  const step=now=>{const p=Math.min(1,(now-t0)/dur);el.textContent=prefix+Math.round(target*ease(p)).toLocaleString();if(p<1)requestAnimationFrame(step);};requestAnimationFrame(step);});}

function shareSquare(c,r){const it=r.it,cell=r.cells[c];const f=cell.pts/MAX_CAT;
  if(c==='when'&&cell.bull)return "🎯"; if(c==='artist'&&cell.pts===MAX_CAT)return "⭐"; return emFor(f);}
function renderFinal(){
  const grand=results.reduce((a,r)=>a+r.coreNet,0);

// ---------- zoom lightbox ----------
function hiRes(src){return src.replace(/width=\d+/,"width=1800");}
function openZoom(src){
  const lb=document.createElement('div');lb.className='lightbox';
  const img=document.createElement('img');img.src=hiRes(src);img.draggable=false;
  let scale=1,tx=0,ty=0,drag=false,sx=0,sy=0;const apply=()=>img.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  img.onclick=e=>{e.stopPropagation();if(scale===1)scale=2.5;else{scale=1;tx=0;ty=0;}img.style.cursor=scale>1?'grab':'zoom-in';apply();};
  img.onmousedown=e=>{if(scale===1)return;drag=true;sx=e.clientX-tx;sy=e.clientY-ty;img.style.cursor='grabbing';e.preventDefault();};
  const mv=e=>{if(!drag)return;tx=e.clientX-sx;ty=e.clientY-sy;apply();};const up=()=>{drag=false;if(scale>1)img.style.cursor='grab';};
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  const close=()=>{lb.remove();window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);document.removeEventListener('keydown',esc2);};
  const esc2=e=>{if(e.key==='Escape')close();};document.addEventListener('keydown',esc2);
  lb.onclick=close;const x=document.createElement('button');x.className='lb-close';x.textContent='✕';x.onclick=e=>{e.stopPropagation();close();};
  const hint=document.createElement('div');hint.className='lb-hint';hint.textContent='Click image to zoom · drag to pan · Esc to close';
  lb.append(img,x,hint);document.body.appendChild(lb);
}
document.addEventListener('click',e=>{if(e.target.classList&&e.target.classList.contains('art'))openZoom(e.target.src);});
