<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gesso — the daily art-guessing game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --bg:#e9e7e0; --surface:#f6f4ee; --surface-strong:#edeae0; --ink:#1b1916; --muted:#8a8472;
    --faint:#a39d8c; --ink-soft:#3a362d; --line:#e3ded1; --line-card:#ddd8ca; --accent:#2230b8;
    --accent-underline:#b0b5e0; --study-bg:#eceffb; --study-border:#d3d8ef;
    --full:#2f8f5b; --partial:#cf9f3a; --miss:#c14b3a; --track:#dcd6c6;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface);color:var(--ink);font-family:'Archivo',sans-serif;
    -webkit-font-smoothing:antialiased;min-height:100vh}
  .leaflet-container{background:#dfe2e8;font-family:inherit}
  .leaflet-control-attribution{display:none}
  .mono{font-family:'IBM Plex Mono',monospace}
  .wrap{width:100%}
  .card{background:var(--surface)}
  .sheet{max-width:1080px;margin:0 auto;background:var(--surface);
    border-left:1px solid var(--line);border-right:1px solid var(--line);min-height:calc(100vh - 55px);padding-bottom:40px}
  /* header */
  .hd{position:sticky;top:0;z-index:600;border-bottom:1.5px solid var(--ink);background:var(--surface-strong)}
  .hdinner{max-width:1080px;margin:0 auto;padding:15px 24px;display:flex;align-items:center;justify-content:space-between}
  .hd .brand{display:flex;align-items:baseline;gap:13px}
  .wordmark{font:700 19px 'Archivo',sans-serif;letter-spacing:-.01em;color:var(--accent);text-transform:lowercase}
  .accn{font:500 11px 'IBM Plex Mono',monospace;color:var(--muted)}
  .hd .right{display:flex;align-items:center;gap:18px}
  .pips{display:flex;gap:5px}
  .pip{width:22px;height:5px;border-radius:2px;background:var(--line-card)}
  .pip.done{background:var(--accent)} .pip.cur{background:var(--ink)}
  .stamp{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--accent);
    border:1.5px solid var(--accent);padding:4px 10px;border-radius:3px;transform:rotate(-2deg);display:inline-block;text-transform:uppercase}
  /* generic */
  .kick{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);white-space:nowrap}
  .banner .mono{white-space:nowrap}
  .fieldlabel{display:flex;align-items:center;gap:8px;margin-bottom:11px}
  .fieldlabel .ix{font:600 10px 'IBM Plex Mono',monospace;color:var(--accent);letter-spacing:.1em}
  .fieldlabel .nm{font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);white-space:nowrap}
  .fieldlabel .rule{flex:1;height:1px;background:var(--line)}
  .fieldlabel .hintrule{font:10px 'IBM Plex Mono',monospace;color:var(--faint)}
  .plate{background:#fff;border:1px solid var(--line);border-radius:3px;padding:10px;box-shadow:0 10px 26px rgba(35,32,26,.1)}
  .plate img{display:block;width:100%;border-radius:1px;cursor:zoom-in}
  .cap{display:flex;justify-content:space-between;margin-top:10px;font:500 11px 'IBM Plex Mono',monospace;color:var(--muted)}
  .btn{width:100%;padding:15px;border:none;border-radius:5px;background:var(--accent);color:#fff;
    font:700 12px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;cursor:pointer}
  .btn:hover{filter:brightness(1.08)}
  .btn2{background:transparent;border:1.5px solid var(--accent);color:var(--accent);
    font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;padding:9px 15px;border-radius:4px;cursor:pointer}
  .btn2:disabled{opacity:.4;cursor:default}
  .attrib{text-align:center;margin-top:15px;font:11px 'IBM Plex Mono',monospace;color:var(--faint)}
  .attrib a{color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent-underline)}
  .year{font:700 27px 'Archivo',sans-serif;letter-spacing:-.01em}
  .eratag{font:500 12px 'IBM Plex Mono',monospace;color:var(--muted);white-space:nowrap}
  input[type=range]{width:100%;accent-color:var(--accent);background:var(--track);cursor:pointer;
    -webkit-appearance:none;appearance:none;height:4px;border-radius:3px;outline:none}
  .minmax{display:flex;justify-content:space-between;margin-top:6px;font:10px 'IBM Plex Mono',monospace;color:var(--faint);white-space:nowrap}
  .pills{display:flex;flex-wrap:wrap;gap:7px}
  .pill{background:#fff;color:var(--ink);border:1px solid var(--line-card);padding:8px 13px;border-radius:4px;
    cursor:pointer;font:500 12px 'IBM Plex Mono',monospace;white-space:nowrap}
  .pill.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
  .pill.ruledout{opacity:.3;text-decoration:line-through;pointer-events:none}
  input[type=text]{width:100%;padding:11px 13px;background:#fff;border:1px solid var(--line-card);
    border-radius:4px;color:var(--ink);font:13px 'IBM Plex Mono',monospace;outline:none}
  input[type=text]:focus{border-color:var(--accent)}
  .ac{position:relative}
  .ac-list{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:1000;background:#fff;
    border:1px solid var(--line-card);border-radius:4px;overflow:hidden}
  .ac-item{padding:9px 13px;color:var(--ink);font:12px 'IBM Plex Mono',monospace;cursor:pointer;border-top:1px solid #eee9dc}
  .ac-item:first-child{border-top:none}
  .ac-item.active,.ac-item:hover{background:var(--accent);color:#fff}
  .hinttext{animation:afFade .3s ease;margin-top:11px;font:13px/1.5 'IBM Plex Mono',monospace;
    color:#6f6a5b;border-left:2px solid var(--accent);padding-left:13px}
  .hinttext div{padding:2px 0}
  .hintbox{margin-top:16px;border:1px solid var(--line-card);border-radius:8px;padding:13px 14px;background:#fdfcf9}
  .hinthd{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:11px;flex-wrap:wrap}
  .hinthl{font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
  .hintmeta{font:500 10px 'IBM Plex Mono',monospace;letter-spacing:.04em;color:var(--faint);white-space:nowrap}
  .hintchips{display:flex;flex-wrap:wrap;gap:7px}
  .hintchip{display:inline-flex;align-items:center;gap:7px;background:transparent;border:1.5px solid var(--accent);color:var(--accent);font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.04em;text-transform:uppercase;padding:7px 11px;border-radius:4px;cursor:pointer}
  .hintchip .cost{font:500 10px 'IBM Plex Mono',monospace;letter-spacing:0;opacity:.6}
  .hintchip:hover{background:var(--accent);color:#fff}
  .hintchip.used{border-color:var(--line-card);color:var(--faint);background:#f1eee7;cursor:default}
  .hintchip.used .cost{display:none}
  .hintchip.used::before{content:"\2713";font-weight:700;margin-right:1px}
  .hintchip:disabled:not(.used){opacity:.34;cursor:default}
  .hintchip:disabled:not(.used):hover{background:transparent;color:var(--accent)}
  .hintlabel{display:inline-block;font:700 10px 'IBM Plex Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-right:7px}
  /* reveal */
  .banner{padding:22px 24px;background:linear-gradient(180deg,#eceffb,#f6f4ee);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .big{font:800 42px 'Archivo',sans-serif;letter-spacing:-.02em}
  .swatchrow{display:flex;gap:11px}
  .swatch{text-align:center}
  .swatch .sq{width:36px;height:36px;border-radius:8px}
  .swatch .lb{font:600 8px 'IBM Plex Mono',monospace;letter-spacing:.05em;color:var(--faint);margin-top:5px}
  .revealgrid{padding:24px;display:grid;grid-template-columns:.92fr 1.08fr;gap:26px;border-bottom:1px solid var(--line)}
  .filed{position:absolute;top:18px;right:18px;font:700 9px 'IBM Plex Mono',monospace;letter-spacing:.1em;
    color:#fff;background:var(--accent);padding:5px 9px;border-radius:3px;transform:rotate(4deg)}
  .worktitle{font:700 19px/1.15 'Archivo',sans-serif;letter-spacing:-.01em;margin-top:14px}
  .metarow{display:flex;gap:10px}
  .metarow .k{flex:0 0 62px;font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.08em;color:var(--accent)}
  .metarow .v{font:13px 'IBM Plex Mono',monospace;color:var(--ink)}
  .telllink{display:inline-block;margin-top:16px;font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.07em;
    text-transform:uppercase;color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent-underline);padding-bottom:2px}
  .scrow{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
  .scrow:last-child{border-bottom:none}
  .scrow .sq{width:24px;height:24px;border-radius:5px;flex:0 0 auto}
  .scrow .mid{flex:1;min-width:0}
  .scrow .t1{font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--ink)}
  .scrow .t2{font:11px 'IBM Plex Mono',monospace;color:var(--muted);margin-top:2px}
  .scrow .pts{text-align:right;flex:0 0 auto;white-space:nowrap}
  .scrow .pts .n{font:700 17px 'Archivo',sans-serif;color:var(--ink)}
  .scrow .pts .d{font:9px 'IBM Plex Mono',monospace;color:var(--faint)}
  .study{margin:24px;background:var(--study-bg);border:1px solid var(--study-border);border-radius:8px;padding:22px}
  .study .why{font:500 18px/1.42 'Archivo',sans-serif;color:var(--ink);max-width:600px;margin:13px 0 20px}
  .cue{display:flex;gap:12px;align-items:flex-start;padding:7px 0}
  .cue .num{flex:0 0 16px;font:700 13px 'Archivo',sans-serif;color:var(--accent)}
  .cue .tx{font:13px/1.55 'IBM Plex Mono',monospace;color:var(--ink-soft)}
  .mastery{margin-top:20px;padding-top:16px;border-top:1px solid var(--study-border);
    display:flex;align-items:center;gap:13px;flex-wrap:wrap;font:12px 'IBM Plex Mono',monospace;color:var(--ink)}
  .weak{color:var(--miss)}
  /* start */
  .hero{padding:38px 24px 14px;text-align:center}
  .herokick{display:flex;align-items:center;justify-content:center;gap:12px;font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:18px}
  .herokick .r{width:26px;height:1px;background:var(--accent);opacity:.4}
  .herobig{font:800 56px 'Archivo',sans-serif;letter-spacing:-.025em;line-height:1.06;color:var(--ink)}
  .herobig em{font-style:normal;color:var(--accent)}
  .heroglos{font:500 12px 'IBM Plex Mono',monospace;color:var(--faint);margin-top:15px;letter-spacing:.01em;max-width:520px;margin-left:auto;margin-right:auto}
  .herometa{font:600 10px 'IBM Plex Mono',monospace;color:var(--muted);margin-top:8px;letter-spacing:.16em;text-transform:uppercase}
  .difs{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:18px 24px}
  .dif{text-align:left;background:var(--surface);border:1px solid var(--line-card);border-radius:8px;padding:18px;cursor:pointer;transition:.12s;font-family:inherit}
  .dif:hover{border-color:var(--accent);transform:translateY(-2px)}
  .dif .tier{font:600 10px 'IBM Plex Mono',monospace;color:var(--accent);letter-spacing:.1em}
  .dif .nm{font:700 20px 'Archivo',sans-serif;margin:5px 0 4px}
  .dif .bl{font:12px 'IBM Plex Mono',monospace;color:var(--muted)}
  .dif .ct{font:11px 'IBM Plex Mono',monospace;color:var(--accent);margin-top:9px}
  .collnote{margin:4px 24px 24px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px 18px}
  .collnote .h{font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .collnote p{margin:0;font:12px/1.6 'IBM Plex Mono',monospace;color:var(--ink-soft)}
  .bars{display:flex;height:8px;border-radius:3px;overflow:hidden;margin:10px 0 8px}
  .bars span{display:block}
  .barkey{display:flex;flex-wrap:wrap;gap:10px;font:10px 'IBM Plex Mono',monospace;color:var(--muted)}
  .barkey i{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
  /* results */
  .matrix{padding:6px 24px 4px;overflow-x:auto}
  .matrix table{border-collapse:collapse;width:100%}
  .matrix th{font:600 9px 'IBM Plex Mono',monospace;letter-spacing:.08em;color:var(--faint);padding:6px 4px;text-transform:uppercase}
  .matrix td{padding:4px}
  .matrix .rl{font:11px 'IBM Plex Mono',monospace;color:var(--muted);text-align:left;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .msq{width:26px;height:26px;border-radius:5px;margin:0 auto}
  .sharebox{font-family:'IBM Plex Mono',monospace;background:#fff;border:1px solid var(--line-card);
    border-radius:6px;padding:14px;white-space:pre;line-height:1.5;font-size:14px;overflow-x:auto}
  /* zoom */
  .lightbox{position:fixed;inset:0;background:rgba(20,18,14,.94);z-index:5000;display:flex;align-items:center;justify-content:center;cursor:zoom-out;overflow:hidden}
  .lightbox img{max-width:94vw;max-height:94vh;cursor:zoom-in;will-change:transform;user-select:none}
  .lb-close{position:fixed;top:14px;right:20px;background:none;border:none;color:#fff;font-size:30px;cursor:pointer;line-height:1}
  .lb-hint{position:fixed;bottom:16px;left:0;right:0;text-align:center;color:#cfc6b4;font:13px 'IBM Plex Mono',monospace;pointer-events:none}
  @keyframes afFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media(max-width:680px){
    .wrap{padding:14px 0 60px}
    .revealgrid{grid-template-columns:1fr;gap:20px;padding:17px}
    .playgrid{grid-template-columns:1fr!important}
    .difs{grid-template-columns:1fr}
    .hdinner{padding:13px 16px}.hd .accn{display:none}
    .big{font-size:34px}.herobig{font-size:38px}.year{font-size:23px}
  }
</style>
</head>
<body>
<div class="wrap"><div id="stage"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data/cues.js"></script>
<script src="data/teach-works.js"></script>
<script src="data/pool.js"></script>
<script>
"use strict";
const MAX_CAT=2500, ROUNDS=5, HINT_COST=500, HINT_LIMIT=3;
const CUES = window.ARTEFACTUM_CUES || {style:{},culture:{},region:{},medium:{}};
// difficulty tunes scoring leniency + how confusable the distractors are
const DIFF={
  easy:      {distK:4500, relMov:0.70, timeMult:1.6, look:'far'},
  medium:    {distK:2500, relMov:0.50, timeMult:1.1, look:'mix'},
  hard:      {distK:1500, relMov:0.35, timeMult:0.9, look:'near'},
  impossible:{distK:1000, relMov:0.25, timeMult:0.75, look:'near'},
};
const dcfg=()=>DIFF[tier]||DIFF.medium;

// ---------- helpers ----------
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickN(a,n){return shuffle(a).slice(0,n);}
function fill3(ans,picks,fromAll){let p=[...new Set(picks)].filter(x=>x&&x!==ans);
  const rest=shuffle(fromAll.filter(x=>x!==ans&&!p.includes(x)));
  while(p.length<3&&rest.length)p.push(rest.shift());
  return shuffle([ans,...p.slice(0,3)]);}
// medium choices: easy = different families (obvious); hard = same family (lookalikes)
function mediumChoices(ans){const look=dcfg().look;
  const same=ALL_MED.filter(m=>m!==ans&&MED_FAMILY[m]&&MED_FAMILY[m]===MED_FAMILY[ans]);
  const diff=ALL_MED.filter(m=>m!==ans&&MED_FAMILY[m]!==MED_FAMILY[ans]);
  let picks; if(look==='far')picks=pickN(diff,3); else if(look==='near')picks=[...pickN(same,3),...pickN(diff,3)].slice(0,3); else picks=[...pickN(same,1),...pickN(diff,2)];
  return fill3(ans,picks,ALL_MED);}
// style choices: themed to the answer's own region/kind (so European works show European movements,
// Asian works show Asian schools); hard pulls confusable related/same-region neighbours
function styleChoices(it){const look=dcfg().look, ans=it.style, pool=it.styleKind==='culture'?CULTS:MOVS;
  const sameReg=pool.filter(s=>s!==ans&&styleRegion[s]===it.region);
  const related=(RELATED_MOV[ans]||[]).filter(s=>pool.includes(s));
  let picks; if(look==='far')picks=pickN(pool.filter(s=>s!==ans),3);
  else if(look==='near')picks=[...pickN(related,2),...pickN(sameReg,3)].slice(0,3);
  else picks=[...pickN(related,1),...pickN(sameReg.length?sameReg:pool,2)];
  return fill3(ans,picks,pool);}
function km(a,b,c,d){const R=6371,r=Math.PI/180,dl=(c-a)*r,dn=(d-b)*r,h=Math.sin(dl/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dn/2)**2;return 2*R*Math.asin(Math.sqrt(h));}
function fmtYear(y){return y<0?`${-y} BCE`:`${y} CE`;}
// non-linear timeline: most works are post-1400, so give recent centuries more of the track
let MINY=-2500; const BREAKY=1400, BREAKP=350, MAXY=2025, MAXP=1000;
function posToYear(p){p=+p; return p<=BREAKP?Math.round(MINY+(p/BREAKP)*(BREAKY-MINY)):Math.round(BREAKY+((p-BREAKP)/(MAXP-BREAKP))*(MAXY-BREAKY));}
function yearToPos(y){return y<=BREAKY?Math.round((y-MINY)/(BREAKY-MINY)*BREAKP):Math.round(BREAKP+(y-BREAKY)/(MAXY-BREAKY)*(MAXP-BREAKP));}
// Region-aware period schemes — the slider tag reflects the work's own culture's periodization
const SCHEMES={
  western:[["Antiquity",500],["Medieval",1400],["Renaissance",1600],["Baroque",1750],["Enlightenment",1800],["19th c.",1900],["Modern",1945],["Contemporary",3000]],
  china:[["Ancient",-221],["Han",220],["Six Dynasties",589],["Sui–Tang",907],["Song",1279],["Yuan",1368],["Ming",1644],["Qing",1912],["Modern",3000]],
  japan:[["Ancient",710],["Nara",794],["Heian",1185],["Kamakura",1333],["Muromachi",1573],["Momoyama",1615],["Edo",1868],["Meiji+",3000]],
  india:[["Ancient",320],["Gupta",606],["Medieval",1206],["Sultanate",1526],["Mughal",1757],["Colonial",1947],["Modern",3000]],
  persia:[["Ancient",651],["Early Islamic",1256],["Ilkhanid–Timurid",1501],["Safavid",1736],["Qajar",1925],["Modern",3000]],
  egypt:[["Early Dynastic",-2686],["Old Kingdom",-2055],["Middle Kingdom",-1550],["New Kingdom",-1069],["Late Period",-332],["Greco-Roman",641],["Islamic",3000]],
  classical:[["Archaic",-480],["Classical Greek",-323],["Hellenistic",-31],["Roman Imperial",476],["Late Antique",3000]],
  neutral:[["Ancient",500],["Medieval",1400],["Early Modern",1800],["Modern",1945],["Contemporary",3000]],
};
function schemeFor(it){
  const t=((it.place||"")+" "+(it.style||"")+" "+(it.region||"")).toLowerCase();
  if(/japan|edo|ukiyo/.test(t))return 'japan';
  if(/china|chinese/.test(t))return 'china';
  if(/india|mughal|rajput|deccan|nepal|tibet/.test(t))return 'india';
  if(/iran|persia|islam|ottoman|turkey|safavid|qajar|syria/.test(t))return 'persia';
  if(/egypt/.test(t))return 'egypt';
  if(/greece|rome|roman|greek/.test(t))return 'classical';
  if(it.region==='Europe'||it.region==='North America')return 'western';
  return 'neutral';
}
function periodOf(scheme,y){const sc=SCHEMES[scheme]||SCHEMES.neutral;for(const[n,end]of sc)if(y<end)return n;return sc[sc.length-1][0];}
function periodName(it,y){return periodOf(schemeFor(it),y);}
// derive a period scheme from a GUESSED pin (so the slider reflects the player's hypothesis, not the answer)
function schemeFromLatLng(lat,lng){
  if(lng>=24&&lng<=37&&lat>=18&&lat<=32)return 'egypt';
  if(lng>=128&&lng<=146&&lat>=30&&lat<=46)return 'japan';
  if(lng>=98&&lng<=136&&lat>=18&&lat<=50)return 'china';
  if(lng>=68&&lng<=92&&lat>=6&&lat<=36)return 'india';
  if(lng>=25&&lng<=75&&lat>=12&&lat<=43)return 'persia';
  if(lng>=-25&&lng<=60&&lat>=35&&lat<=72)return 'western';
  return 'neutral';
}
// continent of a guessed pin (matches the data pipeline's classification)
function continentOf(lat,lng){
  if(lng>=-82&&lng<=-34&&lat<13&&lat>=-56)return "South America";
  if(lng>=-170&&lng<=-52&&lat>=13)return "North America";
  if(lng>=110&&lat<=-10)return "Oceania";
  if(lat>=36&&lng>=-25&&lng<=60)return "Europe";
  if(lat>=-35&&lat<36&&lng>=-20&&lng<=52)return "Africa";
  if(lng>40)return "Asia";
  return "Europe";
}
// strike wrong style pills down to `leave` remaining (answer + leave-1). Idempotent.
function geoElim(it,leave){
  const pills=[...document.querySelectorAll('[data-pills="style"] .pill')];
  const active=pills.filter(b=>!b.classList.contains('ruledout'));
  const wrong=active.filter(b=>b.dataset.v!==it.style);
  const toStrike=Math.max(0,active.length-leave);
  shuffle(wrong).slice(0,toStrike).forEach(b=>b.classList.add('ruledout'));
  return toStrike;

  "Post-impressionism":"Post-Impressionism","American realism":"American Realism","French realism":"French Realism",
  "Pre-Raphaelite Brotherhood":"Pre-Raphaelite","Early Netherlandish painting":"Early Netherlandish"};
function buildIndexes(){

  // that percentile so every difficulty tier is a mix of regions (not Western=easy, rest=impossible)
  const byRegion={};
  for(const p of POOL){ (byRegion[p.region]=byRegion[p.region]||[]).push(p); }
  for(const r in byRegion){ const g=byRegion[r].sort((a,b)=>(a.fame||0)-(b.fame||0)); const n=g.length;
    g.forEach((p,i)=>p._rank = n>1 ? i/(n-1) : 0.5); }
  POOL.sort((a,b)=>(b._rank-a._rank)||((b.fame||0)-(a.fame||0)));
  MINY=Math.min(...POOL.map(p=>p.y));

function centuryStr(y){const c=Math.floor((Math.abs(y)-1)/100)+1;const s=(c%100>10&&c%100<14)?"th":["th","st","nd","rd"][c%10]||"th";return `${c}${s} century${y<0?" BCE":""}`;}

// ---------- scoring ----------
function timeScore(diff){
  if(diff<=15)return{pts:MAX_CAT,bull:true};
  if(diff<=40)return{pts:2250}; if(diff<=90)return{pts:2000}; if(diff<=180)return{pts:1500};
  if(diff<=400)return{pts:850}; if(diff<=800)return{pts:350}; return{pts:0};
}
function score(){
  const it=game[idx], cells={}, D=dcfg();
  // when (leniency scales with difficulty; 🎯 bullseye always = within a real decade)
  const dy=Math.abs(guess.year-it.y), ts=timeScore(Math.round(dy/D.timeMult)), bull=dy<=10;
  cells.when={pts:bull?MAX_CAT:ts.pts, bull, you:fmtYear(guess.year), actual:fmtYear(it.y),
    note:bull?"right to the decade":periodName(it,guess.year)===periodName(it,it.y)?"same period":`${dy} yrs off`};
  // where (distance falloff is gentler on easy, steeper on hard)
  let dist=null,sp=0; if(guess.ll){dist=km(guess.ll.lat,guess.ll.lng,it.lat,it.lng); sp=Math.round(MAX_CAT*Math.exp(-dist/D.distK));}
  cells.where={pts:sp, dist, you:guess.ll?"your pin":"no pin", actual:it.place, note:dist==null?"no pin dropped":`${Math.round(dist)} km off`};
  // medium
  if(it.cats.includes('medium')){let s=0,note="no answer";
    if(guess.medium){ if(guess.medium===it.medium){s=MAX_CAT;note="exact";}
      else if(MED_FAMILY[guess.medium]&&MED_FAMILY[guess.medium]===MED_FAMILY[it.medium]){s=Math.round(MAX_CAT*0.5);note="same family";}
      else note="wrong";}
    cells.medium={pts:s,you:guess.medium||"—",actual:it.medium,note};}
  // style
  if(it.cats.includes('style')){let s=0,note="no answer";
    if(guess.style){ if(guess.style===it.style){s=MAX_CAT;note="exact";}
      else if((RELATED_MOV[it.style]||[]).includes(guess.style)){s=Math.round(MAX_CAT*D.relMov);note="related";}
      else note="wrong";}
    cells.style={pts:s,you:guess.style||"—",actual:it.style,note};}
  // artist (bonus)
  if(it.cats.includes('artist')){let s=0,note="no answer";const ga=norm(guess.artist);
    if(ga){ if(ga===norm(it.artist)||(lastName(guess.artist)&&lastName(guess.artist)===lastName(it.artist))){s=MAX_CAT;note="exact match";}
      else if(artistStyle[ga]&&it.style&&artistStyle[ga].has(norm(it.style))){s=Math.round(MAX_CAT*0.4);note="same school";}
      else note="not matched";}
    cells.artist={pts:s,bonus:true,you:guess.artist||"—",actual:it.artist,note};}
  // totals
  const coreCats=it.cats.filter(c=>c!=='artist');
  const baseMax=coreCats.length*MAX_CAT;
  const core=coreCats.reduce((a,c)=>a+cells[c].pts,0);
  const bonus=cells.artist?cells.artist.pts:0;
  const hintPen=guess.hints.size*HINT_COST;
  const coreNet=Math.max(0,core-hintPen);
  // mastery
  if(it.cats.includes('style')) bumpMastery(it.style,'byStyle',cells.style.pts===MAX_CAT);
  bumpMastery(it.region,'byRegion',cells.where.pts>=MAX_CAT*0.75);
  results.push({it,cells,coreCats,baseMax,coreNet,bonus,hintPen,hints:guess.hints.size,guess:{...guess}});
  renderReveal(results[results.length-1]);
}

// ---------- REVEAL ----------
function studyFor(it){
  const w=CUES.work&&CUES.work[it.id]; if(w&&w.why) return w; // per-work note (Codex-generated)
  return (it.styleKind==='movement'&&CUES.style[it.style]) || (it.styleKind==='culture'&&CUES.culture[it.style])
    || CUES.region[it.region] || {why:`Made in ${it.place||it.region}, c. ${fmtYear(it.y)}.`,cues:[]};
}
function swatchColor(f){return f>=.75?'var(--full)':f>=.35?'var(--partial)':'var(--miss)';}
function renderReveal(r){
  const it=r.it;
  const banner=r.coreCats.map(c=>{const f=r.cells[c].pts/MAX_CAT;
    return `<div class="swatch"><div class="sq" style="background:${swatchColor(f)}"></div><div class="lb">${catShort(c,it)}</div></div>`;}).join('')
    + (r.cells.artist?`<div class="swatch"><div class="sq" style="background:${swatchColor(r.cells.artist.pts/MAX_CAT)}"></div><div class="lb">ARTIST</div></div>`:'');
  const scoreRow=(c)=>{const cell=r.cells[c],f=cell.pts/MAX_CAT;
    return `<div class="scrow"><span class="sq" style="background:${swatchColor(f)}"></span>
      <div class="mid"><div class="t1">${catLabel(c,it)}${cell.bonus?' · bonus':''}</div>
      <div class="t2">${esc(cell.you)} · ${esc(cell.actual||'')} — ${esc(cell.note)}</div></div>
      <div class="pts"><span class="n" data-cu="${cell.pts}">${cell.pts.toLocaleString()}</span><div class="d">/ 2,500</div></div></div>`;};
  const study=studyFor(it);
  const why=study.why.replace(/\b(Dutch Golden Age|Renaissance|Baroque|Impressionism|Post-Impressionism|ukiyo-e)\b/,'<strong>$1</strong>');
  const ml=masteryLine();
  document.getElementById('stage').innerHTML=`${header(idx+1,idx,true)}<div class="sheet">

    <div class="banner"><div>
      <div class="kick">Record filed &middot; Piece ${idx+1} of ${ROUNDS}</div>
      <div style="display:flex;align-items:baseline;gap:9px;margin-top:7px">
        <span class="big" data-cu="${r.coreNet}" data-prefix="+">+${r.coreNet.toLocaleString()}</span>
        <span class="mono" style="font-size:13px;color:var(--muted)">/ ${r.baseMax.toLocaleString()} pts${r.bonus?` &middot; +${r.bonus.toLocaleString()} bonus`:''}${r.hintPen?` &middot; −${r.hintPen} hints`:''}</span></div>
    </div><div class="swatchrow">${banner}</div></div>
    <div class="revealgrid">
      <div>
        <div style="position:relative" class="plate"><img class="art" src="${esc(it.img)}" alt="${esc(it.title)}"/><span class="filed">FILED &check;</span></div>
        <div class="worktitle">${esc(it.title)}</div>
        <div style="margin-top:12px;display:flex;flex-direction:column;gap:9px">
          ${it.artist?`<div class="metarow"><span class="k">ARTIST</span><span class="v">${esc(it.artist)}</span></div>`:`<div class="metarow"><span class="k">ARTIST</span><span class="v" style="color:var(--muted)">Unknown / anonymous</span></div>`}
          <div class="metarow"><span class="k">DATE</span><span class="v">${fmtYear(it.y)}</span></div>
          <div class="metarow"><span class="k">ORIGIN</span><span class="v">${esc(it.place||it.region)}</span></div>
          ${it.style?`<div class="metarow"><span class="k">${it.styleKind==='culture'?'CULTURE':'SCHOOL'}</span><span class="v">${esc(it.style)}</span></div>`:''}
          ${it.medium?`<div class="metarow"><span class="k">MEDIUM</span><span class="v">${esc(it.medium)}</span></div>`:''}
        </div>
        <a class="telllink" href="${sourceURL(it)}" target="_blank" rel="noopener">Tell me about this work &#8599;</a>
      </div>
      <div>
        <div class="kick" style="margin-bottom:4px">Scorecard</div>
        ${r.coreCats.map(scoreRow).join('')}${r.cells.artist?scoreRow('artist'):''}
        <div style="margin-top:18px"><div class="kick" style="margin-bottom:8px">Your pin vs. truth</div>
          <div id="revmap" style="height:170px;border:1px solid var(--line-card);border-radius:5px;overflow:hidden"></div>
          <div style="display:flex;align-items:center;gap:16px;margin-top:9px;font:10px 'IBM Plex Mono',monospace;color:var(--muted)">
            <span style="display:flex;align-items:center;gap:6px"><span style="width:9px;height:9px;border-radius:50%;background:var(--full)"></span>${esc(it.place||it.region)} — made here</span>
            ${r.guess.ll?`<span style="display:flex;align-items:center;gap:6px"><span style="width:9px;height:9px;border-radius:50%;background:var(--accent)"></span>Your pin</span><span style="margin-left:auto;color:var(--ink);font-weight:600">&asymp; ${Math.round(r.cells.where.dist)} km off</span>`:`<span style="margin-left:auto;color:var(--muted)">no pin dropped</span>`}
          </div>
        </div>
      </div>
    </div>
    <div class="study"><div class="kick" style="letter-spacing:.16em">Study note &middot; teach me</div>
      <div class="why">${why}</div>
      ${study.cues&&study.cues.length?`<div style="font:700 10px 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);margin-bottom:12px">How the eye sees it</div>
        <div>${study.cues.map((c,i)=>`<div class="cue"><span class="num">${i+1}</span><span class="tx">${c}</span></div>`).join('')}</div>`:''}
      ${it.medium&&CUES.medium[it.medium]?`<div class="cue" style="margin-top:8px"><span class="num">◆</span><span class="tx">${CUES.medium[it.medium]}</span></div>`:''}
      ${ml?`<div class="mastery"><span style="font:700 10px 'IBM Plex Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)">Your mastery</span><span>${ml}</span></div>`:''}
    </div>
    <div style="padding:0 24px 24px"><button class="btn" id="next">${idx<ROUNDS-1?'Next masterwork →':'See final score →'}</button>${ATTRIB}</div>
  </div>`;
  countUps();
  // reveal map
  const rm=L.map('revmap',{worldCopyJump:true,zoomControl:false,attributionControl:false,scrollWheelZoom:false,dragging:false,doubleClickZoom:false}).setView([30,10],2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:8}).addTo(rm);
  const t=[it.lat,it.lng], pts=[t];
  L.circleMarker(t,{radius:7,color:'#fff',weight:2,fillColor:'#2f8f5b',fillOpacity:1}).addTo(rm);
  if(r.guess.ll){const g=[r.guess.ll.lat,r.guess.ll.lng]; pts.push(g);
    L.polyline([g,t],{color:'#2230b8',weight:2,dashArray:'5,6'}).addTo(rm);
    L.circleMarker(g,{radius:7,color:'#fff',weight:2,fillColor:'#2230b8',fillOpacity:1}).addTo(rm);}
  try{rm.fitBounds(pts,{padding:[28,28],maxZoom:5});}catch{}
  setTimeout(()=>rm.invalidateSize(),250);
  document.getElementById('next').onclick=()=>{idx++; idx<ROUNDS?renderRound():renderFinal();};
}
function countUps(){document.querySelectorAll('[data-cu]').forEach(el=>{const target=+el.getAttribute('data-cu'),prefix=el.getAttribute('data-prefix')||'';
  const t0=performance.now(),dur=950,ease=t=>1-Math.pow(1-t,3);
  const step=now=>{const p=Math.min(1,(now-t0)/dur);el.textContent=prefix+Math.round(target*ease(p)).toLocaleString();if(p<1)requestAnimationFrame(step);};requestAnimationFrame(step);});}

// ---------- RESULTS ----------
function shareSquare(c,r){const it=r.it,cell=r.cells[c];const f=cell.pts/MAX_CAT;
  if(c==='when'&&cell.bull)return "🎯"; if(c==='artist'&&cell.pts===MAX_CAT)return "⭐"; return emFor(f);}
function renderFinal(){
  const grand=results.reduce((a,r)=>a+r.coreNet,0);
  const gmax=results.reduce((a,r)=>a+r.baseMax,0);
  const bonus=results.reduce((a,r)=>a+r.bonus,0);
  const totalHints=results.reduce((a,r)=>a+r.hints,0);
  // share text (per piece: its category squares in cat order)
  const lines=results.map(r=>r.it.cats.map(c=>shareSquare(c,r)).join('')+(r.hints?' 💡':'')).join('\n');
  const share=`Gesso ${tier} · ${grand.toLocaleString()}/${gmax.toLocaleString()}${bonus?` +${bonus} bonus`:''}${totalHints?`  💡×${totalHints}`:''}\n${lines}\n🕰️🗺️🎨🏛️🖌️`;
  // matrix
  const cols=["when","where","medium","style","artist"];
  const head=cols.map(c=>`<th>${catShort(c)}</th>`).join('');
  const rows=results.map(r=>`<tr><td class="rl">${esc(r.it.title)}</td>${cols.map(c=>{
    if(!r.it.cats.includes(c))return `<td></td>`;
    const f=r.cells[c].pts/MAX_CAT;return `<td><div class="msq" style="background:${swatchColor(f)}"></div></td>`;}).join('')}</tr>`).join('');
  const ml=masteryLine();
  document.getElementById('stage').innerHTML=`${header(ROUNDS,-1,true)}<div class="sheet">

    <div class="banner"><div><div class="kick">Game filed &middot; ${ROUNDS} of ${ROUNDS}</div>
      <div style="display:flex;align-items:baseline;gap:9px;margin-top:7px">
        <span class="big" data-cu="${grand}">${grand.toLocaleString()}</span>
        <span class="mono" style="font-size:13px;color:var(--muted)">/ ${gmax.toLocaleString()} pts${bonus?` &middot; +${bonus.toLocaleString()} bonus`:''}</span></div></div></div>
    <div class="matrix"><table><thead><tr><th style="text-align:left">Work</th>${head}</tr></thead><tbody>${rows}</tbody></table></div>
    <div style="padding:18px 24px 8px"><div class="kick" style="margin-bottom:8px">Share</div>
      <div class="sharebox" id="share">${esc(share)}</div></div>
    ${ml?`<div class="study"><div class="kick">Session mastery</div><div class="why" style="font-size:15px">${ml}</div></div>`:''}
    <div style="padding:8px 24px 24px"><button class="btn" id="copy">Copy result to share</button>
      <button class="btn" id="again" style="background:transparent;border:1.5px solid var(--accent);color:var(--accent);margin-top:10px">Play again</button>${ATTRIB}</div>
  </div>`;
  countUps();
  document.getElementById('copy').onclick=()=>navigator.clipboard.writeText(share).then(()=>document.getElementById('copy').textContent='Copied ✓');
  document.getElementById('again').onclick=renderStart;
}

// ---------- zoom lightbox ----------
function hiRes(src){return src.replace(/width=\d+/,"width=1800");}
function openZoom(src){
  const lb=document.createElement('div');lb.className='lightbox';
  const img=document.createElement('img');img.src=hiRes(src);img.draggable=false;
  let scale=1,tx=0,ty=0,drag=false,sx=0,sy=0;const apply=()=>img.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  img.onclick=e=>{e.stopPropagation();if(scale===1)scale=2.5;else{scale=1;tx=0;ty=0;}img.style.cursor=scale>1?'grab':'zoom-in';apply();};
  img.onmousedown=e=>{if(scale===1)return;drag=true;sx=e.clientX-tx;sy=e.clientY-ty;img.style.cursor='grabbing';e.preventDefault();};
  const mv=e=>{if(!drag)return;tx=e.clientX-sx;ty=e.clientY-sy;apply();};const up=()=>{drag=false;if(scale>1)img.style.cursor='grab';};
  window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  const close=()=>{lb.remove();window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);document.removeEventListener('keydown',esc2);};
  const esc2=e=>{if(e.key==='Escape')close();};document.addEventListener('keydown',esc2);
  lb.onclick=close;const x=document.createElement('button');x.className='lb-close';x.textContent='✕';x.onclick=e=>{e.stopPropagation();close();};
  const hint=document.createElement('div');hint.className='lb-hint';hint.textContent='Click image to zoom · drag to pan · Esc to close';
  lb.append(img,x,hint);document.body.appendChild(lb);
}
document.addEventListener('click',e=>{if(e.target.classList&&e.target.classList.contains('art'))openZoom(e.target.src);});

// ---------- boot ----------
if(!POOL.length){document.getElementById('stage').innerHTML='<div class="card"><div class="hero"><div class="big2">⚠︎</div><div class="tag">Could not load the artwork data (data/pool.js). Serve this folder over http (e.g. python3 -m http.server).</div></div></div>';}
else{ buildIndexes(); renderStart(); }
</script>
