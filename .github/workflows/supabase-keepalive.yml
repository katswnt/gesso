name: Supabase keep-alive

# Free-tier Supabase projects auto-pause after ~7 days of inactivity. This
# pings the database DAILY so it never pauses — a daily run gives a wide safety
# margin (the 7-day timer can't approach even if several runs are skipped or
# fail). Also runnable on demand from the Actions tab (workflow_dispatch).
on:
  schedule:
    - cron: '0 9 * * *' # daily at 09:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/supabase-keepalive.mjs
